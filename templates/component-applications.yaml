{{- range .Values.connectivityLink.apps }}
{{- if and . .enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ $.Release.Name }}-{{ .id }}
  namespace: {{ $.Values.argocd.namespace }}
  labels:
    app.kubernetes.io/part-of: platform-hub-spoke
  annotations:
    argocd.argoproj.io/sync-wave: {{ .syncWave | quote }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ $.Values.argocd.project }}
  ignoreDifferences:
    - group: ""
      kind: Service
      jsonPointers:
        - /spec/clusterIP
        - /spec/clusterIPs
        - /spec/ipFamilies
        - /spec/ipFamilyPolicy
        - /spec/internalTrafficPolicy
    - group: route.openshift.io
      kind: Route
      jsonPointers:
        - /spec/host
        - /spec/wildcardPolicy
        - /status
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/template/metadata/annotations
    - group: ""
      kind: Secret
      jsonPointers:
        - /data
    - group: ""
      kind: Secret
      name: kiali-remote-east
      namespace: openshift-cluster-observability-operator
      jsonPointers:
        - /data
        - /stringData
    - group: ""
      kind: Secret
      name: kiali-remote-west
      namespace: openshift-cluster-observability-operator
      jsonPointers:
        - /data
        - /stringData
    - group: ""
      kind: Namespace
      jsonPointers:
        - /metadata/annotations
    - group: networking.istio.io
      kind: "*"
      jsonPointers:
        - /spec
        - /metadata/annotations
    - group: gateway.networking.k8s.io
      kind: Gateway
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: sailoperator.io
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: operator.istio.io
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: kuadrant.io
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: skupper.io
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: kafka.strimzi.io
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: datasciencecluster.opendatahub.io
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: serving.kserve.io
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: camel.apache.org
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: ""
      kind: ConfigMap
      jsonPointers:
        - /metadata/annotations
    - group: platform.stackrox.io
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: operator.open-cluster-management.io
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: cluster.open-cluster-management.io
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /metadata/labels
        - /status
    - group: agent.open-cluster-management.io
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: broker.amq.io
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: operators.coreos.com
      kind: OperatorGroup
      jsonPointers:
        - /metadata/annotations
        - /metadata/labels
        - /spec
    - group: tekton.dev
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /metadata/labels
        - /spec/tasks
    - group: grafana.integreatly.org
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: operators.coreos.com
      kind: Subscription
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: skupper.io
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /status
    # RHDH operator may shrink spec.application.appConfig.configMaps / extraFiles after sync;
    # ignoring avoids flip-flop so Git keeps catalog + auth ConfigMaps and User entities load.
    - group: argoproj.io
      kind: ArgoCD
      jsonPointers:
        - /spec/resourceCustomizations
        - /metadata/annotations
        - /status
    - group: sailoperator.io
      kind: Istio
      jsonPointers:
        - /spec/profile
        - /metadata/annotations
        - /status
    - group: rhdh.redhat.com
      kind: Backstage
      jsonPointers:
        - /spec/application/appConfig/configMaps
        - /spec/application/extraFiles
  {{- $domain := $.Values.deployer.domain | default "apps.cluster.example.com" }}
  {{- $hubDomain := $.Values.clusters.hub.domain | default $domain }}
  {{- $eastDomain := $.Values.clusters.east.domain | default "" }}
  {{- $westDomain := $.Values.clusters.west.domain | default "" }}
  source:
    {{- if .chart }}
    repoURL: {{ .repoURL }}
    chart: {{ .chart }}
    targetRevision: {{ .targetRevision }}
    {{- else }}
    repoURL: {{ $.Values.gitops.repoUrl }}
    targetRevision: {{ $.Values.gitops.revision }}
    path: {{ $.Values.gitops.basePath | default "." }}/components/{{ .path }}
    {{- end }}
    {{- if eq .id "gitea-chart" }}
    helm:
      valuesObject:
        global:
          compatibility:
            openshift:
              adaptSecurityContext: force
        gitea:
          admin:
            username: gitea_admin
            password: openshift
            email: admin@gitea.local
        postgresql-ha:
          enabled: false
        postgresql:
          enabled: true
        redis-cluster:
          enabled: false
        redis:
          enabled: true
        persistence:
          enabled: true
          size: 10Gi
        service:
          http:
            type: ClusterIP
            port: 3000
    {{- else if eq .path "namespaces" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
        clusterRole: hub
    {{- else if eq .path "operators" }}
    helm:
      valuesObject:
        channel: {{ $.Values.connectivityLink.operators.channel | quote }}
        version: {{ $.Values.connectivityLink.operators.version | quote }}
        clusterRole: hub
        subscriptions: {{ $.Values.connectivityLink.operators.subscriptions | toJson }}
    {{- else if eq .path "gitea" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
    {{- else if eq .path "developer-hub" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
    {{- else if eq .path "acm-hub-spoke" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
        gitops:
          repoUrl: {{ $.Values.gitops.repoUrl | quote }}
          revision: {{ $.Values.gitops.revision | default "main" | quote }}
        clusters:
          east:
            domain: {{ $eastDomain | quote }}
          west:
            domain: {{ $westDomain | quote }}
        managedClusters:
          east:
            apiUrl: {{ $.Values.clusters.east.apiUrl | default "" | quote }}
            domain: {{ $eastDomain | quote }}
            token: {{ $.Values.clusters.east.token | default "" | quote }}
          west:
            apiUrl: {{ $.Values.clusters.west.apiUrl | default "" | quote }}
            domain: {{ $westDomain | quote }}
            token: {{ $.Values.clusters.west.token | default "" | quote }}
    {{- else if eq .path "hub-gateway" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
        clusters:
          east:
            domain: {{ $eastDomain | quote }}
          west:
            domain: {{ $westDomain | quote }}
    {{- else if eq .path "acs-operator" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
    {{- else if eq .path "acs-secured-cluster" }}
    helm:
      valuesObject:
        clusterName: hub
        clusterDomain: {{ $domain }}
        hubClusterDomain: {{ $hubDomain }}
        clusterRole: hub
    {{- else if eq .path "acm-operator" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
    {{- else if eq .path "grafana-dashboards" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
    {{- else if has .path (list "industrial-edge-tst" "industrial-edge-stormshift" "industrial-edge-data-lake" "industrial-edge-data-science-project" "industrial-edge-pipelines" "industrial-edge-minio" "industrial-edge-data-science-cluster") }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
        global:
          localClusterDomain: {{ $domain }}
          hubClusterDomain: {{ $hubDomain }}
    {{- else if eq .path "console-links" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
        hubClusterDomain: {{ $hubDomain }}
        clusterRole: hub
    {{- else if eq .path "kafka-console" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
    {{- else if eq .path "kubecost" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
        clusterName: hub
        role: primary
        clusterRole: hub
    {{- else if eq .path "servicemeshoperator3" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
        clusterRole: hub
        clusterName: Kubernetes
    {{- else if eq .path "kiali" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
        multiCluster:
          enabled: true
          automateTokens: true
          clusters:
            east:
              name: east
              apiUrl: {{ $.Values.clusters.east.apiUrl | default "" | quote }}
              caData: {{ $.Values.clusters.east.kialiCaData | default "" | quote }}
              kialiToken: {{ $.Values.clusters.east.kialiToken | default "" | quote }}
              kialiUrl: {{ printf "https://kiali-openshift-cluster-observability-operator.%s" ($.Values.clusters.east.domain | default $domain) | quote }}
            west:
              name: west
              apiUrl: {{ $.Values.clusters.west.apiUrl | default "" | quote }}
              caData: {{ $.Values.clusters.west.kialiCaData | default "" | quote }}
              kialiToken: {{ $.Values.clusters.west.kialiToken | default "" | quote }}
              kialiUrl: {{ printf "https://kiali-openshift-cluster-observability-operator.%s" ($.Values.clusters.west.domain | default $domain) | quote }}
    {{- else if has .path (list "opentelemetry" "rhcl-operator" "observability" "istio-monitoring" "service-interconnect" "mailpit") }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
    {{- end }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .destinationNamespace }}
  syncPolicy:
    automated:
      prune: {{ .prune }}
      selfHeal: {{ .selfHeal }}
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
      {{- if .skipDryRunOnMissingResource }}
      - SkipDryRunOnMissingResource=true
      {{- end }}
{{- end }}
{{- end }}
