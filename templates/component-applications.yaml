{{- range .Values.connectivityLink.apps }}
{{- if and . .enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ $.Release.Name }}-{{ .id }}
  namespace: {{ $.Values.argocd.namespace }}
  labels:
    app.kubernetes.io/part-of: platform-hub-spoke
  annotations:
    argocd.argoproj.io/sync-wave: {{ .syncWave | quote }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ $.Values.argocd.project }}
  ignoreDifferences:
    - kind: Service
      jsonPointers:
        - /spec/clusterIP
        - /spec/clusterIPs
        - /spec/ipFamilies
        - /spec/ipFamilyPolicy
        - /spec/internalTrafficPolicy
    - group: route.openshift.io
      kind: Route
      jsonPointers:
        - /spec/host
        - /spec/wildcardPolicy
        - /status
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/template/metadata/annotations
    - kind: Secret
      jsonPointers:
        - /data
    - kind: Secret
      name: kairos-ai-credentials
      namespace: kairos-system
      jsonPointers:
        - /data
        - /stringData
    - kind: Secret
      name: openshift-ai-maas-credentials
      namespace: maas-workshop
      jsonPointers:
        - /data
        - /stringData
    - kind: Secret
      name: kiali-remote-east
      namespace: openshift-cluster-observability-operator
      jsonPointers:
        - /data
        - /stringData
    - kind: Secret
      name: kiali-remote-west
      namespace: openshift-cluster-observability-operator
      jsonPointers:
        - /data
        - /stringData
    - kind: Namespace
      jsonPointers:
        - /metadata/annotations
    - group: networking.istio.io
      kind: "*"
      jsonPointers:
        - /spec
        - /metadata/annotations
    - group: gateway.networking.k8s.io
      kind: Gateway
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: sailoperator.io
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: operator.istio.io
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: kuadrant.io
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: skupper.io
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: kafka.strimzi.io
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: datasciencecluster.opendatahub.io
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: serving.kserve.io
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: camel.apache.org
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /status
    - kind: ConfigMap
      jsonPointers:
        - /metadata/annotations
    - group: platform.stackrox.io
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: operator.open-cluster-management.io
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: cluster.open-cluster-management.io
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /metadata/labels
        - /status
    - group: agent.open-cluster-management.io
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: broker.amq.io
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: operators.coreos.com
      kind: OperatorGroup
      jsonPointers:
        - /metadata/annotations
        - /metadata/labels
        - /spec
    - group: tekton.dev
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /metadata/labels
        - /spec/tasks
    - group: grafana.integreatly.org
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: operators.coreos.com
      kind: Subscription
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: skupper.io
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /status
    # RHDH operator may shrink spec.application.appConfig.configMaps / extraFiles after sync;
    # ignoring avoids flip-flop so Git keeps catalog + auth ConfigMaps and User entities load.
    - group: argoproj.io
      kind: ArgoCD
      jsonPointers:
        - /spec/resourceCustomizations
        - /metadata/annotations
        - /status
    - group: sailoperator.io
      kind: Istio
      jsonPointers:
        - /spec/profile
        - /metadata/annotations
        - /status
    - group: rhdh.redhat.com
      kind: Backstage
      jsonPointers:
        - /spec/application/appConfig/configMaps
        - /spec/application/extraFiles
    - group: quay.redhat.com
      kind: QuayRegistry
      jsonPointers:
        - /metadata/annotations
        - /status
    {{- if eq .path "namespaces" }}
    - kind: Namespace
      jsonPointers:
        - /metadata/labels/istio.io~1dataplane-mode
    {{- end }}
  {{- $domain := $.Values.deployer.domain | default "apps.cluster.example.com" }}
  {{- $hubDomain := $.Values.clusters.hub.domain | default $domain }}
  {{- $eastDomain := $.Values.clusters.east.domain | default "" }}
  {{- $westDomain := $.Values.clusters.west.domain | default "" }}
  source:
    {{- if .chart }}
    repoURL: {{ .repoURL }}
    chart: {{ .chart }}
    targetRevision: {{ .targetRevision }}
    {{- else }}
    repoURL: {{ $.Values.gitops.repoUrl }}
    targetRevision: {{ $.Values.gitops.revision }}
    path: {{ $.Values.gitops.basePath | default "." }}/components/{{ .path }}
    {{- end }}
    {{- if eq .id "gitea-chart" }}
    helm:
      valuesObject:
        global:
          compatibility:
            openshift:
              adaptSecurityContext: force
        gitea:
          admin:
            username: gitea_admin
            password: openshift
            email: admin@gitea.local
        postgresql-ha:
          enabled: false
        postgresql:
          enabled: true
        redis-cluster:
          enabled: false
        redis:
          enabled: true
        persistence:
          enabled: true
          size: 10Gi
        service:
          http:
            type: ClusterIP
            port: 3000
    {{- else if eq .path "namespaces" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
        clusterRole: hub
    {{- else if eq .path "operators" }}
    helm:
      valuesObject:
        channel: {{ $.Values.connectivityLink.operators.channel | quote }}
        version: {{ $.Values.connectivityLink.operators.version | quote }}
        clusterRole: hub
        subscriptions: {{ $.Values.connectivityLink.operators.subscriptions | toJson }}
    {{- else if eq .path "gitea" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
        userCount: {{ $.Values.userCount | default 50 }}
    {{- else if eq .path "platform-users" }}
    helm:
      valuesObject:
        userCount: {{ $.Values.userCount | default 50 }}
        defaultPassword: {{ $.Values.defaultPassword | default "Welcome123!" | quote }}
        grantClusterReader: true
    {{- else if eq .path "kairos" }}
    helm:
      valuesObject:
        clusterRole: hub
        clusterName: hub
        clusterDomain: {{ $domain }}
        aiCredentials: {{ $.Values.kairos.aiCredentials | default dict | toJson }}
        aiModel: {{ $.Values.kairos.aiModel | default dict | toJson }}
        console:
          enabled: true
        clusterAgent:
          enabled: true
          hubReporting:
            enabled: false
        sensorScanPolicies:
          enabled: true
          displayOnHub: true
    {{- else if eq .path "developer-hub" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
        dynamicPluginsStorage: 10Gi
        userCount: {{ $.Values.userCount | default 50 }}
        defaultPassword: {{ $.Values.defaultPassword | default "Welcome123!" | quote }}
        aiModel:
          apiURL: {{ if $.Values.litemaas.enabled }}{{ printf "%s/chat/completions" (trimSuffix "/" ($.Values.litemaas.apiUrl | default "https://maas-rhdp.apps.maas.redhatworkshops.io/v1")) | quote }}{{ else }}{{ $.Values.kairos.aiModel.apiURL | quote }}{{ end }}
          model: {{ if $.Values.litemaas.enabled }}{{ $.Values.litemaas.model | default "llama-scout-17b" | quote }}{{ else }}{{ $.Values.kairos.aiModel.model | quote }}{{ end }}
        plugins:
          rbac:
            enabled: true
            policyAdminUser: platformadmin
          lightspeed:
            enabled: true
            aiModel:
              apiURL: {{ if $.Values.litemaas.enabled }}{{ printf "%s/chat/completions" (trimSuffix "/" ($.Values.litemaas.apiUrl | default "https://maas-rhdp.apps.maas.redhatworkshops.io/v1")) | quote }}{{ else }}{{ $.Values.kairos.aiModel.apiURL | quote }}{{ end }}
              model: {{ if $.Values.litemaas.enabled }}{{ $.Values.litemaas.model | default "llama-scout-17b" | quote }}{{ else }}{{ $.Values.kairos.aiModel.model | quote }}{{ end }}
              credentialsSecretName: {{ $.Values.kairos.aiCredentials.secretName | quote }}
              credentialsSecretNamespace: kairos-system
              credentialsSecretKey: {{ $.Values.kairos.aiCredentials.secretKey | quote }}
          techdocs:
            enabled: true
          kuadrant:
            enabled: true
          argocd:
            enabled: true
          kafka:
            enabled: false
          notificationsEmail:
            enabled: true
          techRadar:
            enabled: true
          mcp:
            enabled: true
        kubernetesSpokes:
          enabled: true
          east:
            apiUrl: {{ $.Values.clusters.east.apiUrl | default "" | quote }}
          west:
            apiUrl: {{ $.Values.clusters.west.apiUrl | default "" | quote }}
        spokeDomains:
          east: {{ $eastDomain | quote }}
          west: {{ $westDomain | quote }}
    {{- else if eq .path "acm-hub-spoke" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
        gitops:
          repoUrl: {{ $.Values.gitops.repoUrl | quote }}
          revision: {{ $.Values.gitops.revision | default "main" | quote }}
        clusters:
          east:
            domain: {{ $eastDomain | quote }}
          west:
            domain: {{ $westDomain | quote }}
        managedClusters:
          east:
            apiUrl: {{ $.Values.clusters.east.apiUrl | default "" | quote }}
            domain: {{ $eastDomain | quote }}
            token: {{ $.Values.clusters.east.token | default "" | quote }}
          west:
            apiUrl: {{ $.Values.clusters.west.apiUrl | default "" | quote }}
            domain: {{ $westDomain | quote }}
            token: {{ $.Values.clusters.west.token | default "" | quote }}
    {{- else if eq .path "hub-gateway" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
        clusters:
          east:
            domain: {{ $eastDomain | quote }}
          west:
            domain: {{ $westDomain | quote }}
    {{- else if eq .path "acs-operator" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
    {{- else if eq .path "acs-secured-cluster" }}
    helm:
      valuesObject:
        clusterName: hub
        clusterDomain: {{ $domain }}
        hubClusterDomain: {{ $hubDomain }}
        clusterRole: hub
    {{- else if eq .path "acs-init-bundle-sync" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
        initBundleSync:
          enabled: true
          clusters: "hub,east,west"
    {{- else if eq .path "acm-operator" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
    {{- else if eq .path "grafana-dashboards" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
    {{- else if has .path (list "industrial-edge-tst" "industrial-edge-stormshift" "industrial-edge-data-lake" "industrial-edge-data-science-project" "industrial-edge-pipelines" "industrial-edge-minio" "industrial-edge-data-science-cluster") }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
        global:
          localClusterDomain: {{ $domain }}
          hubClusterDomain: {{ $hubDomain }}
    {{- else if eq .path "console-links" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
        hubClusterDomain: {{ $hubDomain }}
        clusterRole: hub
    {{- else if eq .path "kafka-console" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
        apiRoute:
          enabled: true
        brokerDns:
          eastTst: {{ dig "spec" "clusterIP" "" (lookup "v1" "Service" "service-interconnect" "kafka-east-tst") | quote }}
          westTst: {{ dig "spec" "clusterIP" "" (lookup "v1" "Service" "service-interconnect" "kafka-west-tst") | quote }}
          eastStormshift: {{ dig "spec" "clusterIP" "" (lookup "v1" "Service" "service-interconnect" "kafka-east-stormshift") | quote }}
          westStormshift: {{ dig "spec" "clusterIP" "" (lookup "v1" "Service" "service-interconnect" "kafka-west-stormshift") | quote }}
          eastDatalake: {{ dig "spec" "clusterIP" "" (lookup "v1" "Service" "service-interconnect" "kafka-east-datalake") | quote }}
          westDatalake: {{ dig "spec" "clusterIP" "" (lookup "v1" "Service" "service-interconnect" "kafka-west-datalake") | quote }}
    {{- else if eq .path "kubecost" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
        clusterName: hub
        role: primary
        clusterRole: hub
        federatedETL:
          enabled: false
    {{- else if eq .path "servicemeshoperator3" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
        clusterRole: hub
        clusterName: Kubernetes
    {{- else if eq .path "kiali" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
        multiCluster:
          enabled: true
          automateTokens: true
          clusters:
            east:
              name: east
              apiUrl: {{ $.Values.clusters.east.apiUrl | default "" | quote }}
              caData: {{ $.Values.clusters.east.kialiCaData | default "" | quote }}
              kialiToken: {{ $.Values.clusters.east.kialiToken | default "" | quote }}
              kialiUrl: {{ printf "https://kiali-openshift-cluster-observability-operator.%s" ($.Values.clusters.east.domain | default $domain) | quote }}
            west:
              name: west
              apiUrl: {{ $.Values.clusters.west.apiUrl | default "" | quote }}
              caData: {{ $.Values.clusters.west.kialiCaData | default "" | quote }}
              kialiToken: {{ $.Values.clusters.west.kialiToken | default "" | quote }}
              kialiUrl: {{ printf "https://kiali-openshift-cluster-observability-operator.%s" ($.Values.clusters.west.domain | default $domain) | quote }}
    {{- else if eq .id "skupper-network-observer" }}
    helm:
      valuesObject:
        auth:
          strategy: none
        route:
          enabled: true
        tls:
          openshiftIssued: true
          skupperIssued: false
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
    {{- else if eq .path "openshift-ai-hub" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
        maas:
          endpoint: {{ $.Values.litemaas.apiUrl | default "https://maas-rhdp.apps.maas.redhatworkshops.io/v1" | trimSuffix "/v1" | quote }}
          apiKey: {{ $.Values.litemaas.apiKey | default "" | quote }}
          credentialsSecretName: openshift-ai-maas-credentials
          credentialsSecretKey: api-key
          models:
            - id: llama-scout-17b
              displayName: Llama Scout 17B (workshop default)
            - id: deepseek-r1-distill-qwen-14b
              displayName: DeepSeek R1 Distill Qwen 14B
            - id: codellama-7b-instruct
              displayName: CodeLlama 7B Instruct
    {{- else if eq .path "workshop-registration" }}
    helm:
      valuesObject:
        deployer:
          domain: {{ $domain }}
        clusters:
          east:
            domain: {{ $eastDomain | quote }}
          west:
            domain: {{ $westDomain | quote }}
        registration:
          maxUsers: {{ $.Values.userCount | default 50 }}
        showroom:
          url: {{ printf "https://showroom-showroom.%s" $domain | quote }}
        keycloak:
          adminPassword: {{ $.Values.defaultPassword | default "Welcome123!" | quote }}
    {{- else if eq .path "showroom" }}
    helm:
      valuesObject:
        deployer:
          domain: {{ $domain }}
        clusters:
          hub:
            domain: {{ $hubDomain | quote }}
            apiUrl: {{ $.Values.clusters.hub.apiUrl | default "" | quote }}
          east:
            domain: {{ $eastDomain | quote }}
            apiUrl: {{ $.Values.clusters.east.apiUrl | default "" | quote }}
          west:
            domain: {{ $westDomain | quote }}
            apiUrl: {{ $.Values.clusters.west.apiUrl | default "" | quote }}
        registration:
          url: {{ printf "https://workshop-registration.%s" $domain | quote }}
        demo:
          namespace: industrial-edge-tst-all
          appName: line-dashboard
    {{- else if eq .path "workshop-demos" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
        hubClusterDomain: {{ $hubDomain | quote }}
        eastClusterDomain: {{ $eastDomain | quote }}
        gitea:
          url: {{ printf "https://gitea-gitea.%s" $domain | quote }}
    {{- else if eq .path "workshop-kuadrant-apis" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
        gateway:
          hostname: {{ printf "workshop-apis.%s" $domain | quote }}
        apis:
          maas:
            apiKey: {{ $.Values.litemaas.apiKey | default "" | quote }}
    {{- else if eq .path "neuroface" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
        neuroface:
          route:
            host: {{ printf "neuroface.%s" $domain | quote }}
          chat:
            enabled: true
            modelEndpoint: {{ $.Values.litemaas.apiUrl | default "https://maas-rhdp.apps.maas.redhatworkshops.io/v1" | quote }}
            modelName: {{ $.Values.litemaas.model | default "llama-scout-17b" | quote }}
            apiKey: {{ $.Values.litemaas.apiKey | default "" | quote }}
          ovms:
            modelmesh:
              enabled: true
          litellm:
            enabled: false
    {{- else if eq .path "cnv-example" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
        vm:
          enabled: true
          name: workshop-cnv-demo
          namespace: cnv-workshop
          username: cirros
          password: {{ $.Values.defaultPassword | default "Welcome123!" | quote }}
    {{- else if has .path (list "opentelemetry" "rhcl-operator" "observability" "istio-monitoring" "service-interconnect" "mailpit" "mailpit-templates" "quay-registry") }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
    {{- end }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .destinationNamespace }}
  syncPolicy:
    automated:
      prune: {{ .prune }}
      selfHeal: {{ .selfHeal }}
    syncOptions:
      - CreateNamespace=true
      {{- if ne .path "kairos" }}
      - ServerSideApply=true
      {{- end }}
      - RespectIgnoreDifferences=true
      {{- if .skipDryRunOnMissingResource }}
      - SkipDryRunOnMissingResource=true
      {{- end }}
{{- end }}
{{- end }}
