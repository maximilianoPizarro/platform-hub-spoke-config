# One-off repair: regenerate openshift-config/htpasswd-users with bcrypt hashes.
# Apply on each cluster (hub, east, west) as cluster-admin:
#   oc apply -f scripts/fix-htpasswd-users-secret-job.yaml
#   oc wait --for=condition=complete job/htpasswd-users-secret-fix -n openshift-gitops --timeout=3m
#   oc logs job/htpasswd-users-secret-fix -n openshift-gitops --all-containers
#   oc delete job/htpasswd-users-secret-fix -n openshift-gitops
# Requires ServiceAccount platform-users-setup (from platform-users Helm chart).
apiVersion: batch/v1
kind: Job
metadata:
  name: htpasswd-users-secret-fix
  namespace: openshift-gitops
spec:
  backoffLimit: 2
  template:
    spec:
      serviceAccountName: platform-users-setup
      restartPolicy: Never
      volumes:
        - name: htpasswd-data
          emptyDir: {}
      initContainers:
        - name: generate-htpasswd
          image: registry.access.redhat.com/ubi9/httpd-24:latest
          env:
            - name: USER_COUNT
              value: "50"
            - name: DEFAULT_PASSWORD
              value: "Welcome123!"
          command:
            - /bin/bash
            - -ec
            - |
              set -euo pipefail
              F=/data/htpasswd
              rm -f "$F"
              htpasswd -c -B -b "$F" platformadmin "$DEFAULT_PASSWORD"
              for i in $(seq 1 "$USER_COUNT"); do
                htpasswd -B -b "$F" "user${i}" "$DEFAULT_PASSWORD"
              done
              head -1 "$F"
              wc -l "$F"
          volumeMounts:
            - name: htpasswd-data
              mountPath: /data
      containers:
        - name: apply-secret
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -ec
            - |
              set -euo pipefail
              test -s /data/htpasswd
              head -1 /data/htpasswd
              oc create secret generic htpasswd-users \
                --from-file=htpasswd=/data/htpasswd \
                -n openshift-config --dry-run=client -o yaml | oc apply -f -
              echo "htpasswd-users secret updated"
          volumeMounts:
            - name: htpasswd-data
              mountPath: /data
