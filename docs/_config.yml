remote_theme: just-the-docs/just-the-docs

plugins:
  - jekyll-remote-theme

title: "Platform Hub-Spoke Config"
description: "Multi-cluster GitOps platform with ACM, Connectivity Link, and Industrial Edge on Red Hat OpenShift"
url: "https://maximilianopizarro.github.io"
baseurl: "/platform-hub-spoke-config"

color_scheme: dark

logo: "/platform-hub-spoke-config/assets/images/rh-logo.svg"

aux_links:
  "GitHub":
    - "https://github.com/maximilianoPizarro/platform-hub-spoke-config"
  "Red Hat Docs":
    - "https://docs.redhat.com"

aux_links_new_tab: true

nav_enabled: true
search_enabled: true
heading_anchors: true
back_to_top: true
back_to_top_text: "Back to top"

footer_content: '<img src="/platform-hub-spoke-config/assets/images/rh-logo.svg" alt="Red Hat" style="height:20px;vertical-align:middle;margin-right:8px;">Platform Hub-Spoke GitOps &mdash; Autor: <a href="https://maximilianopizarro.github.io" target="_blank" style="color:#73BCF7;">Maximiliano Pizarro</a>'

mermaid:
  version: "10.9.0"

exclude:
  - Gemfile
  - Gemfile.lock
