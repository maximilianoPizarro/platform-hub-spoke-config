apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: ${{ values.uniqueName }}
  title: ${{ values.name }} API
  description: Industrial Edge API exposed via Kuadrant APIProduct
  annotations:
    kuadrant.io/api-product: ${{ values.uniqueName }}
    backstage.io/source-location: url:https://gitea-gitea.${{ values.clusterDomain }}/ws-${{ values.owner }}/${{ values.name }}-api
spec:
  type: openapi
  lifecycle: experimental
  owner: ${{ values.owner }}
  system: industrial-edge
  definition:
    $text: ${{ values.openApiUrl }}
