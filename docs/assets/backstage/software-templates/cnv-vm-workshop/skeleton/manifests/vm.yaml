apiVersion: v1
kind: Namespace
metadata:
  name: ${{ values.name }}
  labels:
    pod-security.kubernetes.io/enforce: privileged
---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: ${{ values.name }}
  namespace: ${{ values.name }}
spec:
  running: true
  template:
    metadata:
      labels:
        kubevirt.io/vm: ${{ values.name }}
    spec:
      domain:
        devices:
          disks:
            - name: rootdisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
        resources:
          requests:
            memory: 512Mi
            cpu: 1
      networks:
        - name: default
          pod: {}
      volumes:
        - name: rootdisk
          containerDisk:
            image: quay.io/kubevirt/cirros-container-disk-demo:latest
