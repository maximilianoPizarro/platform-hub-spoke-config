apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: industrial-edge
  title: "Industrial Edge: IoT Manufacturing (Multi-Cluster)"
  description: >
    Deploy an Industrial Edge IoT stack on a selected spoke (east/west).
    Runs under OSSM3 ambient mesh with ztunnel L4 metrics and Prometheus scraping.
  tags:
    - iot
    - kafka
    - edge
    - industrial-edge
    - multi-cluster
spec:
  owner: platform-engineering
  type: service
  parameters:
    - title: Edge Instance Configuration
      required:
        - name
        - owner
        - targetCluster
        - environment
        - clusterDomain
      properties:
        name:
          title: Instance Name
          type: string
          default: edge-factory-1
          pattern: "^[a-z0-9-]+$"
          ui:autofocus: true
        owner:
          title: Owner
          type: string
          ui:field: OwnerPicker
          ui:options:
            allowedKinds:
              - User
        targetCluster:
          title: Target Cluster
          type: string
          enum: [east, west]
          enumNames: [East spoke, West spoke]
          default: east
        sensorCount:
          title: Machine Sensors
          type: integer
          default: 2
          enum: [1, 2]
        environment:
          title: Environment (Kairos scan policy tier)
          type: string
          enum: [dev, qa, prod]
          enumNames: [Development (-dev), QA (-qa), Production (-prod)]
          default: dev
          description: Namespace suffix for Kairos agents and scan policies (e.g. ie-factory-east-dev).
        clusterDomain:
          title: Hub cluster apps domain
          type: string
          description: "Hub RHDP apps domain for Gitea, Quay, Developer Hub (e.g. apps.cluster-r7964.dynamic2.redhatworkshops.io)"
          default: apps.cluster.example.com
      dependencies:
        targetCluster:
          oneOf:
            - properties:
                targetCluster:
                  const: east
                spokeAppsDomain:
                  title: East spoke apps domain
                  type: string
                  default: apps.cluster-east.example.com
                  description: "East spoke RHDP apps domain"
            - properties:
                targetCluster:
                  const: west
                spokeAppsDomain:
                  title: West spoke apps domain
                  type: string
                  default: apps.cluster-west.example.com
                  description: "West spoke RHDP apps domain"
  steps:
    - id: fetch-skeleton
      name: Generate Skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          environment: ${{ parameters.environment }}
          uniqueName: "${{ parameters.owner }}-${{ parameters.name }}-${{ parameters.environment }}"
          owner: ${{ parameters.owner }}
          namespace: "ie-${{ parameters.name }}-${{ parameters.targetCluster }}-${{ parameters.environment }}"
          targetCluster: ${{ parameters.targetCluster }}
          sensorCount: ${{ parameters.sensorCount }}
          clusterDomain: ${{ parameters.clusterDomain }}
          spokeAppsDomain: ${{ parameters.spokeAppsDomain }}
    - id: publish
      name: Publish to Gitea
      action: publish:github
      input:
        repoUrl: "gitea-gitea.${{ parameters.clusterDomain }}?owner=ws-${{ parameters.owner }}&repo=${{ parameters.name }}-${{ parameters.targetCluster }}-${{ parameters.environment }}"
        description: "Industrial Edge ${{ parameters.name }} (${{ parameters.environment }}) on ${{ parameters.targetCluster }}"
        defaultBranch: main
        repoVisibility: public
    - id: register
      name: Register in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml
    - id: create-argocd-app
      name: Create ArgoCD Application
      action: http:backstage:request
      input:
        method: POST
        path: /api/proxy/k8s-api/apis/argoproj.io/v1alpha1/namespaces/openshift-gitops/applications
        headers:
          Content-Type: application/json
        body:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: "gen-${{ parameters.owner }}-${{ parameters.name }}-${{ parameters.targetCluster }}-${{ parameters.environment }}"
            namespace: openshift-gitops
          spec:
            project: default
            source:
              repoURL: "https://gitea-gitea.${{ parameters.clusterDomain }}/ws-${{ parameters.owner }}/${{ parameters.name }}-${{ parameters.targetCluster }}-${{ parameters.environment }}"
              targetRevision: main
              path: manifests
            destination:
              name: ${{ parameters.targetCluster }}
              namespace: "ie-${{ parameters.name }}-${{ parameters.targetCluster }}"
            syncPolicy:
              automated:
                selfHeal: true
                prune: true
              syncOptions:
                - CreateNamespace=true
    - id: create-gitea-webhook
      name: Create Gitea Webhook
      action: http:backstage:request
      input:
        method: POST
        path: /api/proxy/gitea/repos/ws-${{ parameters.owner }}/${{ parameters.name }}-${{ parameters.targetCluster }}-${{ parameters.environment }}/hooks
        headers:
          Content-Type: application/json
        body:
          type: gitea
          active: true
          config:
            content_type: json
            url: https://developer-hub.${{ parameters.clusterDomain }}/api/events/gitea
          events:
            - push
      continueOnError: true
    - id: notify
      name: Notify Owner
      action: http:backstage:request
      input:
        method: POST
        path: /api/notifications
        headers:
          Content-Type: application/json
        body:
          recipients:
            type: entity
            entityRef: "user:default/${{ parameters.owner }}"
          payload:
            title: "Industrial Edge '${{ parameters.name }}' (${{ parameters.environment }}) on ${{ parameters.targetCluster }}"
            description: "Your IoT edge instance is deploying via ArgoCD."
            link: ${{ steps['register'].output.entityRef }}
            severity: normal
  output:
    links:
      - title: Repository
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: View in Catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
      - title: Open in DevSpaces
        icon: chat
        url: "https://devspaces.${{ parameters.spokeAppsDomain }}/#https://gitea-gitea.${{ parameters.clusterDomain }}/ws-${{ parameters.owner }}/${{ parameters.name }}-${{ parameters.targetCluster }}-${{ parameters.environment }}"
