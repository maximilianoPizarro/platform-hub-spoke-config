apiVersion: v1
kind: ServiceAccount
metadata:
  name: pipeline
  annotations:
    argocd.argoproj.io/sync-wave: "1"
imagePullSecrets:
  - name: quay-workshop-push
secrets:
  - name: quay-workshop-push
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: quay-workshop-push-sync
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: quay-workshop-push-sync
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: quay-workshop-push-sync
subjects:
  - kind: ServiceAccount
    name: pipeline
    namespace: ${{ values.namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: sync-quay-workshop-push
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "2"
spec:
  template:
    spec:
      serviceAccountName: pipeline
      restartPolicy: OnFailure
      containers:
        - name: sync
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -ec
            - |
              set -euo pipefail
              if oc get secret quay-workshop-push -n "${NAMESPACE}" &>/dev/null; then
                echo "quay-workshop-push already exists in ${NAMESPACE}"
                exit 0
              fi
              if ! oc get secret quay-workshop-push -n openshift-gitops &>/dev/null; then
                echo "Source secret not in openshift-gitops yet — run hub quay-org-setup first"
                exit 1
              fi
              oc get secret quay-workshop-push -n openshift-gitops -o yaml | \
                sed "s/namespace: openshift-gitops/namespace: ${NAMESPACE}/" | \
                grep -v '^\s*uid:\|^\s*resourceVersion:\|^\s*creationTimestamp:' | \
                oc apply -n "${NAMESPACE}" -f -
              echo "Copied quay-workshop-push into ${NAMESPACE}"
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
