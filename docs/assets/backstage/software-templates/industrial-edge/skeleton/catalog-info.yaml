apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{ values.uniqueName }}
  title: Industrial Edge ${{ values.name }} (${{ values.targetCluster }})
  description: IoT edge instance on spoke ${{ values.targetCluster }}
  annotations:
    backstage.io/kubernetes-id: ${{ values.uniqueName }}
    backstage.io/kubernetes-namespace: ${{ values.namespace }}
  tags:
    - industrial-edge
    - iot
    - ${{ values.targetCluster }}
spec:
  type: service
  lifecycle: experimental
  owner: ${{ values.owner }}
