<link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">
<link rel="icon" href="https://www.redhat.com/favicon.ico" type="image/x-icon">
<script defer>
document.addEventListener('DOMContentLoaded', function() {
  var headings = document.querySelectorAll('.main-content h2, .main-content h3');
  if (headings.length < 2) return;

  var wrap = document.querySelector('.main-content-wrap');
  var content = document.querySelector('.main-content');
  if (!wrap || !content) return;

  var toc = document.createElement('nav');
  toc.className = 'site-nav-toc';
  toc.setAttribute('aria-label', 'On this page');

  var title = document.createElement('strong');
  title.textContent = 'On this page';
  title.style.display = 'block';
  title.style.marginBottom = '0.5rem';
  title.style.color = '#fff';
  title.style.fontSize = '0.85rem';
  toc.appendChild(title);

  var list = document.createElement('ul');
  headings.forEach(function(h) {
    if (!h.id) return;
    var li = document.createElement('li');
    var a = document.createElement('a');
    a.href = '#' + h.id;
    a.textContent = h.textContent.replace(/^#\s*/, '');
    li.appendChild(a);
    if (h.tagName === 'H3') {
      var parentLi = list.lastElementChild;
      if (!parentLi) {
        list.appendChild(li);
        return;
      }
      var subList = parentLi.querySelector('ul') || document.createElement('ul');
      if (!subList.parentNode) parentLi.appendChild(subList);
      subList.appendChild(li);
    } else {
      list.appendChild(li);
    }
  });

  if (!list.children.length) return;

  toc.appendChild(list);
  wrap.classList.add('has-page-toc');
  content.insertAdjacentElement('afterend', toc);
});
</script>
