name: Helm Validate & ArgoCD Preflight

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: 'v3.15.0'
      - name: Lint hub chart (root)
        run: helm lint .
      - name: Lint east spoke chart
        run: helm lint east/
      - name: Lint west spoke chart
        run: helm lint west/
      - name: Lint all component charts
        run: |
          for chart in components/*/; do
            if [ -f "$chart/Chart.yaml" ]; then
              echo "Linting $chart..."
              helm lint "$chart" || true
            fi
          done

  helm-template:
    runs-on: ubuntu-latest
    needs: helm-lint
    strategy:
      matrix:
        profile:
          - name: hub
            path: "."
            values: values.yaml
            domain: apps.hub.example.com
            apiUrl: https://api.hub.example.com:6443
            hubDomain: apps.hub.example.com
          - name: east
            path: east
            values: east/values.yaml
            domain: apps.east.example.com
            apiUrl: https://api.east.example.com:6443
            hubDomain: apps.hub.example.com
          - name: west
            path: west
            values: west/values.yaml
            domain: apps.west.example.com
            apiUrl: https://api.west.example.com:6443
            hubDomain: apps.hub.example.com
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: 'v3.15.0'
      - name: Template ${{ matrix.profile.name }}
        run: |
          helm template test-release ${{ matrix.profile.path }} \
            -f ${{ matrix.profile.values }} \
            --set deployer.domain=${{ matrix.profile.domain }} \
            --set deployer.apiUrl=${{ matrix.profile.apiUrl }} \
            --set clusters.hub.domain=${{ matrix.profile.hubDomain }} \
            > /dev/null
          echo "Template ${{ matrix.profile.name }} rendered successfully"
      - name: Template vendored Camel Dashboard (OCP 4.20 kube 1.33)
        if: matrix.profile.name == 'east'
        run: |
          helm template test-camel components/camel-dashboard-openshift \
            --kube-version 1.33 \
            --namespace camel-dashboard > /dev/null
          echo "camel-dashboard-openshift vendored chart OK"

  yaml-validate:
    runs-on: ubuntu-latest
    needs: helm-template
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install yamllint
      - name: Validate YAML
        run: |
          yamllint -d relaxed values.yaml
          yamllint -d relaxed east/values.yaml
          yamllint -d relaxed west/values.yaml

  argocd-preflight:
    runs-on: ubuntu-latest
    needs: helm-template
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: 'v3.15.0'
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: ArgoCD preflight checks
        run: bash scripts/argocd-preflight.sh
