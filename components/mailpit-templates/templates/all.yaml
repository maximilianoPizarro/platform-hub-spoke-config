apiVersion: v1
kind: Namespace
metadata:
  name: mailpit-templates
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailpit-templates
  namespace: mailpit-templates
  labels:
    app: mailpit-templates
    app.kubernetes.io/part-of: mailpit-templates
    app.openshift.io/runtime: email
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailpit-templates
  template:
    metadata:
      labels:
        app: mailpit-templates
    spec:
      containers:
        - name: mailpit-templates
          image: docker.io/axllent/mailpit:v1.21
          ports:
            - containerPort: 8025
              name: http
              protocol: TCP
            - containerPort: 1025
              name: smtp
              protocol: TCP
          env:
            - name: MP_UI_BIND_ADDR
              value: "0.0.0.0:8025"
            - name: MP_SMTP_BIND_ADDR
              value: "0.0.0.0:1025"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /livez
              port: 8025
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8025
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mailpit-templates
  namespace: mailpit-templates
  labels:
    app: mailpit-templates
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  ports:
    - port: 8025
      targetPort: 8025
      protocol: TCP
      name: http
    - port: 1025
      targetPort: 1025
      protocol: TCP
      name: smtp
  selector:
    app: mailpit-templates
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: mailpit-templates
  namespace: mailpit-templates
  labels:
    app: mailpit-templates
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  host: mailpit-templates.{{ .Values.clusterDomain }}
  to:
    kind: Service
    name: mailpit-templates
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
