{{- $domain := .Values.clusterDomain -}}
{{- $hubDomain := .Values.hubClusterDomain | default $domain -}}
{{- $role := .Values.clusterRole | default "hub" -}}
{{- $icon := include "console-links.kairosIconURL" . -}}
---
apiVersion: console.openshift.io/v1
kind: ConsoleLink
metadata:
  name: platform-industrial-edge
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  applicationMenu:
    imageURL: {{ $icon | quote }}
    section: "Platform Hub-Spoke"
  href: "https://industrial-edge.{{ $hubDomain }}"
  location: ApplicationMenu
  text: "Industrial Edge"
---
apiVersion: console.openshift.io/v1
kind: ConsoleLink
metadata:
  name: platform-grafana
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  applicationMenu:
    imageURL: {{ $icon | quote }}
    section: "Platform Hub-Spoke"
  {{- if eq $role "hub" }}
  href: "https://grafana.{{ $hubDomain }}"
  {{- else }}
  href: "https://grafana.{{ $domain }}"
  {{- end }}
  location: ApplicationMenu
  text: "Grafana Dashboards"
---
