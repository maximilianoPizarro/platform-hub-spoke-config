apiVersion: v1
kind: Namespace
metadata:
  name: kafka-console
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: console.streamshub.github.com/v1alpha1
kind: Console
metadata:
  name: kafka-console
  namespace: kafka-console
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  hostname: kafka-console.{{ .Values.clusterDomain }}
  kafkaClusters:
    - name: dev-cluster-east
      listener: plain
      properties:
        bootstrap.servers: kafka-east-tst.service-interconnect.svc.cluster.local:9092
    - name: factory-cluster-east
      listener: plain
      properties:
        bootstrap.servers: kafka-east-stormshift.service-interconnect.svc.cluster.local:9092
    - name: dev-cluster-west
      listener: plain
      properties:
        bootstrap.servers: kafka-west-tst.service-interconnect.svc.cluster.local:9092
    - name: factory-cluster-west
      listener: plain
      properties:
        bootstrap.servers: kafka-west-stormshift.service-interconnect.svc.cluster.local:9092
