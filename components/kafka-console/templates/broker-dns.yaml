{{- /*
  Headless Services + EndpointSlices for Kafka broker DNS on the hub.
  Maps broker advertised hostnames to Skupper listener ClusterIPs.
  IPs are passed as values from the parent chart (no lookup required).
*/ -}}
apiVersion: v1
kind: Namespace
metadata:
  name: industrial-edge-tst-all
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: v1
kind: Namespace
metadata:
  name: industrial-edge-stormshift-messaging
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: v1
kind: Namespace
metadata:
  name: industrial-edge-data-lake
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: v1
kind: Service
metadata:
  name: dev-cluster-kafka-brokers
  namespace: industrial-edge-tst-all
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  clusterIP: None
  ports:
    - name: tcp
      port: 9092
      protocol: TCP
      targetPort: 9092
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: dev-cluster-kafka-brokers
  namespace: industrial-edge-tst-all
  labels:
    kubernetes.io/service-name: dev-cluster-kafka-brokers
  annotations:
    argocd.argoproj.io/sync-wave: "3"
addressType: IPv4
ports:
  - name: tcp
    port: 9092
    protocol: TCP
endpoints:
{{- if .Values.brokerDns.eastTstIP }}
  - addresses:
      - {{ .Values.brokerDns.eastTstIP | quote }}
    hostname: dev-cluster-broker-0-east
    conditions:
      ready: true
{{- end }}
{{- if .Values.brokerDns.westTstIP }}
  - addresses:
      - {{ .Values.brokerDns.westTstIP | quote }}
    hostname: dev-cluster-broker-0-west
    conditions:
      ready: true
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: factory-cluster-kafka-brokers
  namespace: industrial-edge-stormshift-messaging
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  clusterIP: None
  ports:
    - name: tcp
      port: 9092
      protocol: TCP
      targetPort: 9092
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: factory-cluster-kafka-brokers
  namespace: industrial-edge-stormshift-messaging
  labels:
    kubernetes.io/service-name: factory-cluster-kafka-brokers
  annotations:
    argocd.argoproj.io/sync-wave: "3"
addressType: IPv4
ports:
  - name: tcp
    port: 9092
    protocol: TCP
endpoints:
{{- if .Values.brokerDns.eastStormshiftIP }}
  - addresses:
      - {{ .Values.brokerDns.eastStormshiftIP | quote }}
    hostname: factory-cluster-broker-0-east
    conditions:
      ready: true
{{- end }}
{{- if .Values.brokerDns.westStormshiftIP }}
  - addresses:
      - {{ .Values.brokerDns.westStormshiftIP | quote }}
    hostname: factory-cluster-broker-0-west
    conditions:
      ready: true
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: prod-cluster-kafka-brokers
  namespace: industrial-edge-data-lake
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  clusterIP: None
  ports:
    - name: tcp
      port: 9092
      protocol: TCP
      targetPort: 9092
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: prod-cluster-kafka-brokers
  namespace: industrial-edge-data-lake
  labels:
    kubernetes.io/service-name: prod-cluster-kafka-brokers
  annotations:
    argocd.argoproj.io/sync-wave: "3"
addressType: IPv4
ports:
  - name: tcp
    port: 9092
    protocol: TCP
endpoints:
{{- if .Values.brokerDns.eastDatalakeIP }}
  - addresses:
      - {{ .Values.brokerDns.eastDatalakeIP | quote }}
    hostname: prod-cluster-broker-0-east
    conditions:
      ready: true
{{- end }}
{{- if .Values.brokerDns.westDatalakeIP }}
  - addresses:
      - {{ .Values.brokerDns.westDatalakeIP | quote }}
    hostname: prod-cluster-broker-0-west
    conditions:
      ready: true
{{- end }}
