{{- /*
  Headless Services + EndpointSlices (Argo CD excludes legacy Endpoints).
  Maps broker advertised hostnames to Skupper listener ClusterIPs on the hub.
  Creates the IE namespaces needed for Kafka broker DNS on the hub.
*/ -}}
apiVersion: v1
kind: Namespace
metadata:
  name: industrial-edge-tst-all
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: v1
kind: Namespace
metadata:
  name: industrial-edge-stormshift-messaging
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
{{- $skupperNs := "service-interconnect" }}
{{- $eastTst := lookup "v1" "Service" $skupperNs "kafka-east-tst" }}
{{- $westTst := lookup "v1" "Service" $skupperNs "kafka-west-tst" }}
{{- $eastStorm := lookup "v1" "Service" $skupperNs "kafka-east-stormshift" }}
{{- $westStorm := lookup "v1" "Service" $skupperNs "kafka-west-stormshift" }}
{{- $eastTstIP := "" }}
{{- $westTstIP := "" }}
{{- $eastStormIP := "" }}
{{- $westStormIP := "" }}
{{- if $eastTst }}
{{- if $eastTst.spec.clusterIP }}
{{- $eastTstIP = $eastTst.spec.clusterIP }}
{{- else if $eastTst.spec.clusterIPs }}
{{- $eastTstIP = index $eastTst.spec.clusterIPs 0 }}
{{- end }}
{{- end }}
{{- if $westTst }}
{{- if $westTst.spec.clusterIP }}
{{- $westTstIP = $westTst.spec.clusterIP }}
{{- else if $westTst.spec.clusterIPs }}
{{- $westTstIP = index $westTst.spec.clusterIPs 0 }}
{{- end }}
{{- end }}
{{- if $eastStorm }}
{{- if $eastStorm.spec.clusterIP }}
{{- $eastStormIP = $eastStorm.spec.clusterIP }}
{{- else if $eastStorm.spec.clusterIPs }}
{{- $eastStormIP = index $eastStorm.spec.clusterIPs 0 }}
{{- end }}
{{- end }}
{{- if $westStorm }}
{{- if $westStorm.spec.clusterIP }}
{{- $westStormIP = $westStorm.spec.clusterIP }}
{{- else if $westStorm.spec.clusterIPs }}
{{- $westStormIP = index $westStorm.spec.clusterIPs 0 }}
{{- end }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: dev-cluster-kafka-brokers
  namespace: industrial-edge-tst-all
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  clusterIP: None
  ports:
    - name: tcp
      port: 9092
      protocol: TCP
      targetPort: 9092
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: dev-cluster-kafka-brokers
  namespace: industrial-edge-tst-all
  labels:
    kubernetes.io/service-name: dev-cluster-kafka-brokers
  annotations:
    argocd.argoproj.io/sync-wave: "3"
addressType: IPv4
ports:
  - name: tcp
    port: 9092
    protocol: TCP
endpoints:
{{- if $eastTstIP }}
  - addresses:
      - {{ $eastTstIP | quote }}
    hostname: dev-cluster-broker-0-east
    conditions:
      ready: true
{{- end }}
{{- if $westTstIP }}
  - addresses:
      - {{ $westTstIP | quote }}
    hostname: dev-cluster-broker-0-west
    conditions:
      ready: true
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: factory-cluster-kafka-brokers
  namespace: industrial-edge-stormshift-messaging
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  clusterIP: None
  ports:
    - name: tcp
      port: 9092
      protocol: TCP
      targetPort: 9092
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: factory-cluster-kafka-brokers
  namespace: industrial-edge-stormshift-messaging
  labels:
    kubernetes.io/service-name: factory-cluster-kafka-brokers
  annotations:
    argocd.argoproj.io/sync-wave: "3"
addressType: IPv4
ports:
  - name: tcp
    port: 9092
    protocol: TCP
endpoints:
{{- if $eastStormIP }}
  - addresses:
      - {{ $eastStormIP | quote }}
    hostname: factory-cluster-broker-0-east
    conditions:
      ready: true
{{- end }}
{{- if $westStormIP }}
  - addresses:
      - {{ $westStormIP | quote }}
    hostname: factory-cluster-broker-0-west
    conditions:
      ready: true
{{- end }}
