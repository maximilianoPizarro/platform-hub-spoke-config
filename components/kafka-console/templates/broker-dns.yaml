{{- /*
  Headless Services + EndpointSlices (Argo CD excludes legacy Endpoints).
  Maps broker advertised hostnames to Skupper listener ClusterIPs on the hub.
*/ -}}
{{- $skupperNs := "service-interconnect" }}
{{- $eastTst := lookup "v1" "Service" $skupperNs "kafka-east-tst" }}
{{- $westTst := lookup "v1" "Service" $skupperNs "kafka-west-tst" }}
{{- $eastStorm := lookup "v1" "Service" $skupperNs "kafka-east-stormshift" }}
{{- $westStorm := lookup "v1" "Service" $skupperNs "kafka-west-stormshift" }}
{{- $ip := "" }}
---
apiVersion: v1
kind: Service
metadata:
  name: dev-cluster-kafka-brokers
  namespace: industrial-edge-tst-all
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  clusterIP: None
  ports:
    - name: tcp
      port: 9092
      protocol: TCP
      targetPort: 9092
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: dev-cluster-kafka-brokers
  namespace: industrial-edge-tst-all
  labels:
    kubernetes.io/service-name: dev-cluster-kafka-brokers
  annotations:
    argocd.argoproj.io/sync-wave: "3"
addressType: IPv4
ports:
  - name: tcp
    port: 9092
    protocol: TCP
endpoints:
{{- if $eastTst }}
{{- $ip = "" }}
{{- if $eastTst.spec.clusterIP }}
{{- $ip = $eastTst.spec.clusterIP }}
{{- else if $eastTst.spec.clusterIPs }}
{{- $ip = index $eastTst.spec.clusterIPs 0 }}
{{- end }}
{{- if $ip }}
  - addresses:
      - {{ $ip | quote }}
    hostname: dev-cluster-broker-0-east
    conditions:
      ready: true
{{- end }}
{{- end }}
{{- if $westTst }}
{{- $ip = "" }}
{{- if $westTst.spec.clusterIP }}
{{- $ip = $westTst.spec.clusterIP }}
{{- else if $westTst.spec.clusterIPs }}
{{- $ip = index $westTst.spec.clusterIPs 0 }}
{{- end }}
{{- if $ip }}
  - addresses:
      - {{ $ip | quote }}
    hostname: dev-cluster-broker-0-west
    conditions:
      ready: true
{{- end }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: factory-cluster-kafka-brokers
  namespace: industrial-edge-stormshift-messaging
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  clusterIP: None
  ports:
    - name: tcp
      port: 9092
      protocol: TCP
      targetPort: 9092
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: factory-cluster-kafka-brokers
  namespace: industrial-edge-stormshift-messaging
  labels:
    kubernetes.io/service-name: factory-cluster-kafka-brokers
  annotations:
    argocd.argoproj.io/sync-wave: "3"
addressType: IPv4
ports:
  - name: tcp
    port: 9092
    protocol: TCP
endpoints:
{{- if $eastStorm }}
{{- $ip = "" }}
{{- if $eastStorm.spec.clusterIP }}
{{- $ip = $eastStorm.spec.clusterIP }}
{{- else if $eastStorm.spec.clusterIPs }}
{{- $ip = index $eastStorm.spec.clusterIPs 0 }}
{{- end }}
{{- if $ip }}
  - addresses:
      - {{ $ip | quote }}
    hostname: factory-cluster-broker-0-east
    conditions:
      ready: true
{{- end }}
{{- end }}
{{- if $westStorm }}
{{- $ip = "" }}
{{- if $westStorm.spec.clusterIP }}
{{- $ip = $westStorm.spec.clusterIP }}
{{- else if $westStorm.spec.clusterIPs }}
{{- $ip = index $westStorm.spec.clusterIPs 0 }}
{{- end }}
{{- if $ip }}
  - addresses:
      - {{ $ip | quote }}
    hostname: factory-cluster-broker-0-west
    conditions:
      ready: true
{{- end }}
{{- end }}
