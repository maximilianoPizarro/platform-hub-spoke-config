    backstage.io/kubernetes-namespace: industrial-edge-tst-all
    backstage.io/kubernetes-cluster: east
    backstage.io/kubernetes-id: machine-sensor
    backstage.io/kubernetes-label-selector: app=machine-sensor
    argocd/app-name: field-content-industrial-edge-tst
