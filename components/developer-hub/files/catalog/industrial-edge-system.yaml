apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: industrial-edge
  title: Industrial Edge (Multi-Cluster)
  description: >
    IoT manufacturing platform across hub and east/west spokes — MQTT sensors,
    Kafka streaming, Camel integrations, ML anomaly detection, and centralized data lake.
  annotations:
    backstage.io/techdocs-ref: dir:.
    grafana/dashboard-selector: industrial-edge
  tags:
    - industrial-edge
    - multi-cluster
    - iot
spec:
  owner: platform-engineering
  domain: hub-platform
---
apiVersion: backstage.io/v1alpha1
kind: Domain
metadata:
  name: hub-platform
  title: Hub Platform
  description: Centralized services on the ACM hub cluster
spec:
  owner: platform-engineering
---
apiVersion: backstage.io/v1alpha1
kind: Domain
metadata:
  name: spoke-east
  title: East Spoke
  description: Industrial Edge workloads on the east managed cluster
spec:
  owner: platform-engineering
---
apiVersion: backstage.io/v1alpha1
kind: Domain
metadata:
  name: spoke-west
  title: West Spoke
  description: Industrial Edge workloads on the west managed cluster
spec:
  owner: platform-engineering
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: mqtt-sensor-api
  title: MQTT Sensor Topics
  description: Machine sensor telemetry over MQTT (AMQ Broker)
  tags:
    - mqtt
    - iot
spec:
  type: asyncapi
  lifecycle: production
  owner: platform-engineering
  system: industrial-edge
  definition: |
    asyncapi: 2.6.0
    info:
      title: MQTT Sensor API
      version: 1.0.0
    channels:
      iot-sensor/sw/temperature:
        publish:
          message:
            payload:
              type: object
      iot-sensor/sw/vibration:
        publish:
          message:
            payload:
              type: object
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: kafka-iot-topics-api
  title: Kafka IoT Topics
  description: Temperature and vibration streams on dev-cluster / prod-cluster
  tags:
    - kafka
  links:
    - url: https://kafka-console.__HUB_APPS_DOMAIN__
      title: Kafka Console (hub)
      icon: dashboard
spec:
  type: asyncapi
  lifecycle: production
  owner: platform-engineering
  system: industrial-edge
  definition: |
    asyncapi: 2.6.0
    info:
      title: Kafka IoT Topics
      version: 1.0.0
    channels:
      temperature:
        description: Sensor temperature readings
      vibration:
        description: Sensor vibration readings
      industrial-edge-archive:
        description: Archived telemetry in data lake
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: s3-data-lake-api
  title: MinIO S3 Data Lake
  description: Object storage for Kubecost ETL and IE archives (hub-centralized)
spec:
  type: openapi
  lifecycle: production
  owner: platform-engineering
  system: industrial-edge
  definition: |
    openapi: 3.0.0
    info:
      title: MinIO S3 API
      version: 1.0.0
    servers:
      - url: http://minio-hub.service-interconnect.svc:9000
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: hub-gateway
  title: Hub Gateway (F5 / Istio)
  description: Multi-cluster entry point for Industrial Edge dashboards
  annotations:
    backstage.io/kubernetes-namespace: hub-gateway-system
    backstage.io/kubernetes-cluster: hub
    backstage.io/kubernetes-id: hub-gateway
    argocd/app-name: field-content-hub-gateway
  links:
    - url: https://industrial-edge.__HUB_APPS_DOMAIN__
      title: Industrial Edge UI
      icon: web
spec:
  type: service
  lifecycle: production
  owner: platform-engineering
  system: industrial-edge
  domain: hub-platform
---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: minio-storage
  title: MinIO (Hub)
  description: Centralized S3-compatible storage for ML models, Kubecost ETL, and data lake archives
  annotations:
    backstage.io/kubernetes-namespace: industrial-edge-ml-workspace
    backstage.io/kubernetes-cluster: hub
    backstage.io/kubernetes-id: minio
    argocd/app-name: field-content-industrial-edge-minio
  links:
    - url: https://minio-console-industrial-edge-ml-workspace.__HUB_APPS_DOMAIN__
      title: MinIO Console
      icon: storage
spec:
  type: s3-bucket
  lifecycle: production
  owner: platform-engineering
  system: industrial-edge
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: kafka-console
  title: Kafka Console
  description: StreamsHub UI for prod/dev Kafka clusters across hub and spokes
  annotations:
    backstage.io/kubernetes-namespace: kafka-console
    backstage.io/kubernetes-cluster: hub
    backstage.io/kubernetes-id: kafka-console
    argocd/app-name: field-content-kafka-console
    kafka.apache.org/consumer-groups: kafka-console
  links:
    - url: https://kafka-console.__HUB_APPS_DOMAIN__
      title: Kafka Console
      icon: catalog
spec:
  type: service
  lifecycle: production
  owner: platform-engineering
  system: industrial-edge
  domain: hub-platform
  consumesApis:
    - kafka-iot-topics-api
---
apiVersion: backstage.io/v1alpha1
