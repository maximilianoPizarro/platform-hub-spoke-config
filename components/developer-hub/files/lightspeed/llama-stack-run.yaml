version: '2'
image_name: rhdh-lightspeed-granite
apis:
  - agents
  - inference
  - safety
  - scoring
  - telemetry
  - tool_runtime
  - vector_io
inference_store:
  db_path: .llama/distributions/ollama/inference_store.db
  type: sqlite
metadata_store:
  db_path: .llama/distributions/ollama/registry.db
  namespace: null
  type: sqlite
models:
  - model_id: sentence-transformers/all-mpnet-base-v2
    metadata:
      embedding_dimension: 768
      model_type: embedding
    provider_id: sentence-transformers
    provider_model_id: "/app-root/embeddings_model"
providers:
  agents:
    - config:
        persistence_store:
          db_path: .llama/distributions/ollama/agents_store.db
          namespace: null
          type: sqlite
        responses_store:
          db_path: .llama/distributions/ollama/responses_store.db
          type: sqlite
      provider_id: meta-reference
      provider_type: inline::meta-reference
  inference:
    - provider_id: vllm
      provider_type: remote::vllm
      config:
        url: ${env.VLLM_URL}
        api_token: ${env.VLLM_API_KEY}
        max_tokens: ${env.VLLM_MAX_TOKENS:=4096}
        tls_verify: ${env.VLLM_TLS_VERIFY:=false}
    - provider_id: sentence-transformers
      provider_type: inline::sentence-transformers
      config: {}
  safety:
    - provider_id: lightspeed_question_validity
      provider_type: inline::lightspeed_question_validity
      config:
        model_id: ${env.VALIDATION_PROVIDER:=vllm}/${env.VALIDATION_MODEL_NAME}
  scoring:
    - config: {}
      provider_id: basic
      provider_type: inline::basic
  telemetry:
    - config:
        service_name: lightspeed-stack-telemetry
        sinks: sqlite
        sqlite_db_path: .llama/distributions/ollama/trace_store.db
      provider_id: meta-reference
      provider_type: inline::meta-reference
  tool_runtime:
    - provider_id: rag-runtime
      provider_type: inline::rag-runtime
      config: {}
  vector_io:
    - config:
        kvstore:
          db_path: .llama/distributions/ollama/faiss_store.db
          namespace: null
          type: sqlite
      provider_id: faiss
      provider_type: inline::faiss
    - provider_id: rhdh-docs
      provider_type: inline::faiss
      config:
        kvstore:
          type: sqlite
          namespace:
          db_path: /rag-content/vector_db/rhdh_product_docs/1.9/faiss_store.db
scoring_fns: []
server:
  port: 8321
shields:
  - shield_id: lightspeed_question_validity-shield
    provider_id: lightspeed_question_validity
tool_groups:
  - provider_id: rag-runtime
    toolgroup_id: builtin::rag
    description: "RHDH product documentation search."
    vector_dbs:
      - embedding_dimension: 768
        embedding_model: sentence-transformers/all-mpnet-base-v2
        provider_id: rhdh-docs
        vector_db_id: rhdh-product-docs-1_9
  - provider_id: mcp-gateway
    provider_type: remote::mcp
    config:
      url: ${env.MCP_GATEWAY_URL:=http://mcp-gateway-istio.mcp-system.svc.cluster.local:8080/mcp}
      timeout: 120
