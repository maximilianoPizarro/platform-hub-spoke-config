clusterDomain: ""
userCount: 50
defaultPassword: "Welcome123!"
# OIDC client secret for developer-hub + Keycloak backstage realm (set via --set, never commit real values)
keycloakOidcClientSecret: ""
# Gitea personal access token for gitea_admin (create via Gitea UI or API, never commit real values)
giteaToken: ""
sessionSecret: ""
# Quay.io dockerconfigjson for pipeline push (set via --set, never commit credentials)
quayDockerConfigJson: ""
# Sync ManagedServiceAccount tokens from east/west into developer-hub-spoke-tokens Secret
spokeTokenSync:
  enabled: true
  clusters: "east,west"
  schedule: "0 */6 * * *"
  image: registry.redhat.io/ubi9/python-311:latest
# Enable after developer-hub-spoke-tokens Secret exists (PostSync job). URLs required; tokens from env.
kubernetesSpokes:
  enabled: true
  east:
    apiUrl: ""
  west:
    apiUrl: ""
# Dynamic plugins — disable if package missing in RHDH image (oc exec ... ls dynamic-plugins/dist)
plugins:
  rbac:
    enabled: true
    policyAdminUser: platformadmin
  techdocs:
    enabled: true
  quay:
    enabled: true
  acsSecurityInsights:
    # Package not in RHDH 1.9 dynamic-plugins/dist (enable when image includes it)
    enabled: false
  argocd:
    enabled: true
  kuadrant:
    enabled: true
  # Red Hat Developer Lightspeed (LCS + Llama Stack sidecars). Uses same vLLM as Kairos (granite-31-8b).
  lightspeed:
    enabled: true
    pluginTag: "bs_1.45.3__1.2.3"
    llamaStackImage: "quay.io/redhat-ai-dev/llama-stack:0.1.4"
    lightspeedCoreImage: "quay.io/lightspeed-core/lightspeed-stack:0.4.0"
    ragContentImage: "quay.io/redhat-ai-dev/rag-content:release-1.9-lcs"
    syncApiKeyFromKairos: true
    vllmTlsVerify: "false"
    vllmMaxTokens: "4096"
    # Filled from hub values.kairos via component-applications.yaml
    aiModel: {}
