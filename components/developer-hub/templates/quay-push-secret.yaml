{{- /*
  Quay.io push credentials for Tekton buildah pipelines.
  Set via: helm --set quayDockerConfigJson='{"auths":{"quay.io":{"auth":"..."}}}'
  Never commit real credentials to git.
*/ -}}
{{- if .Values.quayDockerConfigJson }}
apiVersion: v1
kind: Secret
metadata:
  name: quay-push-credentials
  namespace: developer-hub
  annotations:
    argocd.argoproj.io/sync-wave: "1"
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: {{ .Values.quayDockerConfigJson | quote }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pipeline
  namespace: developer-hub
  annotations:
    argocd.argoproj.io/sync-wave: "1"
imagePullSecrets:
  - name: quay-push-credentials
secrets:
  - name: quay-push-credentials
{{- end }}
