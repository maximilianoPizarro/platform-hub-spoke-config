{{- /*
  Pipeline ServiceAccount for Tekton buildah — uses quay-workshop-push Secret
  created by components/quay-registry PostSync job (org workshop).
  Override with quayDockerConfigJson to use an external registry instead.
*/ -}}
{{- if .Values.quayDockerConfigJson }}
apiVersion: v1
kind: Secret
metadata:
  name: quay-push-credentials
  namespace: developer-hub
  annotations:
    argocd.argoproj.io/sync-wave: "1"
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: {{ .Values.quayDockerConfigJson | quote }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pipeline
  namespace: developer-hub
  annotations:
    argocd.argoproj.io/sync-wave: "1"
imagePullSecrets:
  - name: quay-push-credentials
secrets:
  - name: quay-push-credentials
{{- else if .Values.clusterDomain }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pipeline
  namespace: developer-hub
  annotations:
    argocd.argoproj.io/sync-wave: "1"
imagePullSecrets:
  - name: quay-workshop-push
secrets:
  - name: quay-workshop-push
{{- end }}
