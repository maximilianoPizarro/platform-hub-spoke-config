{{- /*
  Long-lived ServiceAccount token for scaffolder k8s-api proxy (ArgoCD Application CRUD).
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: developer-hub-sa-token
  namespace: developer-hub
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    kubernetes.io/service-account.name: developer-hub
type: kubernetes.io/service-account-token
