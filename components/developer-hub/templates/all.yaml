apiVersion: v1
kind: Namespace
metadata:
  name: developer-hub
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: developer-hub
  namespace: developer-hub
  annotations:
    argocd.argoproj.io/sync-wave: "1"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: backstage-ocm-plugin
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups:
      - cluster.open-cluster-management.io
    resources:
      - managedclusters
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - internal.open-cluster-management.io
    resources:
      - managedclusterinfos
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: backstage-kubernetes-plugin
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - services
      - configmaps
      - limitranges
      - resourcequotas
      - serviceaccounts
    verbs: [get, list, watch]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs: [get, list, watch]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: [get, list, watch]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - networkpolicies
    verbs: [get, list, watch]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources:
      - gateways
      - httproutes
      - grpcroutes
    verbs: [get, list, watch]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources:
      - referencegrants
    verbs: [get, list, watch]
  - apiGroups: ["kafka.strimzi.io"]
    resources:
      - kafkas
      - kafkatopics
      - kafkausers
      - kafkaconnects
      - kafkamirrormaker2s
      - kafkabridges
      - kafkarebalances
    verbs: [get, list, watch]
  - apiGroups: ["operators.coreos.com"]
    resources:
      - clusterserviceversions
      - subscriptions
      - installplans
      - operatorgroups
    verbs: [get, list, watch]
  - apiGroups: ["packages.operators.coreos.com"]
    resources:
      - packagemanifests
    verbs: [get, list, watch]
  - apiGroups: ["networking.istio.io", "security.istio.io"]
    resources:
      - virtualservices
      - destinationrules
      - gateways
      - serviceentries
      - authorizationpolicies
      - peerauthentications
    verbs: [get, list, watch]
  - apiGroups: ["sailoperator.io"]
    resources:
      - istios
    verbs: [get, list, watch]
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: [get, list, watch]
  - apiGroups: ["tekton.dev"]
    resources:
      - pipelines
      - pipelineruns
      - taskruns
    verbs: [get, list, watch]
  - apiGroups: ["route.openshift.io"]
    resources:
      - routes
    verbs: [get, list, watch]
  - apiGroups: ["metrics.k8s.io"]
    resources:
      - pods
      - nodes
    verbs: [get, list]
  - apiGroups: [""]
    resources:
      - events
    verbs: [get, list, watch]
  - apiGroups: ["argoproj.io"]
    resources:
      - applications
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: ["kuadrant.io"]
    resources:
      - authpolicies
      - ratelimitpolicies
      - dnspolicies
      - tlspolicies
    verbs: [get, list, watch]
  - apiGroups: ["extensions.kuadrant.io"]
    resources:
      - planpolicies
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: backstage-ocm-plugin
  annotations:
    argocd.argoproj.io/sync-wave: "2"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: backstage-ocm-plugin
subjects:
  - kind: ServiceAccount
    name: developer-hub
    namespace: developer-hub
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: backstage-kubernetes-plugin
  annotations:
    argocd.argoproj.io/sync-wave: "2"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: backstage-kubernetes-plugin
subjects:
  - kind: ServiceAccount
    name: developer-hub
    namespace: developer-hub
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config-rhdh
  namespace: developer-hub
  labels:
    rhdh.redhat.com/ext-config-sync: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "3"
data:
  app-config.yaml: |
    app:
      title: Developer Hub
      baseUrl: https://developer-hub.{{ .Values.clusterDomain }}
    backend:
      baseUrl: https://developer-hub.{{ .Values.clusterDomain }}
      cors:
        origin: https://developer-hub.{{ .Values.clusterDomain }}
      reading:
        allow:
          - host: "*.redhatworkshops.io"
          - host: "*.github.io"
          - host: raw.githubusercontent.com
          - host: github.com
    enabled:
      kubernetes: true
      argocd: true
      ocm: true
    kubernetes:
      serviceLocatorMethod:
        type: multiTenant
      clusterLocatorMethods:
        - type: config
          clusters:
            - name: hub
              url: https://kubernetes.default.svc.cluster.local:443
              authProvider: serviceAccount
              serviceAccountToken: "${K8S_SA_TOKEN}"
              skipTLSVerify: true
              caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
{{- if .Values.kubernetesSpokes.enabled }}
            - name: east
              url: {{ .Values.kubernetesSpokes.east.apiUrl | quote }}
              authProvider: serviceAccount
              serviceAccountToken: ${EAST_SA_TOKEN}
              skipTLSVerify: true
            - name: west
              url: {{ .Values.kubernetesSpokes.west.apiUrl | quote }}
              authProvider: serviceAccount
              serviceAccountToken: ${WEST_SA_TOKEN}
              skipTLSVerify: true
{{- end }}
      customResources:
        - group: route.openshift.io
          apiVersion: v1
          plural: routes
        - group: gateway.networking.k8s.io
          apiVersion: v1
          plural: gateways
        - group: gateway.networking.k8s.io
          apiVersion: v1
          plural: httproutes
        - group: gateway.networking.k8s.io
          apiVersion: v1
          plural: grpcroutes
        - group: kafka.strimzi.io
          apiVersion: v1beta2
          plural: kafkas
        - group: kafka.strimzi.io
          apiVersion: v1beta2
          plural: kafkatopics
        - group: kafka.strimzi.io
          apiVersion: v1beta2
          plural: kafkausers
        - group: kafka.strimzi.io
          apiVersion: v1beta2
          plural: kafkaconnects
        - group: operators.coreos.com
          apiVersion: v1alpha1
          plural: subscriptions
        - group: argoproj.io
          apiVersion: v1alpha1
          plural: applications
    catalog:
      import:
        entityFilename: catalog-info.yaml
      rules:
        - allow: [Component, System, API, Resource, Location, Template, User, Group, Domain]
      locations:
        - type: file
          target: /opt/app-root/src/catalog-data/users.yaml
          rules:
            - allow: [User, Group]
        - type: file
          target: /opt/app-root/src/catalog-data/ie/industrial-edge-system.yaml
          rules:
            - allow: [System, Domain, Component, API, Resource]
        - type: url
          target: https://github.com/maximilianoPizarro/platform-hub-spoke-config/blob/main/docs/assets/backstage/software-templates/templates-catalog.yaml
          rules:
            - allow: [Template, Location]
        - type: file
          target: /opt/app-root/src/catalog-data/onboarding/catalog-info.yaml
          rules:
            - allow: [Component]
      providers:
        ocm:
          default:
            name: hub
            kubernetesPluginRef: hub
            url: https://kubernetes.default.svc.cluster.local:443
            skipTLSVerify: true
            owner: group:platform-engineering
            schedule:
              frequency: { minutes: 15 }
              timeout: { minutes: 10 }
        keycloakOrg:
          default:
            baseUrl: https://sso.{{ .Values.clusterDomain }}
            loginRealm: backstage
            clientId: developer-hub-catalog
            clientSecret: ${OIDC_CLIENT_SECRET}
            schedule:
              frequency: { minutes: 30 }
              timeout: { minutes: 3 }
    quay:
      baseUrl: https://quay-registry.{{ .Values.clusterDomain }}
      dangerouslyAllowInsecureConnections: true
      skipTLSVerify: true
      uiUrl: https://quay-registry.{{ .Values.clusterDomain }}
      apiUrl: https://quay-registry.{{ .Values.clusterDomain }}
      readOnly: false
      defaultVisibility: public
      allowedRegistries: ['quay-registry.{{ .Values.clusterDomain }}']
      allowedRepositories: ['workshop/*']
      allowedTags: ['latest', 'stable']
    techdocs:
      builder: local
      generator:
        runIn: local
      publisher:
        type: local
    permission:
      enabled: {{ .Values.plugins.rbac.enabled | default false }}
      rbac:
        admin:
          users:
            - name: user:default/{{ .Values.plugins.rbac.policyAdminUser | default "platformadmin" }}
        pluginsWithPermission:
          - catalog
          - scaffolder
          - permission
          - kubernetes
          - ocm
          - techdocs
{{- if include "developer-hub.lightspeedEnabled" . }}
          - lightspeed
{{- end }}
{{- if .Values.plugins.rbac.enabled | default false }}
        policies-csv-file: /opt/app-root/src/rbac-policy.csv
        policyFileReload: true
{{- end }}
    signInPage: oidc
    proxy:
      endpoints:
        '/rhacs':
          target: https://central.stackrox.svc:443
          allowedMethods: ['GET', 'POST', 'PUT', 'DELETE']
          headers:
            Authorization: Bearer ${RHACS_API_TOKEN}
        '/gitea':
          target: https://gitea-gitea.{{ .Values.clusterDomain }}/api/v1
          allowedMethods: ['GET', 'POST', 'PUT', 'DELETE']
          headers:
            Authorization: token ${GITEA_TOKEN}
        '/quay':
          target: https://quay-registry.{{ .Values.clusterDomain }}/api/v1
          allowedMethods: ['GET', 'POST', 'PUT', 'DELETE', 'PATCH']
          changeOrigin: true
        '/k8s-api':
          target: https://kubernetes.default.svc
          allowedMethods: ['GET', 'POST', 'PUT', 'DELETE', 'PATCH']
          headers:
            Authorization: Bearer ${K8S_SA_TOKEN}
          changeOrigin: true
    integrations:
      github:
        - host: github.com
          apiBaseUrl: https://api.github.com
          rawBaseUrl: https://raw.githubusercontent.com
        - host: gitea-gitea.{{ .Values.clusterDomain }}
          apiBaseUrl: https://gitea-gitea.{{ .Values.clusterDomain }}/api/v1
          token: ${GITEA_TOKEN}
    # -- Azure DevOps integration (uncomment when AZURE_TOKEN and AZURE_ORG are set) --
    # integrations:
    #   azure:
    #     - host: dev.azure.com
    #       credentials:
    #         - personalAccessToken: ${AZURE_TOKEN}
    # azureDevOps:
    #   host: dev.azure.com
    #   organization: ${AZURE_ORG}
---
# Auth stays in its own ConfigMap so YAML merge never flattens signIn.resolvers options.
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config-auth-rhdh
  namespace: developer-hub
  labels:
    rhdh.redhat.com/ext-config-sync: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "3"
data:
  app-config-auth.yaml: |
    auth:
      environment: production
      session:
        secret: ${SESSION_SECRET}
      providers:
        oidc:
          production:
            clientId: developer-hub
            clientSecret: ${OIDC_CLIENT_SECRET}
            metadataUrl: https://sso.{{ .Values.clusterDomain }}/realms/backstage/.well-known/openid-configuration
            prompt: auto
            signIn:
              resolvers:
                - resolver: preferredUsernameMatchingUserEntityName
                  dangerouslyAllowSignInWithoutUserInCatalog: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dynamic-plugins-rhdh
  namespace: developer-hub
  labels:
    rhdh.redhat.com/ext-config-sync: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "3"
data:
  dynamic-plugins.yaml: |
    includes:
      - dynamic-plugins.default.yaml
    plugins:
      - package: ./dynamic-plugins/dist/backstage-plugin-techdocs
        disabled: {{ not (.Values.plugins.techdocs.enabled | default true) }}
      - package: ./dynamic-plugins/dist/backstage-plugin-techdocs-backend-dynamic
        disabled: {{ not (.Values.plugins.techdocs.enabled | default true) }}
      - package: ./dynamic-plugins/dist/backstage-plugin-techdocs-module-addons-contrib
        disabled: {{ not (.Values.plugins.techdocs.enabled | default true) }}
      - package: ./dynamic-plugins/dist/backstage-community-plugin-ocm-backend-dynamic
        disabled: false
        pluginConfig:
          catalog:
            providers:
              ocm:
                default:
                  name: hub
                  kubernetesPluginRef: hub
                  url: https://kubernetes.default.svc.cluster.local:443
                  skipTLSVerify: true
                  owner: group:platform-engineering
                  schedule:
                    frequency: { minutes: 15 }
                    timeout: { minutes: 10 }
      - package: ./dynamic-plugins/dist/backstage-community-plugin-ocm
        disabled: false
        pluginConfig:
          dynamicPlugins:
            frontend:
              backstage-community.plugin-ocm:
                appIcons:
                  - name: ocmIcon
                    importName: OcmIcon
                dynamicRoutes:
                  - path: /ocm
                    importName: OcmPage
                    menuItem:
                      icon: ocmIcon
                      text: Clusters
                mountPoints:
                  - mountPoint: entity.page.overview/context
                    importName: ClusterContextProvider
                  - mountPoint: entity.page.overview/cards
                    importName: ClusterAvailableResourceCard
                    config:
                      layout:
                        gridColumnEnd:
                          lg: span 4
                          md: span 6
                          xs: span 12
                      if:
                        allOf:
                          - isKind: resource
                          - isType: kubernetes-cluster
                  - mountPoint: entity.page.overview/cards
                    importName: ClusterInfoCard
                    config:
                      layout:
                        gridColumnEnd:
                          lg: span 4
                          md: span 6
                          xs: span 12
                      if:
                        allOf:
                          - isKind: resource
                          - isType: kubernetes-cluster
      - package: ./dynamic-plugins/dist/backstage-community-plugin-rbac
        disabled: {{ not (.Values.plugins.rbac.enabled | default false) }}
      - package: ./dynamic-plugins/dist/backstage-plugin-kubernetes-backend-dynamic
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-plugin-kubernetes
        disabled: false
        pluginConfig:
          dynamicPlugins:
            frontend:
              backstage.plugin-kubernetes:
                mountPoints:
                  - mountPoint: entity.page.kubernetes/content
                    importName: EntityKubernetesContent
      # Disabled: package missing in RHDH 1.9 image (npm pack ENOENT). Use redhat-argocd plugin instead.
      - package: ./dynamic-plugins/dist/backstage-community-plugin-argocd
        disabled: true
      - package: ./dynamic-plugins/dist/backstage-community-plugin-topology
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-community-plugin-scaffolder-backend-module-kubernetes-dynamic
        disabled: false
      # Kafka/Kuadrant packages not bundled in RHDH 1.9 image (npm pack ENOENT)
      - package: ./dynamic-plugins/dist/backstage-community-plugin-kafka-backend-dynamic
        disabled: true
      - package: ./dynamic-plugins/dist/backstage-community-plugin-kafka
        disabled: true
      # OCI images on quay.io/kuadrant are not publicly pullable; use npm packages instead
      - package: "@kuadrant/kuadrant-backstage-plugin-backend-dynamic@v0.1.0"
        disabled: {{ not (.Values.plugins.kuadrant.enabled | default true) }}
        integrity: sha512-+iz5a/38ZB/phehlHMcbM79S/bMZwslcxi+lnG5Tb2InlWtumloFK7OzZk11s0/CjJPytF3CipOz4QpFHQ09qw==
      - package: "@kuadrant/kuadrant-backstage-plugin-frontend@v0.1.0"
        disabled: {{ not (.Values.plugins.kuadrant.enabled | default true) }}
        integrity: sha512-3RLpjskJX4UqUQrc3gqg2TJL60cRKT+4mpnHH5OTi8leUxHgbyx2RnOmdRXivgXB1DwHK/oY7BsnPPft4Up2NQ==
        pluginConfig:
          dynamicPlugins:
            frontend:
              internal.plugin-kuadrant:
                appIcons:
                  - name: kuadrantIcon
                    importName: KuadrantIcon
                dynamicRoutes:
                  - path: /kuadrant
                    importName: KuadrantPage
                    menuItem:
                      icon: kuadrantIcon
                      text: Kuadrant
      - package: ./dynamic-plugins/dist/backstage-community-plugin-tekton
        disabled: false
        pluginConfig:
          dynamicPlugins:
            frontend:
              backstage-community.plugin-tekton:
                mountPoints:
                  - mountPoint: entity.page.ci/content
                    importName: EntityTektonPipelinesContent
      # Backend requires argocd.appLocatorMethods + admin credentials; scaffolder uses k8s-api proxy.
      - package: ./dynamic-plugins/dist/roadiehq-backstage-plugin-argo-cd-backend-dynamic
        disabled: true
      # Frontend-only; backend needs argocd.appLocatorMethods (use k8s-api proxy for scaffolder).
      - package: ./dynamic-plugins/dist/backstage-community-plugin-redhat-argocd
        disabled: true
      - package: ./dynamic-plugins/dist/backstage-community-plugin-acr
        disabled: true
      - package: ./dynamic-plugins/dist/backstage-community-plugin-quay
        disabled: {{ not (.Values.plugins.quay.enabled | default true) }}
      # quay-backend-dynamic not in RHDH 1.9 image; frontend quay plugin is sufficient
      - package: ./dynamic-plugins/dist/backstage-community-plugin-quay-backend-dynamic
        disabled: true
      - package: ./dynamic-plugins/dist/backstage-plugin-security-insights
        disabled: {{ not (.Values.plugins.acsSecurityInsights.enabled | default false) }}
        pluginConfig:
          dynamicPlugins:
            frontend:
              backstage.plugin-security-insights:
                mountPoints:
                  - mountPoint: entity.page.overview/cards
                    importName: EntitySecurityInsightsContent
      - package: ./dynamic-plugins/dist/roadiehq-scaffolder-backend-module-http-request-dynamic
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-community-plugin-catalog-backend-module-keycloak-dynamic
        disabled: false
        pluginConfig:
          catalog:
            providers:
              keycloakOrg:
                default:
                  baseUrl: https://sso.{{ .Values.clusterDomain }}
                  loginRealm: backstage
                  realm: backstage
                  clientId: developer-hub-catalog
                  clientSecret: ${OIDC_CLIENT_SECRET}
                  schedule:
                    frequency: { minutes: 30 }
                    timeout: { minutes: 3 }
      - package: ./dynamic-plugins/dist/backstage-plugin-scaffolder-backend-module-github-dynamic
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-plugin-notifications
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-plugin-notifications-backend-dynamic
        disabled: false
      # --- Azure DevOps (disabled - requires AZURE_TOKEN and AZURE_ORG env vars) ---
      # PAT scopes: Code (Read), Build (Read & Execute), Release (Read), Work Items (Read), Pull Request Threads (Read & Write)
      - package: ./dynamic-plugins/dist/backstage-community-plugin-azure-devops-backend-dynamic
        disabled: true
      - package: ./dynamic-plugins/dist/backstage-community-plugin-azure-devops
        disabled: true
        pluginConfig:
          dynamicPlugins:
            frontend:
              backstage-community.plugin-azure-devops:
                mountPoints:
                  - mountPoint: entity.page.pull-requests/content
                    importName: EntityAzurePullRequestsContent
                  - mountPoint: entity.page.ci/cards
                    importName: EntityAzurePipelinesContent
{{- if include "developer-hub.lightspeedEnabled" . }}
      {{- $lsTag := .Values.plugins.lightspeed.pluginTag | default "bs_1.45.3__1.2.3" }}
      - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-lightspeed:{{ $lsTag }}
        disabled: false
        pluginConfig:
          dynamicPlugins:
            frontend:
              red-hat-developer-hub.backstage-plugin-lightspeed:
                translationResources:
                  - importName: lightspeedTranslations
                    module: Alpha
                    ref: lightspeedTranslationRef
                dynamicRoutes:
                  - path: /lightspeed
                    importName: LightspeedPage
                mountPoints:
                  - mountPoint: application/listener
                    importName: LightspeedFAB
                  - mountPoint: application/provider
                    importName: LightspeedDrawerProvider
                  - mountPoint: application/internal/drawer-state
                    importName: LightspeedDrawerStateExposer
                    config:
                      id: lightspeed
                  - mountPoint: application/internal/drawer-content
                    importName: LightspeedChatContainer
                    config:
                      id: lightspeed
                      priority: 100
      - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-lightspeed-backend:{{ $lsTag }}
        disabled: false
{{- end }}
---
apiVersion: rhdh.redhat.com/v1alpha5
kind: Backstage
metadata:
  name: developer-hub
  namespace: developer-hub
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  application:
    appConfig:
      configMaps:
        - name: app-config-rhdh
        - name: app-config-auth-rhdh
{{- if include "developer-hub.lightspeedEnabled" . }}
        - name: lightspeed-app-config
{{- end }}
    dynamicPluginsConfigMapName: dynamic-plugins-rhdh
    extraFiles:
      configMaps:
        - name: developer-hub-catalog-users
          key: users.yaml
          mountPath: /opt/app-root/src/catalog-data
          containers:
            - "*"
        - name: developer-hub-catalog-ie
          key: industrial-edge-system.yaml
          mountPath: /opt/app-root/src/catalog-data/ie
          containers:
            - "*"
        - name: developer-hub-catalog-onboarding
          key: catalog-info.yaml
          mountPath: /opt/app-root/src/catalog-data/onboarding
          containers:
            - "*"
    route:
      enabled: true
      host: developer-hub.{{ .Values.clusterDomain }}
{{- if include "developer-hub.lightspeedEnabled" . }}
    extraEnvs:
      secrets:
        - name: llama-stack-secrets
        - name: lightspeed-secrets
{{- end }}
  deployment:
    patch:
      spec:
        replicas: 1
        template:
          metadata:
            annotations:
              developer-hub.redhat.com/catalog-users: {{ .Values.userCount | default 50 | quote }}
          spec:
            automountServiceAccountToken: true
            serviceAccountName: developer-hub
{{- if or (include "developer-hub.lightspeedEnabled" .) (.Values.plugins.rbac.enabled | default false) }}
            volumes:
{{- if include "developer-hub.lightspeedEnabled" . }}
              - name: lightspeed-stack
                configMap:
                  name: lightspeed-stack
              - name: llama-stack-config
                configMap:
                  name: llama-stack-config
              - name: shared-storage
                emptyDir: {}
              - name: rag-data-volume
                emptyDir: {}
{{- end }}
{{- if .Values.plugins.rbac.enabled | default false }}
              - name: rhdh-rbac-policy
                configMap:
                  name: rhdh-rbac-policy
{{- end }}
            initContainers:
              - name: wait-for-postgres
                image: registry.redhat.io/openshift4/ose-cli:latest
                command: ["/bin/bash", "-c"]
                args:
                  - |
                    for i in $(seq 1 30); do
                      timeout 3 bash -c \
                        "</dev/tcp/backstage-psql-developer-hub/5432" \
                        2>/dev/null && { sleep 2; exit 0; }
                      echo "PostgreSQL not ready, attempt $i/30..."
                      sleep 5
                    done
                    echo "PostgreSQL timed out — proceeding anyway."
{{- if include "developer-hub.lightspeedEnabled" . }}
              - name: init-rag-data
                image: {{ .Values.plugins.lightspeed.ragContentImage | default "quay.io/redhat-ai-dev/rag-content:release-1.9-lcs" | quote }}
                command:
                  - sh
                  - -c
                  - |
                    echo 'Copying RAG data...'
                    cp -r /rag/vector_db/rhdh_product_docs /data/ && \
                    cp -r /rag/embeddings_model /data/ && \
                    echo 'Copy complete.'
                volumeMounts:
                  - name: rag-data-volume
                    mountPath: /data
{{- end }}
            containers:
              - name: backstage-backend
                env:
                  - name: NODE_TLS_REJECT_UNAUTHORIZED
                    value: "0"
                  - name: K8S_SA_TOKEN
                    valueFrom:
                      secretKeyRef:
                        name: developer-hub-sa-token
                        key: token
                        optional: true
                envFrom:
                  - secretRef:
                      name: developer-hub-oidc-auth
                      optional: true
                  - secretRef:
                      name: developer-hub-spoke-tokens
                      optional: true
{{- if .Values.plugins.rbac.enabled | default false }}
                volumeMounts:
                  - name: rhdh-rbac-policy
                    mountPath: /opt/app-root/src/rbac-policy.csv
                    subPath: rbac-policy.csv
                    readOnly: true
{{- end }}
{{- if include "developer-hub.lightspeedEnabled" . }}
              - name: llama-stack
                image: {{ .Values.plugins.lightspeed.llamaStackImage | default "quay.io/redhat-ai-dev/llama-stack:0.1.4" | quote }}
                envFrom:
                  - secretRef:
                      name: llama-stack-secrets
                volumeMounts:
                  - name: shared-storage
                    mountPath: /app-root/.llama
                  - name: rag-data-volume
                    mountPath: /rag-content/embeddings_model
                    subPath: embeddings_model
                  - name: rag-data-volume
                    mountPath: /rag-content/vector_db/rhdh_product_docs
                    subPath: rhdh_product_docs
                  - name: llama-stack-config
                    mountPath: /app-root/config/run.yaml
                    subPath: run.yaml
              - name: lightspeed-core
                image: {{ .Values.plugins.lightspeed.lightspeedCoreImage | default "quay.io/lightspeed-core/lightspeed-stack:0.4.0" | quote }}
                volumeMounts:
                  - name: lightspeed-stack
                    mountPath: /app-root/lightspeed-stack.yaml
                    subPath: lightspeed-stack.yaml
                  - name: shared-storage
                    mountPath: /tmp/data/feedback
                  - name: shared-storage
                    mountPath: /tmp/data/transcripts
                  - name: shared-storage
                    mountPath: /tmp/data/conversations
{{- end }}
