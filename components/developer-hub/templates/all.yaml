apiVersion: v1
kind: Namespace
metadata:
  name: developer-hub
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: developer-hub
  namespace: developer-hub
  annotations:
    argocd.argoproj.io/sync-wave: "1"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: backstage-ocm-plugin
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups:
      - cluster.open-cluster-management.io
    resources:
      - managedclusters
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - internal.open-cluster-management.io
    resources:
      - managedclusterinfos
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: backstage-ocm-plugin
  annotations:
    argocd.argoproj.io/sync-wave: "2"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: backstage-ocm-plugin
subjects:
  - kind: ServiceAccount
    name: developer-hub
    namespace: developer-hub
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config-rhdh
  namespace: developer-hub
  labels:
    rhdh.redhat.com/ext-config-sync: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "3"
data:
  app-config.yaml: |
    app:
      title: Developer Hub
      baseUrl: https://developer-hub.{{ .Values.clusterDomain }}
    backend:
      baseUrl: https://developer-hub.{{ .Values.clusterDomain }}
      cors:
        origin: https://developer-hub.{{ .Values.clusterDomain }}
    enabled:
      kubernetes: true
      argocd: true
      ocm: true
      kuadrant: true
    catalog:
      providers:
        ocm:
          hub:
            name: hub
            url: https://kubernetes.default.svc.cluster.local:443
            skipTLSVerify: false
    proxy:
      endpoints:
        '/rhacs':
          target: https://central.stackrox.svc:443
          allowedMethods: ['GET', 'POST', 'PUT', 'DELETE']
          headers:
            Authorization: Bearer ${RHACS_API_TOKEN}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dynamic-plugins-rhdh
  namespace: developer-hub
  labels:
    rhdh.redhat.com/ext-config-sync: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "3"
data:
  dynamic-plugins.yaml: |
    includes:
      - dynamic-plugins.default.yaml
    plugins:
      - package: ./dynamic-plugins/dist/backstage-community-plugin-ocm-backend-dynamic
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-community-plugin-ocm
        disabled: false
        pluginConfig:
          dynamicPlugins:
            frontend:
              backstage-community.plugin-ocm:
                mountPoints:
                  - mountPoint: entity.page.overview/cards
                    importName: OcmClusterOverviewCard
      - package: ./dynamic-plugins/dist/backstage-plugin-kubernetes-backend-dynamic
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-plugin-kubernetes
        disabled: false
        pluginConfig:
          dynamicPlugins:
            frontend:
              backstage.plugin-kubernetes:
                mountPoints:
                  - mountPoint: entity.page.kubernetes/content
                    importName: EntityKubernetesContent
      - package: ./dynamic-plugins/dist/backstage-community-plugin-argocd
        disabled: false
        pluginConfig:
          dynamicPlugins:
            frontend:
              backstage-community.plugin-argocd:
                mountPoints:
                  - mountPoint: entity.page.kubernetes/cards
                    importName: ArgocdDeploymentSummary
                  - mountPoint: entity.page.kubernetes/cards
                    importName: ArgocdDeploymentLifecycle
      - package: ./dynamic-plugins/dist/backstage-community-plugin-topology
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-community-plugin-kafka-backend-dynamic
        disabled: false
        pluginConfig:
          kafka:
            clusters:
              - name: industrial-edge
                brokers:
                  - industrial-edge-kafka-kafka-bootstrap.industrial-edge-stormshift-messaging.svc:9092
      - package: ./dynamic-plugins/dist/backstage-community-plugin-kafka
        disabled: false
        pluginConfig:
          dynamicPlugins:
            frontend:
              backstage-community.plugin-kafka:
                mountPoints:
                  - mountPoint: entity.page.kafka/content
                    importName: EntityKafkaContent
      - package: ./dynamic-plugins/dist/kuadrant-backstage-plugin-backend-dynamic
        disabled: false
      - package: ./dynamic-plugins/dist/kuadrant-backstage-plugin-frontend
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-community-plugin-tekton
        disabled: false
        pluginConfig:
          dynamicPlugins:
            frontend:
              backstage-community.plugin-tekton:
                mountPoints:
                  - mountPoint: entity.page.ci/content
                    importName: EntityTektonPipelinesContent
      - package: ./dynamic-plugins/dist/roadiehq-backstage-plugin-argo-cd-backend-dynamic
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-community-plugin-redhat-argocd
        disabled: false
        pluginConfig:
          dynamicPlugins:
            frontend:
              backstage-community.plugin-redhat-argocd:
                mountPoints:
                  - mountPoint: entity.page.cd/content
                    importName: ArgocdDeploymentLifecycle
      - package: ./dynamic-plugins/dist/backstage-community-plugin-acr
        disabled: true
      - package: ./dynamic-plugins/dist/roadiehq-scaffolder-backend-module-http-request-dynamic
        disabled: false
---
apiVersion: rhdh.redhat.com/v1alpha5
kind: Backstage
metadata:
  name: developer-hub
  namespace: developer-hub
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  application:
    appConfig:
      configMaps:
        - name: app-config-rhdh
    dynamicPluginsConfigMapName: dynamic-plugins-rhdh
    route:
      enabled: true
      host: developer-hub.{{ .Values.clusterDomain }}
  deployment:
    patch:
      spec:
        template:
          spec:
            serviceAccountName: developer-hub
