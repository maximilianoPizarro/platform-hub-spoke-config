apiVersion: v1
kind: Namespace
metadata:
  name: developer-hub
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: developer-hub
  namespace: developer-hub
  annotations:
    argocd.argoproj.io/sync-wave: "1"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: backstage-ocm-plugin
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups:
      - cluster.open-cluster-management.io
    resources:
      - managedclusters
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - internal.open-cluster-management.io
    resources:
      - managedclusterinfos
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: backstage-kubernetes-plugin
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - services
      - configmaps
      - limitranges
      - resourcequotas
      - serviceaccounts
    verbs: [get, list, watch]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs: [get, list, watch]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: [get, list, watch]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
    verbs: [get, list, watch]
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: [get, list, watch]
  - apiGroups: ["tekton.dev"]
    resources:
      - pipelines
      - pipelineruns
      - taskruns
    verbs: [get, list, watch]
  - apiGroups: ["route.openshift.io"]
    resources:
      - routes
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources:
      - events
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: backstage-ocm-plugin
  annotations:
    argocd.argoproj.io/sync-wave: "2"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: backstage-ocm-plugin
subjects:
  - kind: ServiceAccount
    name: developer-hub
    namespace: developer-hub
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: backstage-kubernetes-plugin
  annotations:
    argocd.argoproj.io/sync-wave: "2"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: backstage-kubernetes-plugin
subjects:
  - kind: ServiceAccount
    name: developer-hub
    namespace: developer-hub
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config-rhdh
  namespace: developer-hub
  labels:
    rhdh.redhat.com/ext-config-sync: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "3"
data:
  app-config.yaml: |
    app:
      title: Developer Hub
      baseUrl: https://developer-hub.{{ .Values.clusterDomain }}
    backend:
      baseUrl: https://developer-hub.{{ .Values.clusterDomain }}
      cors:
        origin: https://developer-hub.{{ .Values.clusterDomain }}
      reading:
        allow:
          - host: "*.github.io"
    enabled:
      kubernetes: true
      argocd: true
      ocm: true
    kubernetes:
      serviceLocatorMethod:
        type: multiTenant
      clusterLocatorMethods:
        - type: config
          clusters:
            - name: hub
              url: https://kubernetes.default.svc.cluster.local:443
              authProvider: serviceAccount
              skipTLSVerify: true
    catalog:
      import:
        entityFilename: catalog-info.yaml
      locations:
        - type: file
          target: /opt/app-root/src/users.yaml
          rules:
            - allow: [User, Group]
        - type: file
          target: /opt/app-root/src/catalog-ie/industrial-edge-system.yaml
          rules:
            - allow: [System, Domain, Component, API, Resource]
        - type: url
          target: {{ .Values.githubPagesBaseUrl }}/assets/backstage/software-templates/templates-catalog.yaml
          rules:
            - allow: [Template, Location]
      providers:
        ocm:
          default:
            name: hub
            url: https://kubernetes.default.svc.cluster.local:443
            skipTLSVerify: true
        keycloakOrg:
          default:
            baseUrl: https://sso.{{ .Values.clusterDomain }}
            loginRealm: backstage
            clientId: developer-hub-catalog
            clientSecret: ${OIDC_CLIENT_SECRET}
            schedule:
              frequency: { minutes: 30 }
              timeout: { minutes: 3 }
    techdocs:
      builder: external
      publisher:
        type: url
        url:
          baseUrl: {{ .Values.githubPagesBaseUrl }}/docs
    permission:
      enabled: false
    signInPage: oidc
    proxy:
      endpoints:
        '/rhacs':
          target: https://central.stackrox.svc:443
          allowedMethods: ['GET', 'POST', 'PUT', 'DELETE']
          headers:
            Authorization: Bearer ${RHACS_API_TOKEN}
    integrations:
      github:
        - host: gitea-gitea.{{ .Values.clusterDomain }}
          apiBaseUrl: https://gitea-gitea.{{ .Values.clusterDomain }}/api/v1
          rawBaseUrl: https://gitea-gitea.{{ .Values.clusterDomain }}/raw
          token: ${GITEA_TOKEN}
    # -- Azure DevOps integration (uncomment when AZURE_TOKEN and AZURE_ORG are set) --
    # integrations:
    #   azure:
    #     - host: dev.azure.com
    #       credentials:
    #         - personalAccessToken: ${AZURE_TOKEN}
    # azureDevOps:
    #   host: dev.azure.com
    #   organization: ${AZURE_ORG}
---
# Auth stays in its own ConfigMap so YAML merge never flattens signIn.resolvers options.
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config-auth-rhdh
  namespace: developer-hub
  labels:
    rhdh.redhat.com/ext-config-sync: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "3"
data:
  app-config-auth.yaml: |
    auth:
      environment: production
      session:
        secret: ${SESSION_SECRET}
      providers:
        oidc:
          production:
            clientId: developer-hub
            clientSecret: ${OIDC_CLIENT_SECRET}
            metadataUrl: https://sso.{{ .Values.clusterDomain }}/realms/backstage/.well-known/openid-configuration
            prompt: auto
            signIn:
              resolvers:
                - resolver: preferredUsernameMatchingUserEntityName
                  dangerouslyAllowSignInWithoutUserInCatalog: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dynamic-plugins-rhdh
  namespace: developer-hub
  labels:
    rhdh.redhat.com/ext-config-sync: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "3"
data:
  dynamic-plugins.yaml: |
    includes:
      - dynamic-plugins.default.yaml
    plugins:
      - package: ./dynamic-plugins/dist/backstage-plugin-techdocs
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-plugin-techdocs-backend-dynamic
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-plugin-techdocs-module-addons-contrib
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-community-plugin-ocm-backend-dynamic
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-community-plugin-ocm
        disabled: false
        pluginConfig:
          dynamicPlugins:
            frontend:
              backstage-community.plugin-ocm:
                mountPoints:
                  - mountPoint: entity.page.overview/cards
                    importName: OcmClusterOverviewCard
      - package: ./dynamic-plugins/dist/backstage-plugin-kubernetes-backend-dynamic
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-plugin-kubernetes
        disabled: false
        pluginConfig:
          dynamicPlugins:
            frontend:
              backstage.plugin-kubernetes:
                mountPoints:
                  - mountPoint: entity.page.kubernetes/content
                    importName: EntityKubernetesContent
      # Disabled: package missing in RHDH 1.9 image (npm pack ENOENT). Use redhat-argocd plugin instead.
      - package: ./dynamic-plugins/dist/backstage-community-plugin-argocd
        disabled: true
      - package: ./dynamic-plugins/dist/backstage-community-plugin-topology
        disabled: false
      # Disabled: package missing in RHDH 1.9 image (npm pack ENOENT)
      - package: ./dynamic-plugins/dist/backstage-community-plugin-kafka-backend-dynamic
        disabled: true
      - package: ./dynamic-plugins/dist/backstage-community-plugin-kafka
        disabled: true
      # Disabled: package missing in RHDH 1.9 image (npm pack ENOENT)
      - package: ./dynamic-plugins/dist/kuadrant-backstage-plugin-backend-dynamic
        disabled: true
      - package: ./dynamic-plugins/dist/kuadrant-backstage-plugin-frontend
        disabled: true
      - package: ./dynamic-plugins/dist/backstage-community-plugin-tekton
        disabled: false
        pluginConfig:
          dynamicPlugins:
            frontend:
              backstage-community.plugin-tekton:
                mountPoints:
                  - mountPoint: entity.page.ci/content
                    importName: EntityTektonPipelinesContent
      # Disabled: package missing in RHDH 1.9 image (npm pack ENOENT)
      - package: ./dynamic-plugins/dist/roadiehq-backstage-plugin-argo-cd-backend-dynamic
        disabled: true
      - package: ./dynamic-plugins/dist/backstage-community-plugin-redhat-argocd
        disabled: true
      - package: ./dynamic-plugins/dist/backstage-community-plugin-acr
        disabled: true
      - package: ./dynamic-plugins/dist/roadiehq-scaffolder-backend-module-http-request-dynamic
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-community-plugin-catalog-backend-module-keycloak-dynamic
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-plugin-scaffolder-backend-module-github-dynamic
        disabled: false
      # --- Azure DevOps (disabled - requires AZURE_TOKEN and AZURE_ORG env vars) ---
      # PAT scopes: Code (Read), Build (Read & Execute), Release (Read), Work Items (Read), Pull Request Threads (Read & Write)
      - package: ./dynamic-plugins/dist/backstage-community-plugin-azure-devops-backend-dynamic
        disabled: true
      - package: ./dynamic-plugins/dist/backstage-community-plugin-azure-devops
        disabled: true
        pluginConfig:
          dynamicPlugins:
            frontend:
              backstage-community.plugin-azure-devops:
                mountPoints:
                  - mountPoint: entity.page.pull-requests/content
                    importName: EntityAzurePullRequestsContent
                  - mountPoint: entity.page.ci/cards
                    importName: EntityAzurePipelinesContent
---
apiVersion: rhdh.redhat.com/v1alpha5
kind: Backstage
metadata:
  name: developer-hub
  namespace: developer-hub
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  application:
    appConfig:
      configMaps:
        - name: app-config-rhdh
        - name: app-config-auth-rhdh
    dynamicPluginsConfigMapName: dynamic-plugins-rhdh
    extraFiles:
      configMaps:
        - name: developer-hub-catalog-users
          key: users.yaml
          mountPath: /opt/app-root/src
          containers:
            - "*"
        - name: developer-hub-catalog-ie
          key: industrial-edge-system.yaml
          mountPath: /opt/app-root/src/catalog-ie
          containers:
            - "*"
    route:
      enabled: true
      host: developer-hub.{{ .Values.clusterDomain }}
  deployment:
    patch:
      spec:
        template:
          spec:
            automountServiceAccountToken: true
            serviceAccountName: developer-hub
            containers:
              - name: backstage-backend
                envFrom:
                  - secretRef:
                      name: developer-hub-oidc-auth
                      optional: true
