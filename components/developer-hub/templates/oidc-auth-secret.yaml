{{- /*
  Placeholder OIDC secret — must match Keycloak client developer-hub secret
  (helm --set keycloakOidcClientSecret=...). Replace before production use.
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: developer-hub-oidc-auth
  namespace: developer-hub
  annotations:
    argocd.argoproj.io/sync-wave: "3"
type: Opaque
stringData:
  OIDC_CLIENT_SECRET: {{ .Values.keycloakOidcClientSecret | default "CHANGEME-set-via-helm-or-sync-secret" | quote }}
  GITEA_TOKEN: {{ .Values.giteaToken | default "CHANGEME-create-token-in-gitea-admin" | quote }}
  SESSION_SECRET: {{ .Values.sessionSecret | default (randAlphaNum 32) | quote }}
