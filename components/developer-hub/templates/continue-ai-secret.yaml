{{- /*
  Placeholder Secret for Continue AI in DevSpaces. Do NOT commit real API keys.
  Create manually after deploy:
    oc create secret generic continue-ai-config -n devspaces \
      --from-literal=CONTINUE_API_KEY='<MaaS key>' \
      --from-literal=CONTINUE_API_BASE='https://litellm-prod.apps.maas.redhatworkshops.io/v1' \
      --from-literal=CONTINUE_MODEL='deepseek-r1-distill-qwen-14b' \
      --dry-run=client -o yaml | oc apply -f -
  Labels below auto-mount into DevSpaces workspaces.
*/ -}}
apiVersion: v1
kind: Namespace
metadata:
  name: devspaces
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: v1
kind: Secret
metadata:
  name: continue-ai-config
  namespace: devspaces
  labels:
    controller.devfile.io/mount-to-devworkspace: "true"
    controller.devfile.io/watch-secret: "true"
  annotations:
    controller.devfile.io/mount-as: env
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/compare-options: IgnoreExtraneous
type: Opaque
stringData:
  CONTINUE_API_KEY: "REPLACE_VIA_OC_CREATE_SECRET"
  CONTINUE_API_BASE: "https://litellm-prod.apps.maas.redhatworkshops.io/v1"
  CONTINUE_MODEL: "deepseek-r1-distill-qwen-14b"
