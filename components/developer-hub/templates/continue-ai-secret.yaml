{{- /*
  Continue AI secrets for DevSpaces auto-mount. Do NOT commit real API keys.
  After deploy, patch the placeholder key:
    oc patch secret continue-ai-config -n admin-devspaces \
      -p '{"stringData":{"CONTINUE_API_KEY":"sk-oOGHKp-o1zvTJUSUrHdHXA"}}'
  The labels below trigger automatic injection into every DevWorkspace in the same namespace.
*/ -}}
apiVersion: v1
kind: Namespace
metadata:
  name: admin-devspaces
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: v1
kind: Secret
metadata:
  name: continue-ai-config
  namespace: admin-devspaces
  labels:
    controller.devfile.io/mount-to-devworkspace: "true"
    controller.devfile.io/watch-secret: "true"
  annotations:
    controller.devfile.io/mount-as: env
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/compare-options: IgnoreExtraneous
type: Opaque
stringData:
  CONTINUE_API_KEY: "REPLACE_VIA_OC_PATCH_OR_SYNC_FROM_kairos-ai-credentials"
  CONTINUE_API_BASE: {{ include "developer-hub.vllmBaseUrl" (dict "apiURL" ((.Values.aiModel | default dict).apiURL | default "")) | quote }}
  CONTINUE_MODEL: {{ (.Values.aiModel | default dict).model | default "granite-31-8b" | quote }}
