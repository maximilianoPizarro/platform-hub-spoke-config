              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum(rate(istio_requests_total{reporter=\"destination\", response_code=~\"4..\"}[5m])) / sum(rate(istio_requests_total{reporter=\"destination\"}[5m]))",
              "legendFormat": "4xx error ratio",
              "refId": "B"
            }
          ],
          "title": "Error rate (4xx / 5xx share of requests)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
