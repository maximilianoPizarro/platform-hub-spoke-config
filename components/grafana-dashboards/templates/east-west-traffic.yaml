            "legend": {"calcs": ["mean"], "displayMode": "table", "placement": "right", "showLegend": true},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum(rate(istio_requests_total{reporter=\"destination\", destination_service_name=\"industrial-edge-east\"}[5m]))",
              "legendFormat": "east ExternalName backend",
              "refId": "A"
