            {
              "datasource": {"type": "prometheus"},
              "expr": "sum(rate(istio_requests_total{reporter=\"source\"}[5m])) by (destination_service_name)",
              "legendFormat": "{{ "{{destination_service_name}}" }}",
              "refId": "B",
              "hide": true
            }
          ],
          "title": "Request rate by destination cluster (source reporter)",
          "type": "timeseries",
          "description": "Primary series groups by destination_cluster when present in scraped Istio metrics; enable hidden query if your mesh only exposes destination_service_name."
        },
        {
          "datasource": {"type": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "none",
                "hideFrom": {"legend": false, "tooltip": false, "viz": false},
                "insertNulls": false,
                "lineInterpolation": "linear",
                "lineWidth": 1,
                "pointSize": 5,
                "scaleDistribution": {"type": "linear"},
                "showPoints": "never",
                "spanNulls": false,
                "stacking": {"group": "A", "mode": "none"},
                "thresholdsStyle": {"mode": "off"}
              },
              "decimals": 3,
              "max": 1,
              "min": 0,
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "red", "value": 0.05}]},
              "unit": "percentunit"
            },
            "overrides": []
          },
          "gridPos": {"h": 9, "w": 12, "x": 0, "y": 11},
          "id": 3,
          "options": {
            "legend": {"calcs": [], "displayMode": "list", "placement": "bottom", "showLegend": true},
            "tooltip": {"mode": "single", "sort": "none"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus"},
              "expr": "sum(rate(istio_requests_total{reporter=\"source\", response_code=~\"5..\"}[5m])) / sum(rate(istio_requests_total{reporter=\"source\"}[5m]))",
              "legendFormat": "5xx error ratio",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus"},
              "expr": "sum(rate(istio_requests_total{reporter=\"source\", response_code=~\"4..\"}[5m])) / sum(rate(istio_requests_total{reporter=\"source\"}[5m]))",
              "legendFormat": "4xx error ratio",
              "refId": "B"
            }
          ],
          "title": "Error rate (4xx / 5xx share of requests)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 0,
                "gradientMode": "none",
                "hideFrom": {"legend": false, "tooltip": false, "viz": false},
                "insertNulls": false,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": {"type": "linear"},
                "showPoints": "never",
                "spanNulls": false,
                "stacking": {"group": "A", "mode": "none"},
                "thresholdsStyle": {"mode": "off"}
              },
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]},
              "unit": "ms"
            },
            "overrides": []
          },
          "gridPos": {"h": 9, "w": 12, "x": 12, "y": 11},
          "id": 4,
          "options": {
            "legend": {"calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus"},
              "expr": "histogram_quantile(0.50, sum(rate(istio_request_duration_milliseconds_bucket{reporter=\"source\"}[5m])) by (le))",
              "legendFormat": "p50",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus"},
              "expr": "histogram_quantile(0.99, sum(rate(istio_request_duration_milliseconds_bucket{reporter=\"source\"}[5m])) by (le))",
              "legendFormat": "p99",
              "refId": "B"
            }
          ],
          "title": "Latency (istio_request_duration_milliseconds_bucket)",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 20},
          "id": 101,
          "panels": [],
          "title": "Hub gateway traffic split",
          "type": "row"
