          "targets": [
            {
              "datasource": {"type": "prometheus"},
              "expr": "sum(rate(istio_requests_total{reporter=\"source\", destination_service_name=~\"industrial-edge-east-.*\"}[5m]))",
              "legendFormat": "east (front+api backends)",
