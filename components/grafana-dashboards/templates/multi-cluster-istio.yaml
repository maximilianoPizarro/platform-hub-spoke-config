apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: multi-cluster-istio
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 2,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0},
          "id": 100,
          "panels": [],
          "title": "Cross-cluster Istio request rate (via Service Interconnect)",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "-- Mixed --"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 15,
                "gradientMode": "opacity",
                "hideFrom": {"legend": false, "tooltip": false, "viz": false},
                "insertNulls": false,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": {"type": "linear"},
                "showPoints": "never",
                "spanNulls": false,
                "stacking": {"group": "A", "mode": "none"},
                "thresholdsStyle": {"mode": "off"}
              },
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": {"h": 10, "w": 24, "x": 0, "y": 1},
          "id": 1,
          "options": {
            "legend": {"calcs": ["mean", "max"], "displayMode": "table", "placement": "right", "showLegend": true},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${ds_hub}"},
              "expr": "sum(rate(istio_requests_total{reporter=\"source\"}[5m]))",
              "legendFormat": "Hub",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${ds_east}"},
              "expr": "sum(rate(istio_requests_total{reporter=\"source\"}[5m]))",
              "legendFormat": "East",
              "refId": "B"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${ds_west}"},
              "expr": "sum(rate(istio_requests_total{reporter=\"source\"}[5m]))",
              "legendFormat": "West",
              "refId": "C"
            }
          ],
          "title": "Total request rate per cluster",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 11},
          "id": 200,
          "panels": [],
          "title": "Cross-cluster error rate (5xx)",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "-- Mixed --"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "none",
                "hideFrom": {"legend": false, "tooltip": false, "viz": false},
                "insertNulls": false,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": {"type": "linear"},
                "showPoints": "never",
                "spanNulls": false,
                "stacking": {"group": "A", "mode": "none"},
                "thresholdsStyle": {"mode": "off"}
              },
              "decimals": 3,
              "max": 1,
              "min": 0,
              "unit": "percentunit"
            },
            "overrides": []
          },
          "gridPos": {"h": 9, "w": 24, "x": 0, "y": 12},
          "id": 2,
          "options": {
            "legend": {"calcs": ["mean", "max"], "displayMode": "table", "placement": "right", "showLegend": true},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${ds_hub}"},
              "expr": "sum(rate(istio_requests_total{reporter=\"source\", response_code=~\"5..\"}[5m])) / sum(rate(istio_requests_total{reporter=\"source\"}[5m]))",
              "legendFormat": "Hub 5xx",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${ds_east}"},
              "expr": "sum(rate(istio_requests_total{reporter=\"source\", response_code=~\"5..\"}[5m])) / sum(rate(istio_requests_total{reporter=\"source\"}[5m]))",
              "legendFormat": "East 5xx",
              "refId": "B"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${ds_west}"},
              "expr": "sum(rate(istio_requests_total{reporter=\"source\", response_code=~\"5..\"}[5m])) / sum(rate(istio_requests_total{reporter=\"source\"}[5m]))",
              "legendFormat": "West 5xx",
              "refId": "C"
            }
          ],
          "title": "5xx error ratio per cluster",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 21},
          "id": 300,
          "panels": [],
          "title": "Cross-cluster latency (p50 / p95 / p99)",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "-- Mixed --"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 0,
                "gradientMode": "none",
                "hideFrom": {"legend": false, "tooltip": false, "viz": false},
                "insertNulls": false,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": {"type": "linear"},
                "showPoints": "never",
                "spanNulls": false,
                "stacking": {"group": "A", "mode": "none"},
                "thresholdsStyle": {"mode": "off"}
              },
              "unit": "ms"
            },
            "overrides": []
          },
          "gridPos": {"h": 10, "w": 24, "x": 0, "y": 22},
          "id": 3,
          "options": {
            "legend": {"calcs": ["mean", "max"], "displayMode": "table", "placement": "right", "showLegend": true},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${ds_hub}"},
              "expr": "histogram_quantile(0.95, sum(rate(istio_request_duration_milliseconds_bucket{reporter=\"source\"}[5m])) by (le))",
              "legendFormat": "Hub p95",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${ds_east}"},
              "expr": "histogram_quantile(0.95, sum(rate(istio_request_duration_milliseconds_bucket{reporter=\"source\"}[5m])) by (le))",
              "legendFormat": "East p95",
              "refId": "B"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${ds_west}"},
              "expr": "histogram_quantile(0.95, sum(rate(istio_request_duration_milliseconds_bucket{reporter=\"source\"}[5m])) by (le))",
              "legendFormat": "West p95",
              "refId": "C"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${ds_hub}"},
              "expr": "histogram_quantile(0.50, sum(rate(istio_request_duration_milliseconds_bucket{reporter=\"source\"}[5m])) by (le))",
              "legendFormat": "Hub p50",
              "refId": "D"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${ds_east}"},
              "expr": "histogram_quantile(0.50, sum(rate(istio_request_duration_milliseconds_bucket{reporter=\"source\"}[5m])) by (le))",
              "legendFormat": "East p50",
              "refId": "E"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${ds_west}"},
              "expr": "histogram_quantile(0.50, sum(rate(istio_request_duration_milliseconds_bucket{reporter=\"source\"}[5m])) by (le))",
              "legendFormat": "West p50",
              "refId": "F"
            }
          ],
          "title": "Request latency per cluster (p50 / p95)",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 32},
          "id": 400,
          "panels": [],
          "title": "Cross-cluster Industrial Edge services",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "-- Mixed --"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 15,
                "gradientMode": "opacity",
                "hideFrom": {"legend": false, "tooltip": false, "viz": false},
                "insertNulls": false,
                "lineInterpolation": "smooth",
                "lineWidth": 1,
                "pointSize": 5,
                "scaleDistribution": {"type": "linear"},
                "showPoints": "never",
                "spanNulls": false,
                "stacking": {"group": "A", "mode": "none"},
                "thresholdsStyle": {"mode": "off"}
              },
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": {"h": 10, "w": 24, "x": 0, "y": 33},
          "id": 4,
          "options": {
            "legend": {"calcs": ["mean", "max"], "displayMode": "table", "placement": "right", "showLegend": true},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${ds_east}"},
              "expr": "sum(rate(istio_requests_total{reporter=\"source\", destination_service_namespace=~\"industrial-edge.*\"}[5m])) by (destination_service_name)",
              "legendFormat": "East {{ "{{destination_service_name}}" }}",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${ds_west}"},
              "expr": "sum(rate(istio_requests_total{reporter=\"source\", destination_service_namespace=~\"industrial-edge.*\"}[5m])) by (destination_service_name)",
              "legendFormat": "West {{ "{{destination_service_name}}" }}",
              "refId": "B"
            }
          ],
          "title": "Industrial Edge services request rate (East vs West)",
          "type": "timeseries"
        }
      ],
      "schemaVersion": 39,
      "tags": ["istio", "multi-cluster", "service-interconnect"],
      "templating": {
        "list": [
          {
            "current": {"selected": false, "text": "Prometheus", "value": "Prometheus"},
            "hide": 0,
            "includeAll": false,
            "label": "Hub datasource",
            "multi": false,
            "name": "ds_hub",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "regex": "/^Prometheus$/",
            "skipUrlSync": false,
            "type": "datasource"
          },
          {
            "current": {"selected": false, "text": "Prometheus-East", "value": "Prometheus-East"},
            "hide": 0,
            "includeAll": false,
            "label": "East datasource",
            "multi": false,
            "name": "ds_east",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "regex": "/East/",
            "skipUrlSync": false,
            "type": "datasource"
          },
          {
            "current": {"selected": false, "text": "Prometheus-West", "value": "Prometheus-West"},
            "hide": 0,
            "includeAll": false,
            "label": "West datasource",
            "multi": false,
            "name": "ds_west",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "regex": "/West/",
            "skipUrlSync": false,
            "type": "datasource"
          }
        ]
      },
      "time": {"from": "now-1h", "to": "now"},
      "timepicker": {},
      "timezone": "browser",
      "title": "Multi-Cluster Istio Metrics (via Service Interconnect)",
      "uid": "multi-cluster-istio",
      "version": 1,
      "weekStart": ""
    }
