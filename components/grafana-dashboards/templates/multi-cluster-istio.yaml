apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: multi-cluster-istio
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 2,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0},
          "id": 100,
          "panels": [],
          "title": "Cross-cluster Istio request rate (via Service Interconnect)",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "-- Mixed --"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 15,
                "gradientMode": "opacity",
                "hideFrom": {"legend": false, "tooltip": false, "viz": false},
                "insertNulls": false,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": {"type": "linear"},
                "showPoints": "never",
                "spanNulls": false,
                "stacking": {"group": "A", "mode": "none"},
                "thresholdsStyle": {"mode": "off"}
              },
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": {"h": 10, "w": 24, "x": 0, "y": 1},
          "id": 1,
          "options": {
            "legend": {"calcs": ["mean", "max"], "displayMode": "table", "placement": "right", "showLegend": true},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${ds_hub}"},
              "expr": "sum(rate(istio_requests_total{reporter=\"source\"}[5m]))",
              "legendFormat": "Hub",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${ds_east}"},
              "expr": "sum(rate(istio_tcp_connections_opened_total[5m])) or sum(rate(istio_requests_total{reporter=\"source\"}[5m]))",
              "legendFormat": "East L4/HTTP",
              "refId": "B"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${ds_west}"},
              "expr": "sum(rate(istio_tcp_connections_opened_total[5m])) or sum(rate(istio_requests_total{reporter=\"source\"}[5m]))",
              "legendFormat": "West L4/HTTP",
              "refId": "C"
            }
          ],
          "title": "Mesh traffic per cluster (L4 ztunnel + HTTP)",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 11},
          "id": 200,
          "panels": [],
          "title": "Cross-cluster error rate (5xx)",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "-- Mixed --"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "none",
                "hideFrom": {"legend": false, "tooltip": false, "viz": false},
                "insertNulls": false,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": {"type": "linear"},
                "showPoints": "never",
                "spanNulls": false,
                "stacking": {"group": "A", "mode": "none"},
                "thresholdsStyle": {"mode": "off"}
              },
              "decimals": 3,
              "max": 1,
              "min": 0,
              "unit": "percentunit"
            },
            "overrides": []
          },
          "gridPos": {"h": 9, "w": 24, "x": 0, "y": 12},
          "id": 2,
          "options": {
            "legend": {"calcs": ["mean", "max"], "displayMode": "table", "placement": "right", "showLegend": true},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${ds_hub}"},
              "expr": "sum(rate(istio_requests_total{reporter=\"source\", response_code=~\"5..\"}[5m])) / sum(rate(istio_requests_total{reporter=\"source\"}[5m]))",
              "legendFormat": "Hub 5xx",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${ds_east}"},
              "expr": "sum(rate(istio_tcp_connections_closed_total[5m])) / clamp_min(sum(rate(istio_tcp_connections_opened_total[5m])), 1)",
              "legendFormat": "East TCP close ratio",
              "refId": "B"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${ds_west}"},
              "expr": "sum(rate(istio_tcp_connections_closed_total[5m])) / clamp_min(sum(rate(istio_tcp_connections_opened_total[5m])), 1)",
              "legendFormat": "West TCP close ratio",
              "refId": "C"
            }
          ],
          "title": "5xx error ratio per cluster",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 21},
          "id": 300,
          "panels": [],
          "title": "Cross-cluster latency (p50 / p95 / p99)",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "-- Mixed --"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 0,
                "gradientMode": "none",
                "hideFrom": {"legend": false, "tooltip": false, "viz": false},
                "insertNulls": false,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": {"type": "linear"},
                "showPoints": "never",
                "spanNulls": false,
                "stacking": {"group": "A", "mode": "none"},
                "thresholdsStyle": {"mode": "off"}
              },
              "unit": "ms"
            },
            "overrides": []
          },
          "gridPos": {"h": 10, "w": 24, "x": 0, "y": 22},
          "id": 3,
          "options": {
            "legend": {"calcs": ["mean", "max"], "displayMode": "table", "placement": "right", "showLegend": true},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${ds_hub}"},
              "expr": "histogram_quantile(0.95, sum(rate(istio_request_duration_milliseconds_bucket{reporter=\"source\"}[5m])) by (le))",
              "legendFormat": "Hub p95",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${ds_east}"},
              "expr": "sum(rate(istio_tcp_received_bytes_total[5m]))",
              "legendFormat": "East TCP rx B/s",
              "refId": "B"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${ds_west}"},
              "expr": "sum(rate(istio_tcp_received_bytes_total[5m]))",
              "legendFormat": "West TCP rx B/s",
              "refId": "C"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${ds_hub}"},
              "expr": "histogram_quantile(0.50, sum(rate(istio_request_duration_milliseconds_bucket{reporter=\"source\"}[5m])) by (le))",
              "legendFormat": "Hub p50",
              "refId": "D"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${ds_east}"},
              "expr": "histogram_quantile(0.50, sum(rate(istio_request_duration_milliseconds_bucket{reporter=\"source\"}[5m])) by (le))",
              "legendFormat": "East p50",
              "refId": "E"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${ds_west}"},
              "expr": "histogram_quantile(0.50, sum(rate(istio_request_duration_milliseconds_bucket{reporter=\"source\"}[5m])) by (le))",
              "legendFormat": "West p50",
              "refId": "F"
            }
          ],
          "title": "Request latency per cluster (p50 / p95)",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 32},
          "id": 400,
          "panels": [],
          "title": "Cross-cluster Industrial Edge — Kafka & workloads",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "-- Mixed --"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [{"options": {"0": {"color": "red", "text": "Offline"}, "3": {"color": "green", "text": "Running"}}, "type": "value"}],
              "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 3}]}
            },
            "overrides": []
          },
          "gridPos": {"h": 5, "w": 6, "x": 0, "y": 33},
          "id": 4,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "horizontal",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${ds_east}"},
              "expr": "kafka_server_kafkaserver_brokerstate",
              "legendFormat": "East {{ "{{namespace}}" }}",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${ds_west}"},
              "expr": "kafka_server_kafkaserver_brokerstate",
              "legendFormat": "West {{ "{{namespace}}" }}",
              "refId": "B"
            }
          ],
          "title": "Kafka broker state (East vs West)",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "-- Mixed --"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}
            },
            "overrides": []
          },
          "gridPos": {"h": 5, "w": 6, "x": 6, "y": 33},
          "id": 5,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "horizontal",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${ds_east}"},
              "expr": "sum(kafka_controller_kafkacontroller_globaltopiccount)",
              "legendFormat": "East topics",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${ds_west}"},
              "expr": "sum(kafka_controller_kafkacontroller_globaltopiccount)",
              "legendFormat": "West topics",
              "refId": "B"
            }
          ],
          "title": "Kafka topics (East vs West)",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "-- Mixed --"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}
            },
            "overrides": []
          },
          "gridPos": {"h": 5, "w": 6, "x": 12, "y": 33},
          "id": 6,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "horizontal",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${ds_east}"},
              "expr": "sum(kafka_server_replicamanager_partitioncount)",
              "legendFormat": "East partitions",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${ds_west}"},
              "expr": "sum(kafka_server_replicamanager_partitioncount)",
              "legendFormat": "West partitions",
              "refId": "B"
            }
          ],
          "title": "Kafka partitions (East vs West)",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "-- Mixed --"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]}
            },
            "overrides": []
          },
          "gridPos": {"h": 5, "w": 6, "x": 18, "y": 33},
          "id": 7,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "horizontal",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${ds_east}"},
              "expr": "sum(kafka_server_replicamanager_underreplicatedpartitions)",
              "legendFormat": "East",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${ds_west}"},
              "expr": "sum(kafka_server_replicamanager_underreplicatedpartitions)",
              "legendFormat": "West",
              "refId": "B"
            }
          ],
          "title": "Under-replicated partitions",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "-- Mixed --"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 15,
                "gradientMode": "opacity",
                "hideFrom": {"legend": false, "tooltip": false, "viz": false},
                "insertNulls": false,
                "lineInterpolation": "smooth",
                "lineWidth": 1,
                "pointSize": 5,
                "scaleDistribution": {"type": "linear"},
                "showPoints": "never",
                "spanNulls": false,
                "stacking": {"group": "A", "mode": "none"},
                "thresholdsStyle": {"mode": "off"}
              },
              "unit": "ops"
            },
            "overrides": []
          },
          "gridPos": {"h": 10, "w": 24, "x": 0, "y": 38},
          "id": 8,
          "options": {
            "legend": {"calcs": ["mean", "max"], "displayMode": "table", "placement": "right", "showLegend": true},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${ds_east}"},
              "expr": "sum(kafka_server_brokertopicmetrics_messagesinpersec{_objectname=~\".*OneMinuteRate.*\"}) by (namespace)",
              "legendFormat": "East {{ "{{namespace}}" }}",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${ds_west}"},
              "expr": "sum(kafka_server_brokertopicmetrics_messagesinpersec{_objectname=~\".*OneMinuteRate.*\"}) by (namespace)",
              "legendFormat": "West {{ "{{namespace}}" }}",
              "refId": "B"
            }
          ],
          "title": "Kafka messages in/sec (East vs West)",
          "type": "timeseries"
        }
      ],
      "schemaVersion": 39,
      "tags": ["istio", "multi-cluster", "service-interconnect"],
      "templating": {
        "list": [
          {
            "current": {"selected": false, "text": "Prometheus", "value": "Prometheus"},
            "hide": 0,
            "includeAll": false,
            "label": "Hub datasource",
            "multi": false,
            "name": "ds_hub",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "regex": "/^Prometheus$/",
            "skipUrlSync": false,
            "type": "datasource"
          },
          {
            "current": {"selected": false, "text": "Prometheus-East", "value": "Prometheus-East"},
            "hide": 0,
            "includeAll": false,
            "label": "East datasource",
            "multi": false,
            "name": "ds_east",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "regex": "/East/",
            "skipUrlSync": false,
            "type": "datasource"
          },
          {
            "current": {"selected": false, "text": "Prometheus-West", "value": "Prometheus-West"},
            "hide": 0,
            "includeAll": false,
            "label": "West datasource",
            "multi": false,
            "name": "ds_west",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "regex": "/West/",
            "skipUrlSync": false,
            "type": "datasource"
          }
        ]
      },
      "time": {"from": "now-1h", "to": "now"},
      "timepicker": {},
      "timezone": "browser",
      "title": "Multi-Cluster Istio Metrics (via Service Interconnect)",
      "uid": "multi-cluster-istio",
      "version": 1,
      "weekStart": ""
    }
