apiVersion: v1
kind: ConfigMap
metadata:
  name: line-dashboard-config
  namespace: industrial-edge-tst-all
  annotations:
    argocd.argoproj.io/sync-wave: "4"
data:
  config.json: |
    {
      "websocketHost": "",
      "websocketPath": "/api/service-web/socket",
      "SERVER_TIMEOUT": 7500
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: line-dashboard
  namespace: industrial-edge-tst-all
  labels:
    app: line-dashboard
    app.kubernetes.io/part-of: industrial-edge
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: line-dashboard
  template:
    metadata:
      labels:
        app: line-dashboard
    spec:
      containers:
        - name: line-dashboard
          image: quay.io/hybridcloudpatterns/iot-frontend:latest
          ports:
            - containerPort: 8080
          env:
            - name: REACT_APP_GIT_COMMIT
              value: "hub-spoke"
          volumeMounts:
            - name: config
              mountPath: /var/www/html/conf/config.json
              subPath: config.json
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
        - name: iot-consumer
          image: quay.io/hybridcloudpatterns/iot-consumer:latest
          ports:
            - containerPort: 3000
          env:
            - name: MQTT_BROKER
              value: "mqtt://messaging:1883"
            - name: MQTT_TOPIC
              value: "iot-sensor/sw/#"
            - name: SOCKET_PATH
              value: "/api/service-web/socket"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: line-dashboard-config
---
apiVersion: v1
kind: Service
metadata:
  name: line-dashboard
  namespace: industrial-edge-tst-all
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  selector:
    app: line-dashboard
  ports:
    - name: frontend
      port: 8080
      targetPort: 8080
    - name: api
      port: 3000
      targetPort: 3000
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: line-dashboard
  namespace: industrial-edge-tst-all
  annotations:
    argocd.argoproj.io/sync-wave: "6"
    haproxy.router.openshift.io/timeout: 3600s
spec:
  host: line-dashboard-industrial-edge-tst-all.{{ include "industrial-edge.domain" . }}
  to:
    kind: Service
    name: line-dashboard
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Allow
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: line-dashboard-api
  namespace: industrial-edge-tst-all
  annotations:
    argocd.argoproj.io/sync-wave: "6"
    haproxy.router.openshift.io/timeout: 3600s
spec:
  host: line-dashboard-industrial-edge-tst-all.{{ include "industrial-edge.domain" . }}
  path: /api
  to:
    kind: Service
    name: line-dashboard
  port:
    targetPort: 3000
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Allow
