apiVersion: camel.apache.org/v1
kind: IntegrationPlatform
metadata:
  name: camel-k
  namespace: industrial-edge-tst-all
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  build:
    registry:
      address: image-registry.openshift-image-registry.svc:5000
      organization: industrial-edge-tst-all
  profile: Kubernetes
---
# Camel K operator (openshift-operators) pushes IntegrationKit images to the namespace registry.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: camel-k-operator-image-builder
  namespace: industrial-edge-tst-all
  annotations:
    argocd.argoproj.io/sync-wave: "3"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:image-builder
subjects:
  - kind: ServiceAccount
    name: camel-k-operator
    namespace: openshift-operators
---
apiVersion: camel.apache.org/v1
kind: Integration
metadata:
  name: mqtt-to-kafka
  namespace: industrial-edge-tst-all
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  dependencies:
    # Routes use paho: URIs; catalog artifact is camel-paho (not camel-mqtt).
    - camel:paho
    - camel:kafka
  traits:
    pull-secret:
      enabled: true
      configuration:
        secretName: camel-k-registry-docker
  flows:
    - from:
        uri: "paho:iot-sensor/sw/temperature?brokerUrl=tcp://messaging.industrial-edge-tst-all.svc:1883"
      to:
        uri: "kafka:temperature?brokers=dev-cluster-kafka-bootstrap.industrial-edge-tst-all.svc:9092"
    - from:
        uri: "paho:iot-sensor/sw/vibration?brokerUrl=tcp://messaging.industrial-edge-tst-all.svc:1883"
      to:
        uri: "kafka:vibration?brokers=dev-cluster-kafka-bootstrap.industrial-edge-tst-all.svc:9092"
