{{- /*
  Maps Skupper/hub advertised broker hostnames to the local broker pod IP on this spoke.
  Without this, in-cluster clients (mqtt-to-kafka, Camel) cannot resolve
  dev-cluster-broker-0-<clusterName>.dev-cluster-kafka-brokers.* after metadata exchange.
*/ -}}
{{- $pod := lookup "v1" "Pod" "industrial-edge-tst-all" "dev-cluster-broker-0" }}
{{- if and $pod $pod.status.podIP }}
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: dev-cluster-kafka-brokers-advertised
  namespace: industrial-edge-tst-all
  labels:
    kubernetes.io/service-name: dev-cluster-kafka-brokers
  annotations:
    argocd.argoproj.io/sync-wave: "5"
addressType: IPv4
ports:
  - name: tcp
    port: 9092
    protocol: TCP
endpoints:
  - addresses:
      - {{ $pod.status.podIP | quote }}
    hostname: dev-cluster-broker-0-{{ .Values.clusterName }}
    conditions:
      ready: true
{{- end }}
