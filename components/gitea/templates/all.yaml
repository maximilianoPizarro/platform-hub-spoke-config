apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gitea-anyuid
  annotations:
    argocd.argoproj.io/sync-wave: "0"
subjects:
  - kind: ServiceAccount
    name: field-content-gitea-chart
    namespace: gitea
  - kind: ServiceAccount
    name: default
    namespace: gitea
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:anyuid
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: gitea
  namespace: gitea
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  host: gitea-gitea.{{ .Values.clusterDomain }}
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  to:
    kind: Service
    name: field-content-gitea-chart-http
    weight: 100
  wildcardPolicy: None
---
apiVersion: batch/v1
kind: Job
metadata:
  name: gitea-admin-setup
  namespace: gitea
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: default
      containers:
        - name: setup
          image: curlimages/curl:latest
          env:
            - name: ADMIN_USER
              value: {{ .Values.adminUser | quote }}
            - name: ADMIN_PASS
              value: {{ .Values.adminPassword | quote }}
            - name: ADMIN_EMAIL
              value: {{ .Values.adminEmail | quote }}
          command:
            - /bin/sh
            - -c
            - |
              set -e
              BASE="http://field-content-gitea-chart-http.gitea.svc.cluster.local:3000"
              AUTH="${ADMIN_USER}:${ADMIN_PASS}"
              echo "Waiting for Gitea API..."
              for attempt in $(seq 1 60); do
                if curl -sf "$BASE/api/v1/version" >/dev/null 2>&1; then break; fi
                echo "  attempt $attempt/60 ..."
                sleep 5
              done
              curl -sf "$BASE/api/v1/version" || { echo "Gitea not available" >&2; exit 1; }
              echo "Gitea API ready."

              echo "Creating developer-hub org..."
              ORG_JSON='{"username":"developer-hub","full_name":"Developer Hub","visibility":"public"}'
              CODE=$(curl -sS -o /dev/null -w "%{http_code}" -X POST "$BASE/api/v1/orgs" \
                -u "$AUTH" -H "Content-Type: application/json" -d "$ORG_JSON" || true)
              echo "  developer-hub org: HTTP $CODE"

              echo "Creating platformadmin user and org..."
              PA_JSON='{"username":"platformadmin","password":"Welcome123!","email":"platformadmin@developer-hub.local","must_change_password":false,"send_notify":false}'
              curl -sS -o /dev/null -w "  platformadmin user: HTTP %{http_code}\n" -X POST "$BASE/api/v1/admin/users" \
                -u "$AUTH" -H "Content-Type: application/json" -d "$PA_JSON" || true
              PA_ORG='{"username":"ws-platformadmin","visibility":"public","description":"Workshop repos for platformadmin"}'
              curl -sS -o /dev/null -w "  ws-platformadmin org: HTTP %{http_code}\n" -X POST "$BASE/api/v1/orgs" \
                -u "$AUTH" -H "Content-Type: application/json" -d "$PA_ORG" || true
              PA_TID=$(curl -sS -u "$AUTH" "$BASE/api/v1/orgs/ws-platformadmin/teams" 2>/dev/null \
                | sed -n 's/.*"id":\([0-9]*\).*"name":"Owners".*/\1/p')
              if [ -n "$PA_TID" ]; then
                curl -sS -o /dev/null -X PUT "$BASE/api/v1/teams/${PA_TID}/members/platformadmin" \
                  -u "$AUTH" || true
              fi

              USER_COUNT={{ .Values.userCount | default 200 }}
              echo "Creating $USER_COUNT users and orgs..."
              for i in $(seq 1 $USER_COUNT); do
                U="user${i}"
                ORG="ws-${U}"

                U_JSON=$(printf '{"username":"%s","password":"Welcome123!","email":"%s@developer-hub.local","must_change_password":false,"send_notify":false}' "$U" "$U")
                C=$(curl -sS -o /dev/null -w "%{http_code}" -X POST "$BASE/api/v1/admin/users" \
                  -u "$AUTH" -H "Content-Type: application/json" -d "$U_JSON" || true)

                O_JSON=$(printf '{"username":"%s","visibility":"public","description":"Workshop repos for %s"}' "$ORG" "$U")
                O=$(curl -sS -o /dev/null -w "%{http_code}" -X POST "$BASE/api/v1/orgs" \
                  -u "$AUTH" -H "Content-Type: application/json" -d "$O_JSON" || true)

                TID=$(curl -sS -u "$AUTH" "$BASE/api/v1/orgs/${ORG}/teams" 2>/dev/null \
                  | sed -n 's/.*"id":\([0-9]*\).*"name":"Owners".*/\1/p')
                if [ -n "$TID" ]; then
                  curl -sS -o /dev/null -X PUT "$BASE/api/v1/teams/${TID}/members/${U}" \
                    -u "$AUTH" || true
                fi
                echo "${U}: user=${C} org=${O}"
              done
              echo "All users and orgs created."
  backoffLimit: 5
