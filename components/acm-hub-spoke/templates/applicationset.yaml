apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: industrial-edge-spoke
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=zero"]
  generators:
    - matrix:
        generators:
          - list:
              elements:
                - clusterName: east
                  targetRevision: main
                  clusterDomain: {{ .Values.clusters.east.domain | quote }}
                - clusterName: west
                  targetRevision: main
                  clusterDomain: {{ .Values.clusters.west.domain | quote }}
          - list:
              elements:
                - id: namespaces
                  path: components/namespaces
                  namespace: openshift-gitops
                - id: operators
                  path: components/operators
                  namespace: openshift-operators
                - id: servicemeshoperator3
                  path: components/servicemeshoperator3
                  namespace: openshift-operators
                - id: industrial-edge-tst
                  path: components/industrial-edge-tst
                  namespace: industrial-edge-tst-all
                - id: industrial-edge-stormshift
                  path: components/industrial-edge-stormshift
                  namespace: industrial-edge-stormshift-messaging
                - id: industrial-edge-pipelines
                  path: components/industrial-edge-pipelines
                  namespace: industrial-edge-ci
                - id: acs-secured-cluster
                  path: components/acs-secured-cluster
                  namespace: stackrox
                - id: observability
                  path: components/observability
                  namespace: openshift-cluster-observability-operator
                - id: spoke-dashboards
                  path: components/spoke-dashboards
                  namespace: openshift-cluster-observability-operator
                - id: istio-monitoring
                  path: components/istio-monitoring
                  namespace: istio-system
                - id: console-links
                  path: components/console-links
                  namespace: openshift-gitops
                - id: spoke-gateway
                  path: components/spoke-gateway
                  namespace: spoke-gateway-system
                - id: spoke-interconnect
                  path: components/spoke-interconnect
                  namespace: service-interconnect
                - id: rhcl-operator
                  path: components/rhcl-operator
                  namespace: redhat-connectivity-link-operator
                - id: kiali
                  path: components/kiali
                  namespace: openshift-cluster-observability-operator
                - id: ie-anomaly-alerter
                  path: components/ie-anomaly-alerter
                  namespace: industrial-edge-tst-all
                - id: kubecost
                  path: components/kubecost
                  namespace: kubecost
  template:
    metadata:
      name: '{{`{{.id}}-{{.clusterName}}`}}'
      labels:
        app.kubernetes.io/part-of: platform-hub-spoke
        apps.open-cluster-management.io/cluster-set: global
    spec:
      project: default
      source:
        repoURL: {{ .Values.gitops.repoUrl }}
        targetRevision: '{{`{{.targetRevision}}`}}'
        path: '{{`{{.path}}`}}'
        helm:
          valuesObject:
            clusterDomain: '{{`{{.clusterDomain}}`}}'
            clusterName: '{{`{{.clusterName}}`}}'
            clusterRole: spoke
            hubClusterDomain: {{ .Values.clusterDomain | quote }}
            subscriptions:
              - name: skupper-operator
                namespace: openshift-operators
                channel: stable-2
                source: redhat-operators
              - name: grafana-operator
                namespace: openshift-operators
                channel: v5
                source: community-operators
              - name: kiali-ossm
                namespace: openshift-operators
                channel: stable
                source: redhat-operators
            global:
              localClusterDomain: '{{`{{.clusterDomain}}`}}'
              hubClusterDomain: {{ .Values.clusterDomain | quote }}
      destination:
        name: '{{`{{.clusterName}}`}}'
        namespace: '{{`{{.namespace}}`}}'
      ignoreDifferences:
        - group: route.openshift.io
          kind: Route
          jsonPointers:
            - /spec/host
            - /status
        - group: apps
          kind: Deployment
          jsonPointers:
            - /spec/template/metadata/annotations
        - group: ""
          kind: Service
          jsonPointers:
            - /spec/clusterIP
            - /spec/clusterIPs
        - group: ""
          kind: Secret
          jsonPointers:
            - /data
        - group: kafka.strimzi.io
          kind: "*"
          jsonPointers:
            - /metadata/annotations
            - /status
        - group: platform.stackrox.io
          kind: "*"
          jsonPointers:
            - /metadata/annotations
            - /status
        - group: grafana.integreatly.org
          kind: "*"
          jsonPointers:
            - /metadata/annotations
            - /status
        - group: operators.coreos.com
          kind: Subscription
          jsonPointers:
            - /metadata/annotations
            - /status
        - group: operators.coreos.com
          kind: OperatorGroup
          jsonPointers:
            - /metadata/annotations
            - /metadata/labels
            - /spec
        - group: tekton.dev
          kind: "*"
          jsonPointers:
            - /metadata/annotations
            - /metadata/labels
            - /spec/tasks
        - group: broker.amq.io
          kind: "*"
          jsonPointers:
            - /metadata/annotations
            - /status
        - group: ""
          kind: Namespace
          jsonPointers:
            - /metadata/annotations
            - /metadata/labels
        - group: skupper.io
          kind: "*"
          jsonPointers:
            - /metadata/annotations
            - /status
        - group: gateway.networking.k8s.io
          kind: "*"
          jsonPointers:
            - /metadata/annotations
            - /status
        - group: kiali.io
          kind: "*"
          jsonPointers:
            - /metadata/annotations
            - /status
        - group: console.openshift.io
          kind: ConsoleLink
          jsonPointers:
            - /metadata/annotations
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
          - SkipDryRunOnMissingResource=true
