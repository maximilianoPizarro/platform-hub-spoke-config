apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: industrial-edge-spoke
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: platform-hub-spoke
    argocd.argoproj.io/application-set-controller: openshift-gitops
    # Required for ACM console to list generated Applications on this ApplicationSet
    cluster.open-cluster-management.io/placement: hub-spoke-placement
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    apps.open-cluster-management.io/source-repository: {{ .Values.gitops.repoUrl | quote }}
    apps.open-cluster-management.io/gitops-cluster: hub-spoke-gitops
spec:
  generators:
    - clusterDecisionResource:
        configMapRef: acm-placement
        labelSelector:
          matchLabels:
            cluster.open-cluster-management.io/placement: hub-spoke-placement
        requeueAfterSeconds: 180
  template:
    metadata:
      name: '{{`{{name}}-spoke-components`}}'
      labels:
        app.kubernetes.io/part-of: platform-hub-spoke
        apps.open-cluster-management.io/cluster-set: global
        apps.open-cluster-management.io/ocm-managed-cluster: '{{`{{name}}`}}'
        cluster.open-cluster-management.io/placement: hub-spoke-placement
        argocd.argoproj.io/application-set-name: industrial-edge-spoke
      annotations:
        apps.open-cluster-management.io/ocm-managed-cluster: '{{`{{name}}`}}'
        apps.open-cluster-management.io/ocm-managed-cluster-app-namespace: openshift-gitops
    spec:
      project: default
      source:
        repoURL: {{ .Values.gitops.repoUrl }}
        targetRevision: {{ .Values.gitops.revision | default "main" | quote }}
        path: '{{`{{name}}`}}'
      destination:
        name: '{{`{{name}}`}}'
        namespace: openshift-gitops
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
