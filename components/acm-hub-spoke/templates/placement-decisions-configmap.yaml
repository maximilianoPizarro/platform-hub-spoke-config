# Duck-typing definition for ApplicationSet clusterDecisionResource → PlacementDecision.status.decisions
# See https://argo-cd.readthedocs.io/en/stable/operator-manual/applicationset/Generators-Cluster-Decision-Resource/
apiVersion: v1
kind: ConfigMap
metadata:
  name: acm-hub-spoke-placement-decisions
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: platform-hub-spoke
  annotations:
    argocd.argoproj.io/sync-wave: "2"
data:
  apiVersion: cluster.open-cluster-management.io/v1beta1
  kind: placementdecisions
  statusListKey: decisions
  matchKey: clusterName
