clusterRole: hub
clusterName: hub
clusterDomain: apps.cluster.example.com

operator:
  channel: candidate-v2
  source: community-operators
  sourceNamespace: openshift-marketplace

# Existing cluster secret — never commit credentials; Argo must not prune this Secret.
aiCredentials:
  secretName: kairos-ai-credentials
  secretKey: api-key

aiModel:
  apiURL: "https://isvc-granite-31-8b-fp8-predictor.sandbox-shared-models.svc.cluster.local:8443/v1/chat/completions"
  model: granite-31-8b
  temperature: "0.3"
  timeoutSeconds: 60

console:
  enabled: true
  name: kairos
  image: quay.io/maximilianopizarro/kairos-console:v2.0.1-fix1

# Cluster-local agent (reports to hub console from spokes).
clusterAgent:
  enabled: true
  mode: supervised
  dryRun: true
  hubReporting:
    enabled: true

# Watch scaffolded Industrial Edge namespaces by suffix (Developer Hub templates).
environmentAgents:
  dev:
    enabled: true
    mode: autopilot
    namespaceSuffix: "-dev"
    maxActionsPerHour: 50
    dryRun: false
  qa:
    enabled: true
    mode: supervised
    namespaceSuffix: "-qa"
    maxActionsPerHour: 20
    dryRun: false
  prod:
    enabled: true
    mode: supervised
    namespaceSuffix: "-prod"
    maxActionsPerHour: 10
    dryRun: true

# SmartScalingPolicy (Kairos “scan” policies) for platform machine-sensors.
sensorScanPolicies:
  enabled: true
  baselineNamespace: industrial-edge-tst-all
  otelEndpoint: cluster-collector-collector.openshift-opentelemetry.svc.cluster.local:4317
  prometheusEndpoint: prometheus-k8s.openshift-monitoring.svc.cluster.local:9090
