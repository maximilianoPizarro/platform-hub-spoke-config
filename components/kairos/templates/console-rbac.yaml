{{- if .Values.console.enabled }}
# Console v2.0.2+ lists SmartScalingPolicy via the in-cluster API (policies_k8s.go).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kairos-console-smartscaling
  annotations:
    argocd.argoproj.io/sync-wave: "3"
rules:
  - apiGroups:
      - kairos.maximilianopizarro.github.io
    resources:
      - smartscalingpolicies
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kairos-console-smartscaling
  annotations:
    argocd.argoproj.io/sync-wave: "3"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kairos-console-smartscaling
subjects:
  - kind: ServiceAccount
    name: kairos-console
    namespace: kairos-system
{{- end }}
