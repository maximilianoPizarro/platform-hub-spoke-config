apiVersion: apps/v1
kind: Deployment
metadata:
  name: skupper-network-observer
  namespace: service-interconnect
  labels:
    app: skupper-network-observer
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: skupper-network-observer
  template:
    metadata:
      labels:
        app: skupper-network-observer
    spec:
      serviceAccountName: skupper-network-observer
      containers:
        - name: network-observer
          image: quay.io/skupper/network-observer:2.1.3
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: SKUPPER_ENABLE_CONSOLE
              value: "true"
            - name: SKUPPER_CONSOLE_AUTH
              value: "unsecured"
            - name: SKUPPER_COLLECTOR_TLS_VERIFY
              value: "false"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /api/v1alpha1/sites
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1alpha1/sites
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: skupper-network-observer
  namespace: service-interconnect
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: skupper-network-observer
  annotations:
    argocd.argoproj.io/sync-wave: "0"
rules:
  - apiGroups: ["skupper.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: skupper-network-observer
  annotations:
    argocd.argoproj.io/sync-wave: "0"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: skupper-network-observer
subjects:
  - kind: ServiceAccount
    name: skupper-network-observer
    namespace: service-interconnect
---
apiVersion: v1
kind: Service
metadata:
  name: skupper-network-observer
  namespace: service-interconnect
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  selector:
    app: skupper-network-observer
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: skupper-console
  namespace: service-interconnect
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  host: skupper-console.{{ .Values.clusterDomain }}
  to:
    kind: Service
    name: skupper-network-observer
  port:
    targetPort: http
  tls:
    termination: edge
