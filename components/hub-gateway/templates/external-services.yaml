{{- if .Values.clusters.east.domain }}
apiVersion: v1
kind: Service
metadata:
  name: industrial-edge-east-front
  namespace: hub-gateway-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  type: ExternalName
  externalName: ie-gateway-east.service-interconnect.svc.cluster.local
  ports:
    - name: http
      port: 8080
      protocol: TCP
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: industrial-edge-east-api
  namespace: hub-gateway-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  type: ExternalName
  externalName: ie-gateway-east.service-interconnect.svc.cluster.local
  ports:
    - name: http
      port: 8080
      protocol: TCP
      targetPort: 8080
{{- end }}
---
