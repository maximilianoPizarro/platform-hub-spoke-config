apiVersion: v1
kind: Namespace
metadata:
  name: service-interconnect
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/part-of: platform-hub-spoke
---
apiVersion: skupper.io/v2alpha1
kind: Site
metadata:
  name: hub
  namespace: service-interconnect
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  linkAccess: route
---
apiVersion: skupper.io/v2alpha1
kind: AccessGrant
metadata:
  name: spoke-link
  namespace: service-interconnect
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  redemptionsAllowed: 10
  expirationWindow: 720h
---
apiVersion: skupper.io/v2alpha1
kind: Listener
metadata:
  name: ie-gateway-east
  namespace: service-interconnect
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  routingKey: ie-gateway-east
  host: ie-gateway-east
  port: 8080
---
apiVersion: skupper.io/v2alpha1
