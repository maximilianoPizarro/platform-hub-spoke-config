{{- if .Values.bucketInit.enabled | default true }}
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-bucket-init
  namespace: industrial-edge-ml-workspace
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 6
  activeDeadlineSeconds: 600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: {{ .Values.bucketInit.image | default "quay.io/minio/mc:latest" | quote }}
          env:
            - name: MC_CONFIG_DIR
              value: /tmp/.mc
          command:
            - /bin/sh
            - -c
            - |
              set -e
              mkdir -p /tmp/.mc
              MC="mc --insecure"
              $MC alias set local http://minio.industrial-edge-ml-workspace.svc:9000 {{ .Values.minioAccessKey | default "minio" }} {{ .Values.minioSecretKey | default "minio123" }}
              for bucket in {{ join " " .Values.bucketInit.buckets }}; do
                echo "Ensuring bucket: $bucket"
                $MC mb --ignore-existing "local/$bucket"
              done
              echo "MinIO buckets ready"
{{- end }}
