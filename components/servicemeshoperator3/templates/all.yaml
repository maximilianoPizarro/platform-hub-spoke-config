apiVersion: sailoperator.io/v1
kind: Istio
metadata:
  name: default
  namespace: istio-system
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  namespace: istio-system
  profile: ambient
  values:
    pilot:
      env:
        PILOT_ENABLE_AMBIENT: "true"
      trustedZtunnelNamespace: ztunnel
    global:
      platform: openshift
---
apiVersion: v1
kind: Namespace
metadata:
  name: istio-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: sailoperator.io/v1
kind: IstioCNI
metadata:
  name: default
  namespace: istio-cni
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  namespace: istio-cni
---
apiVersion: v1
kind: Namespace
metadata:
  name: istio-cni
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: v1
kind: Namespace
metadata:
  name: ztunnel
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: sailoperator.io/v1
kind: ZTunnel
metadata:
  name: default
  namespace: ztunnel
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  namespace: ztunnel
  profile: ambient
---
apiVersion: telemetry.istio.io/v1
kind: Telemetry
metadata:
  name: mesh-default
  namespace: istio-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  metrics:
    - providers:
        - name: prometheus
{{- $waypointNamespaces := list
  "industrial-edge-tst-all"
  "industrial-edge-stormshift-messaging"
  "industrial-edge-data-lake"
  "hub-gateway-system"
}}
{{- range $waypointNamespaces }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ . }}-waypoint
  namespace: {{ . }}
  labels:
    istio.io/waypoint-for: service
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  gatewayClassName: istio-waypoint
  listeners:
    - name: mesh
      port: 15008
      protocol: HBONE
{{- end }}
