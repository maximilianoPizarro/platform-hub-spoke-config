apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-metrics-config
  namespace: industrial-edge-stormshift-messaging
  annotations:
    argocd.argoproj.io/sync-wave: "2"
data:
  kafka-metrics-config.yml: |
    lowercaseOutputName: true
    lowercaseOutputLabelNames: true
    rules:
      - pattern: "kafka.server<type=BrokerTopicMetrics, name=(.+), topic=(.+)><>(Count|OneMinuteRate|FiveMinuteRate|MeanRate)"
        name: kafka_server_brokertopicmetrics_$1
        type: GAUGE
        labels:
          topic: "$2"
      - pattern: "kafka.server<type=BrokerTopicMetrics, name=(.+)><>(Count|OneMinuteRate|FiveMinuteRate|MeanRate)"
        name: kafka_server_brokertopicmetrics_$1
        type: GAUGE
      - pattern: "kafka.server<type=(.+), name=(.+), clientId=(.+), topic=(.+), partition=(.*)><>Value"
        name: kafka_server_$1_$2
        type: GAUGE
        labels:
          clientId: "$3"
          topic: "$4"
          partition: "$5"
      - pattern: "kafka.server<type=(.+), name=(.+)><>Value"
        name: kafka_server_$1_$2
        type: GAUGE
      - pattern: "kafka.server<type=(.+), name=(.+)><>Count"
        name: kafka_server_$1_$2_total
        type: COUNTER
      - pattern: "kafka.network<type=(.+), name=(.+), request=(.+)><>Count"
        name: kafka_network_$1_$2_total
        type: COUNTER
        labels:
          request: "$3"
      - pattern: "kafka.controller<type=(.+), name=(.+)><>(Count|Value)"
        name: kafka_controller_$1_$2
        type: GAUGE
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: broker
  namespace: industrial-edge-stormshift-messaging
  labels:
    strimzi.io/cluster: factory-cluster
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  roles:
    - controller
    - broker
  storage:
    type: ephemeral
---
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: factory-cluster
  namespace: industrial-edge-stormshift-messaging
  annotations:
    strimzi.io/kraft: enabled
    strimzi.io/node-pools: enabled
    argocd.argoproj.io/sync-wave: "3"
spec:
  kafka:
    version: 4.2.0
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
        configuration:
          brokers:
            - broker: 0
              advertisedHost: factory-cluster-broker-0-{{ .Values.clusterName }}.factory-cluster-kafka-brokers.industrial-edge-stormshift-messaging.svc.cluster.local
              advertisedPort: 9092
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
    metricsConfig:
      type: jmxPrometheusExporter
      valueFrom:
        configMapKeyRef:
          name: kafka-metrics-config
          key: kafka-metrics-config.yml
  entityOperator:
    topicOperator: {}
