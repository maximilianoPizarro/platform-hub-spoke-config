{{- $domain := .Values.clusterDomain | default "apps.cluster.example.com" -}}
---
apiVersion: v1
kind: Namespace
metadata:
  name: neuroface
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: v1
kind: Secret
metadata:
  name: neuroface-maas-api-key
  namespace: neuroface
  annotations:
    argocd.argoproj.io/sync-wave: "1"
type: Opaque
stringData:
  api-key: {{ .Values.neuroface.chat.apiKey | default "CHANGEME-inject-via-RHDP" | quote }}
