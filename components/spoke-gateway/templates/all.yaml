apiVersion: v1
kind: Namespace
metadata:
  name: spoke-gateway-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/part-of: platform-hub-spoke
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: spoke-gateway
  namespace: spoke-gateway-system
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    networking.istio.io/service-type: ClusterIP
spec:
  gatewayClassName: istio
  listeners:
    - name: http
      port: 8080
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-spoke-gateway
  namespace: industrial-edge-tst-all
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: spoke-gateway-system
  to:
    - group: ""
      kind: Service
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-spoke-gateway-messaging
  namespace: industrial-edge-stormshift-messaging
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: spoke-gateway-system
  to:
    - group: ""
      kind: Service
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ie-frontend
  namespace: spoke-gateway-system
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  parentRefs:
    - name: spoke-gateway
      namespace: spoke-gateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: line-dashboard
          namespace: industrial-edge-tst-all
          port: 3000
    - backendRefs:
        - name: line-dashboard
          namespace: industrial-edge-tst-all
          port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ie-anomaly-detection
  namespace: spoke-gateway-system
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  parentRefs:
    - name: spoke-gateway
      namespace: spoke-gateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /inference
      backendRefs:
        - name: modelmesh-serving
          namespace: industrial-edge-tst-all
          port: 8008
