apiVersion: v1
kind: Namespace
metadata:
  name: service-interconnect
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/part-of: platform-hub-spoke
---
apiVersion: skupper.io/v2alpha1
kind: Site
metadata:
  name: {{ .Values.clusterName }}
  namespace: service-interconnect
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  linkAccess: route
---
apiVersion: skupper.io/v2alpha1
kind: Connector
metadata:
  name: ie-gateway-{{ .Values.clusterName }}
  namespace: service-interconnect
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  routingKey: ie-gateway-{{ .Values.clusterName }}
  host: spoke-gateway-istio.spoke-gateway-system.svc.cluster.local
  port: 8080
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus-auth-proxy
  namespace: service-interconnect
  annotations:
    argocd.argoproj.io/sync-wave: "2"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-auth-proxy-{{ .Values.clusterName }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-monitoring-view
subjects:
  - kind: ServiceAccount
    name: prometheus-auth-proxy
    namespace: service-interconnect
---
apiVersion: v1
kind: Secret
metadata:
  name: prometheus-auth-proxy-token
  namespace: service-interconnect
  annotations:
    kubernetes.io/service-account.name: prometheus-auth-proxy
    argocd.argoproj.io/sync-wave: "2"
type: kubernetes.io/service-account-token
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-proxy-config
  namespace: service-interconnect
  annotations:
    argocd.argoproj.io/sync-wave: "2"
data:
  nginx.conf: |
    worker_processes 1;
    pid /tmp/nginx.pid;
    error_log /dev/stderr warn;
    events { worker_connections 64; }
    http {
      client_body_temp_path /tmp/client_temp;
      proxy_temp_path /tmp/proxy_temp;
      fastcgi_temp_path /tmp/fastcgi_temp;
      uwsgi_temp_path /tmp/uwsgi_temp;
      scgi_temp_path /tmp/scgi_temp;
      server {
        listen 9091;
        location / {
          proxy_pass https://thanos-querier.openshift-monitoring.svc.cluster.local:9091;
          proxy_ssl_verify off;
          proxy_set_header Authorization "Bearer PROXY_TOKEN";
          proxy_set_header Host thanos-querier.openshift-monitoring.svc.cluster.local;
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-auth-proxy
  namespace: service-interconnect
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus-auth-proxy
  template:
    metadata:
      labels:
        app: prometheus-auth-proxy
    spec:
      serviceAccountName: prometheus-auth-proxy
      initContainers:
        - name: inject-token
          image: registry.access.redhat.com/ubi9/ubi-minimal:latest
          command:
            - /bin/sh
            - -c
            - |
              TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              sed "s|PROXY_TOKEN|${TOKEN}|g" /config-template/nginx.conf > /config/nginx.conf
          volumeMounts:
            - name: config-template
              mountPath: /config-template
            - name: config
              mountPath: /config
      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:alpine
          ports:
            - containerPort: 9091
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: config-template
          configMap:
            name: prometheus-proxy-config
        - name: config
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-auth-proxy
  namespace: service-interconnect
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  selector:
    app: prometheus-auth-proxy
  ports:
    - port: 9091
      targetPort: 9091
      protocol: TCP
---
apiVersion: skupper.io/v2alpha1
kind: Connector
metadata:
  name: prometheus-{{ .Values.clusterName }}
  namespace: service-interconnect
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  routingKey: prometheus-{{ .Values.clusterName }}
  host: prometheus-auth-proxy.service-interconnect.svc.cluster.local
  port: 9091
