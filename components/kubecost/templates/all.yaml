apiVersion: v1
kind: Namespace
metadata:
  name: kubecost
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: kubecost
  namespace: kubecost
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  upgradeStrategy: Default
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: kubecost-operator
  namespace: kubecost
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  channel: {{ .Values.channel }}
  installPlanApproval: Automatic
  name: kubecost-operator
  source: certified-operators
  sourceNamespace: openshift-marketplace
---
{{- if .Values.federatedStore.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.federatedStore.secretName }}
  namespace: kubecost
  annotations:
    argocd.argoproj.io/sync-wave: "3"
type: Opaque
stringData:
  federated-store.yaml: |
    type: S3
    config:
      bucket: {{ .Values.federatedStore.bucket | required "federatedStore.bucket is required when federatedStore.enabled=true" }}
      endpoint: {{ .Values.federatedStore.endpoint | required "federatedStore.endpoint is required when federatedStore.enabled=true" }}
      region: {{ .Values.federatedStore.region | default "us-east-1" }}
      access_key: {{ .Values.federatedStore.accessKey | required "federatedStore.accessKey is required when federatedStore.enabled=true" }}
      secret_key: {{ .Values.federatedStore.secretKey | required "federatedStore.secretKey is required when federatedStore.enabled=true" }}
      insecure: false
{{- end }}
---
{{- $isAgent := or (eq .Values.role "agent") (eq .Values.clusterRole "spoke") }}
apiVersion: charts.kubecost.com/v1alpha1
kind: CostAnalyzer
metadata:
  name: kubecost
  namespace: kubecost
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  kubecostProductConfigs:
    clusterName: {{ .Values.clusterName | default "hub" }}
  federatedETL:
    federatedCluster: true
    agentOnly: {{ $isAgent }}
  {{- if .Values.federatedStore.enabled }}
  kubecostModel:
    federatedStorageConfigSecret: {{ .Values.federatedStore.secretName }}
  {{- if not $isAgent }}
  kubecostAggregator:
    deployMethod: statefulset
  {{- end }}
  {{- end }}
  prometheus:
    server:
      global:
        external_labels:
          cluster_id: {{ .Values.clusterName | default "hub" }}
  {{- if not $isAgent }}
  service:
    type: ClusterIP
  {{- end }}
