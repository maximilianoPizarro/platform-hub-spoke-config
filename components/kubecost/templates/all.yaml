apiVersion: v1
kind: Namespace
metadata:
  name: kubecost
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: kubecost
  namespace: kubecost
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  targetNamespaces:
    - kubecost
  upgradeStrategy: Default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubecost-anyuid-scc
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:anyuid
subjects:
  - kind: ServiceAccount
    name: kubecost-cost-analyzer
    namespace: kubecost
  - kind: ServiceAccount
    name: kubecost-grafana
    namespace: kubecost
  - kind: ServiceAccount
    name: kubecost-prometheus-server
    namespace: kubecost
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: kubecost-operator
  namespace: kubecost
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  channel: {{ .Values.channel }}
  installPlanApproval: Automatic
  name: kubecost-operator
  source: certified-operators
  sourceNamespace: openshift-marketplace
---
apiVersion: v1
kind: Secret
metadata:
  name: kubecost-federated-store
  namespace: kubecost
  annotations:
    argocd.argoproj.io/sync-wave: "3"
type: Opaque
stringData:
  federated-store.yaml: |
    type: S3
    config:
      bucket: {{ .Values.federatedStore.bucket }}
      endpoint: {{ .Values.federatedStore.endpoint }}
      region: {{ .Values.federatedStore.region | default "us-east-1" }}
      access_key: {{ .Values.federatedStore.accessKey }}
      secret_key: {{ .Values.federatedStore.secretKey }}
      insecure: true
---
{{- $isAgent := or (eq .Values.role "agent") (eq .Values.clusterRole "spoke") }}
apiVersion: charts.kubecost.com/v1alpha1
kind: CostAnalyzer
metadata:
  name: kubecost
  namespace: kubecost
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  kubecostProductConfigs:
    clusterName: {{ .Values.clusterName | default "hub" }}
  federatedETL:
    federatedCluster: true
    agentOnly: {{ $isAgent }}
  kubecostModel:
    federatedStorageConfigSecret: kubecost-federated-store
  {{- if not $isAgent }}
  kubecostAggregator:
    deployMethod: statefulset
  {{- end }}
  prometheus:
    server:
      global:
        external_labels:
          cluster_id: {{ .Values.clusterName | default "hub" }}
  {{- if not $isAgent }}
  service:
    type: ClusterIP
  {{- end }}
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: kubecost
  namespace: kubecost
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  host: kubecost.{{ .Values.clusterDomain }}
  to:
    kind: Service
    name: kubecost-cost-analyzer
  port:
    targetPort: 9090
  tls:
    termination: edge
