{{- /*
  Creates shared workshop org and push robot; stores dockerconfigjson in quay-registry and developer-hub.
*/ -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: quay-org-setup
  namespace: quay-registry
  annotations:
    argocd.argoproj.io/sync-wave: "3"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: quay-org-setup
  namespace: quay-registry
  annotations:
    argocd.argoproj.io/sync-wave: "3"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: quay-org-setup
  namespace: quay-registry
  annotations:
    argocd.argoproj.io/sync-wave: "3"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: quay-org-setup
subjects:
  - kind: ServiceAccount
    name: quay-org-setup
    namespace: quay-registry
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: quay-org-setup
  namespace: developer-hub
  annotations:
    argocd.argoproj.io/sync-wave: "3"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: quay-org-setup
  namespace: developer-hub
  annotations:
    argocd.argoproj.io/sync-wave: "3"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: quay-org-setup
subjects:
  - kind: ServiceAccount
    name: quay-org-setup
    namespace: quay-registry
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: quay-org-setup-script
  namespace: quay-registry
  annotations:
    argocd.argoproj.io/sync-wave: "3"
data:
  setup.py: |
    import base64, json, os, ssl, sys, time, urllib.error, urllib.parse, urllib.request
    base = "https://" + os.environ["QUAY_HOST"]
    org, robot = os.environ["QUAY_ORG"], os.environ["ROBOT_NAME"]
    user, password = os.environ["QUAY_ADMIN_USER"], os.environ["QUAY_ADMIN_PASSWORD"]
    ctx = ssl.create_default_context()
    ctx.check_hostname, ctx.verify_mode = False, ssl.CERT_NONE
    def call(method, path, headers=None, data=None, json_body=None):
        url = base + "/api/v1" + path
        hdrs = dict(headers or {})
        body = None
        if json_body is not None:
            body = json.dumps(json_body).encode()
            hdrs["Content-Type"] = "application/json"
        elif data is not None:
            body = urllib.parse.urlencode(data).encode()
            hdrs["Content-Type"] = "application/x-www-form-urlencoded"
        req = urllib.request.Request(url, data=body, headers=hdrs, method=method)
        with urllib.request.urlopen(req, context=ctx, timeout=60) as resp:
            raw = resp.read()
            return resp.status, json.loads(raw) if raw else {}
    for _ in range(90):
        try:
            if 200 <= call("GET", "/version")[0] < 300:
                break
        except (urllib.error.URLError, TimeoutError, json.JSONDecodeError):
            pass
        time.sleep(10)
    else:
        print("Quay API not ready", file=sys.stderr); sys.exit(1)
    token = None
    try:
        st, body = call("POST", "/signin", data={"username": user, "password": password})
        if 200 <= st < 300:
            token = body.get("access_token")
    except urllib.error.HTTPError:
        pass
    if not token:
        try:
            st, _ = call("GET", "/user/initialize")
            if st == 404:
                st, body = call("POST", "/user/initialize", json_body={
                    "username": user, "password": password,
                    "email": user + "@quay.local", "access_token": True})
                if 200 <= st < 300:
                    token = body.get("access_token")
        except urllib.error.HTTPError as e:
            print("initialize:", e.code, file=sys.stderr); sys.exit(1)
    if not token:
        print("Failed to obtain Quay API token", file=sys.stderr); sys.exit(1)
    hdrs = {"Authorization": "Bearer " + token}
    try:
        call("POST", "/organization/", headers=hdrs, json_body={"name": org})
    except urllib.error.HTTPError:
        pass
    try:
        st, body = call("PUT", "/organization/" + org + "/robots/" + robot, headers=hdrs)
    except urllib.error.HTTPError as e:
        print("create robot:", e.code, file=sys.stderr); sys.exit(1)
    if not (200 <= st < 300):
        print("create robot:", st, body, file=sys.stderr); sys.exit(1)
    robot_user = body.get("name") or (org + "+" + robot)
    auth = base64.b64encode((robot_user + ":" + body.get("token")).encode()).decode()
    print(json.dumps({"auths": {os.environ["QUAY_HOST"]: {"auth": auth, "email": robot_user + "@quay.local"}}}))
---
apiVersion: batch/v1
kind: Job
metadata:
  name: quay-workshop-org-setup
  namespace: quay-registry
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "4"
spec:
  backoffLimit: 8
  template:
    spec:
      serviceAccountName: quay-org-setup
      restartPolicy: Never
      containers:
        - name: setup
          image: registry.redhat.io/openshift4/ose-cli:latest
          env:
            - name: QUAY_HOST
              value: "quay-registry.{{ .Values.clusterDomain }}"
            - name: QUAY_ORG
              value: {{ .Values.workshopOrg | default "workshop" | quote }}
            - name: ROBOT_NAME
              value: {{ .Values.workshopRobotName | default "push" | quote }}
            - name: QUAY_ADMIN_USER
              value: {{ .Values.quayAdminUser | default "quayadmin" | quote }}
            - name: QUAY_ADMIN_PASSWORD
              value: {{ .Values.quayAdminPassword | default "Welcome123!" | quote }}
          volumeMounts:
            - name: script
              mountPath: /scripts
          command:
            - /bin/bash
            - -ec
            - |
              set -euo pipefail
              DOCKERCFG=$(python3 /scripts/setup.py)
              apply_secret() {
                NS="$1"
                oc create secret generic quay-workshop-push \
                  --from-literal=.dockerconfigjson="$DOCKERCFG" \
                  --type=kubernetes.io/dockerconfigjson \
                  -n "$NS" --dry-run=client -o yaml | oc apply -f -
                echo "Secret quay-workshop-push applied in ${NS}"
              }
              apply_secret quay-registry
              apply_secret developer-hub
              apply_secret openshift-gitops
              for MC in east west; do
                if oc get managedcluster "$MC" &>/dev/null; then
                  echo "$DOCKERCFG" | oc create secret generic quay-workshop-push \
                    --from-file=.dockerconfigjson=/dev/stdin \
                    --type=kubernetes.io/dockerconfigjson \
                    -n openshift-gitops --dry-run=client -o yaml | \
                    oc apply --server="$(oc get managedcluster "$MC" -o jsonpath='{.spec.managedClusterClientConfig.url}')" -f - 2>/dev/null || \
                    echo "Note: copy quay-workshop-push to spoke ${MC} openshift-gitops manually if multicluster apply failed"
                fi
              done
      volumes:
        - name: script
          configMap:
            name: quay-org-setup-script
