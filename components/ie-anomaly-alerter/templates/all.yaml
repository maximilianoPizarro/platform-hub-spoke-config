apiVersion: v1
kind: ConfigMap
metadata:
  name: ie-anomaly-alerter-script
  namespace: industrial-edge-tst-all
  annotations:
    argocd.argoproj.io/sync-wave: "6"
data:
  alerter.py: |
    import json, os, time, threading, logging, ssl
    from datetime import datetime, timezone
    import paho.mqtt.client as mqtt
    import urllib.request

    logging.basicConfig(level=logging.INFO, format="%(asctime)s %(levelname)s %(message)s")
    log = logging.getLogger("anomaly-alerter")

    MQTT_HOST        = os.getenv("MQTT_HOST", "messaging")
    MQTT_PORT        = int(os.getenv("MQTT_PORT", "1883"))
    VIBRATION_TOPIC  = os.getenv("VIBRATION_TOPIC", "iot-sensor/sw/vibration")
    TEMPERATURE_TOPIC = os.getenv("TEMPERATURE_TOPIC", "iot-sensor/sw/temperature")
    VIBRATION_THRESH = float(os.getenv("VIBRATION_THRESHOLD", "15.0"))
    TEMP_THRESH      = float(os.getenv("TEMPERATURE_THRESHOLD", "80.0"))
    MAILPIT_URL      = os.getenv("MAILPIT_URL", "http://mailpit.mailpit.svc:8025/api/v1/send")
    HEALTH_INTERVAL  = int(os.getenv("HEALTH_INTERVAL", "300"))
    CLUSTER_NAME     = os.getenv("CLUSTER_NAME", "unknown")

    ssl_ctx = ssl.create_default_context()
    ssl_ctx.check_hostname = False
    ssl_ctx.verify_mode = ssl.CERT_NONE

    stats = {"vibration_total": 0, "vibration_anomalies": 0,
             "temperature_total": 0, "temperature_anomalies": 0}

    def send_mail(subject, text, html):
        payload = json.dumps({
            "from": {"name": f"IE Alerts ({CLUSTER_NAME})", "email": f"alerts@{CLUSTER_NAME}.industrial-edge.io"},
            "to":   [{"name": "Operations", "email": "ops@industrial-edge.io"}],
            "subject": f"[{CLUSTER_NAME}] {subject}",
            "text": text,
            "html": html
        }).encode()
        req = urllib.request.Request(MAILPIT_URL, data=payload,
                                     headers={"Content-Type": "application/json"}, method="POST")
        try:
            ctx = ssl_ctx if MAILPIT_URL.startswith("https") else None
            with urllib.request.urlopen(req, timeout=10, context=ctx) as resp:
                log.info("Mail sent [%s] -> %s", subject, resp.status)
        except Exception as e:
            log.error("Failed to send mail: %s", e)

    def parse_csv(payload):
        """Parse CSV: machine_id,sensor_id,value[,timestamp]"""
        parts = payload.split(",")
        if len(parts) < 3:
            return None
        return {"machine": parts[0].strip(), "sensor": parts[1].strip(),
                "value": float(parts[2].strip()),
                "timestamp": parts[3].strip() if len(parts) > 3 else datetime.now(timezone.utc).isoformat()}

    def on_message(client, userdata, msg):
        topic = msg.topic
        body  = msg.payload.decode("utf-8", errors="replace")
        data  = parse_csv(body)
        if not data:
            log.warning("Unparseable payload on %s: %s", topic, body[:120])
            return

        now = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M:%S UTC")

        if "vibration" in topic:
            stats["vibration_total"] += 1
            if data["value"] > VIBRATION_THRESH:
                stats["vibration_anomalies"] += 1
                log.warning("VIBRATION ANOMALY machine=%s sensor=%s value=%.2f", data["machine"], data["sensor"], data["value"])
                send_mail(
                    f"Vibration Anomaly — {data['machine']} — {now}",
                    f"Anomaly: vibration={data['value']:.2f} machine={data['machine']} sensor={data['sensor']}",
                    f"""<div style='font-family:sans-serif;max-width:500px;margin:0 auto;border:1px solid #e0e0e0;border-radius:8px;overflow:hidden'>
    <div style='background:#c9190b;padding:16px;text-align:center'><h2 style='color:#fff;margin:0'>Vibration Anomaly</h2></div>
    <div style='padding:24px'>
      <p><b>Time:</b> {now}</p>
      <p><b>Machine:</b> {data['machine']}</p>
      <p><b>Sensor:</b> {data['sensor']}</p>
      <p><b>Vibration:</b> {data['value']:.2f}</p>
      <p style='color:#c9190b'><b>Threshold:</b> {VIBRATION_THRESH}</p>
      <p><b>Action:</b> Review machine immediately</p>
    </div></div>""")
            else:
                log.debug("Vibration normal: %.2f", data["value"])

        elif "temperature" in topic:
            stats["temperature_total"] += 1
            if data["value"] > TEMP_THRESH:
                stats["temperature_anomalies"] += 1
                log.warning("TEMPERATURE ANOMALY machine=%s sensor=%s value=%.2f", data["machine"], data["sensor"], data["value"])
                send_mail(
                    f"Temperature Anomaly — {data['machine']} — {now}",
                    f"Anomaly: temperature={data['value']:.2f} machine={data['machine']} sensor={data['sensor']}",
                    f"""<div style='font-family:sans-serif;max-width:500px;margin:0 auto;border:1px solid #e0e0e0;border-radius:8px;overflow:hidden'>
    <div style='background:#ec7a08;padding:16px;text-align:center'><h2 style='color:#fff;margin:0'>Temperature Anomaly</h2></div>
    <div style='padding:24px'>
      <p><b>Time:</b> {now}</p>
      <p><b>Machine:</b> {data['machine']}</p>
      <p><b>Sensor:</b> {data['sensor']}</p>
      <p><b>Temperature:</b> {data['value']:.2f}</p>
      <p style='color:#ec7a08'><b>Threshold:</b> {TEMP_THRESH}</p>
      <p><b>Action:</b> Investigate cooling system</p>
    </div></div>""")
            else:
                log.debug("Temperature normal: %.2f", data["value"])

    def health_report_loop():
        while True:
            time.sleep(HEALTH_INTERVAL)
            now = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M:%S UTC")
            send_mail(
                f"IE Health Report — {now}",
                f"Vibration: {stats['vibration_total']} readings, {stats['vibration_anomalies']} anomalies. "
                f"Temperature: {stats['temperature_total']} readings, {stats['temperature_anomalies']} anomalies.",
                f"""<div style='font-family:sans-serif;padding:24px'>
    <h3 style='color:#3e8635'>Industrial Edge — Health Report</h3>
    <p><b>Timestamp:</b> {now}</p>
    <table style='border-collapse:collapse;width:100%'>
      <tr style='background:#f0f0f0'><th style='padding:8px;text-align:left'>Metric</th><th style='padding:8px'>Readings</th><th style='padding:8px'>Anomalies</th></tr>
      <tr><td style='padding:8px'>Vibration</td><td style='padding:8px;text-align:center'>{stats['vibration_total']}</td><td style='padding:8px;text-align:center;color:#c9190b'>{stats['vibration_anomalies']}</td></tr>
      <tr><td style='padding:8px'>Temperature</td><td style='padding:8px;text-align:center'>{stats['temperature_total']}</td><td style='padding:8px;text-align:center;color:#ec7a08'>{stats['temperature_anomalies']}</td></tr>
    </table>
    <p style='margin-top:16px;color:#6a6e73'>Next report in {HEALTH_INTERVAL}s</p>
    </div>""")

    def on_connect(client, userdata, flags, rc, properties=None):
        if rc == 0:
            log.info("Connected to MQTT broker %s:%s", MQTT_HOST, MQTT_PORT)
            client.subscribe(VIBRATION_TOPIC)
            client.subscribe(TEMPERATURE_TOPIC)
            log.info("Subscribed to %s and %s", VIBRATION_TOPIC, TEMPERATURE_TOPIC)
        else:
            log.error("MQTT connect failed rc=%s", rc)

    def on_disconnect(client, userdata, rc, properties=None, reason_code=None):
        log.warning("Disconnected from MQTT (rc=%s), reconnecting...", rc)

    if __name__ == "__main__":
        log.info("Starting Industrial Edge Anomaly Alerter")
        log.info("MQTT=%s:%s  vibration_thresh=%.1f  temp_thresh=%.1f", MQTT_HOST, MQTT_PORT, VIBRATION_THRESH, TEMP_THRESH)

        t = threading.Thread(target=health_report_loop, daemon=True)
        t.start()

        client = mqtt.Client(client_id="ie-anomaly-alerter", protocol=mqtt.MQTTv5)
        client.on_connect = on_connect
        client.on_message = on_message
        client.on_disconnect = on_disconnect
        client.reconnect_delay_set(min_delay=1, max_delay=30)

        while True:
            try:
                client.connect(MQTT_HOST, MQTT_PORT, keepalive=60)
                client.loop_forever()
            except Exception as e:
                log.error("MQTT connection error: %s — retrying in 5s", e)
                time.sleep(5)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ie-anomaly-alerter
  namespace: industrial-edge-tst-all
  labels:
    app: ie-anomaly-alerter
    app.kubernetes.io/part-of: industrial-edge
    app.openshift.io/runtime: python
  annotations:
    argocd.argoproj.io/sync-wave: "7"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ie-anomaly-alerter
  template:
    metadata:
      labels:
        app: ie-anomaly-alerter
    spec:
      initContainers:
        - name: pip-install
          image: registry.access.redhat.com/ubi9/python-312:latest
          command: ["sh", "-c", "pip install --target=/pip-packages paho-mqtt"]
          volumeMounts:
            - name: pip-packages
              mountPath: /pip-packages
      containers:
        - name: alerter
          image: registry.access.redhat.com/ubi9/python-312:latest
          command: ["python", "/opt/app/alerter.py"]
          env:
            - name: PYTHONPATH
              value: "/pip-packages"
            - name: MQTT_HOST
              value: {{ .Values.mqtt.host | default "messaging" | quote }}
            - name: MQTT_PORT
              value: {{ .Values.mqtt.port | default "1883" | quote }}
            - name: VIBRATION_TOPIC
              value: {{ .Values.mqtt.topics.vibration | default "iot-sensor/sw/vibration" | quote }}
            - name: TEMPERATURE_TOPIC
              value: {{ .Values.mqtt.topics.temperature | default "iot-sensor/sw/temperature" | quote }}
            - name: VIBRATION_THRESHOLD
              value: {{ .Values.thresholds.vibration | default "15.0" | quote }}
            - name: TEMPERATURE_THRESHOLD
              value: {{ .Values.thresholds.temperature | default "80.0" | quote }}
            - name: MAILPIT_URL
              value: {{ .Values.mailpit.url | default (printf "https://mailpit.%s/api/v1/send" .Values.hubClusterDomain) | quote }}
            - name: HEALTH_INTERVAL
              value: {{ .Values.healthReport.intervalSeconds | default "300" | quote }}
            - name: CLUSTER_NAME
              value: {{ .Values.clusterName | default "unknown" | quote }}
          volumeMounts:
            - name: script
              mountPath: /opt/app
              readOnly: true
            - name: pip-packages
              mountPath: /pip-packages
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: script
          configMap:
            name: ie-anomaly-alerter-script
        - name: pip-packages
          emptyDir: {}
