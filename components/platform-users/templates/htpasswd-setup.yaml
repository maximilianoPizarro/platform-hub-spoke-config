apiVersion: batch/v1
kind: Job
metadata:
  name: platform-users-htpasswd-setup
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "2"
spec:
  backoffLimit: 5
  template:
    spec:
      serviceAccountName: platform-users-setup
      restartPolicy: Never
      volumes:
        - name: htpasswd-data
          emptyDir: {}
      initContainers:
        - name: generate-htpasswd
          image: {{ .Values.htpasswdImage | quote }}
          env:
            - name: USER_COUNT
              value: {{ .Values.userCount | default 50 | quote }}
            - name: DEFAULT_PASSWORD
              value: {{ .Values.defaultPassword | quote }}
          command:
            - /bin/bash
            - -ec
            - |
              set -euo pipefail
              HTPASS_FILE=/data/htpasswd
              rm -f "$HTPASS_FILE"
              # ose-cli has no htpasswd; httpd image provides bcrypt (-B) per OpenShift docs.
              htpasswd -c -B -b "$HTPASS_FILE" platformadmin "$DEFAULT_PASSWORD"
              htpasswd -B -b "$HTPASS_FILE" admin "$DEFAULT_PASSWORD"
              for i in $(seq 1 "$USER_COUNT"); do
                htpasswd -B -b "$HTPASS_FILE" "user${i}" "$DEFAULT_PASSWORD"
              done
              echo "Generated bcrypt htpasswd for platformadmin, admin, and user1..user${USER_COUNT}"
              head -1 "$HTPASS_FILE"
              wc -l "$HTPASS_FILE"
          volumeMounts:
            - name: htpasswd-data
              mountPath: /data
      containers:
        - name: setup
          image: registry.redhat.io/openshift4/ose-cli:latest
          env:
            - name: HTPASSWD_SECRET
              value: {{ .Values.htpasswdSecretName | quote }}
            - name: IDP_NAME
              value: {{ .Values.identityProviderName | quote }}
          volumeMounts:
            - name: htpasswd-data
              mountPath: /data
          command:
            - /bin/bash
            - -ec
            - |
              set -euo pipefail
              test -s /data/htpasswd
              head -1 /data/htpasswd

              oc create secret generic "$HTPASSWD_SECRET" \
                --from-file=htpasswd=/data/htpasswd \
                -n openshift-config \
                --dry-run=client -o yaml | oc apply -f -

              EXISTING=$(oc get oauth cluster -o jsonpath='{.spec.identityProviders[*].name}' 2>/dev/null || true)
              if echo "$EXISTING" | tr ' ' '\n' | grep -qx "$IDP_NAME"; then
                echo "OAuth identity provider $IDP_NAME already configured"
                exit 0
              fi

              PROVIDERS_JSON=$(oc get oauth cluster -o jsonpath='{.spec.identityProviders}' 2>/dev/null || echo "[]")
              if [ "$PROVIDERS_JSON" = "null" ] || [ -z "$PROVIDERS_JSON" ]; then
                PROVIDERS_JSON="[]"
              fi

              PATCH=$(PROVIDERS_JSON="$PROVIDERS_JSON" IDP_NAME="$IDP_NAME" HTPASSWD_SECRET="$HTPASSWD_SECRET" python3 -c "
              import json, os
              providers = json.loads(os.environ.get('PROVIDERS_JSON') or '[]')
              if providers is None:
                  providers = []
              name = os.environ['IDP_NAME']
              if name not in {p.get('name') for p in providers}:
                  providers.append({
                      'name': name,
                      'mappingMethod': 'claim',
                      'type': 'HTPasswd',
                      'htpasswd': {'fileData': {'name': os.environ['HTPASSWD_SECRET']}},
                  })
              print(json.dumps({'spec': {'identityProviders': providers}}))
              ")

              oc patch oauth cluster --type merge -p "$PATCH"
              echo "OAuth cluster patched with HTPasswd provider ${IDP_NAME}"
