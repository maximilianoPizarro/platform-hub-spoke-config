apiVersion: batch/v1
kind: Job
metadata:
  name: platform-users-htpasswd-setup
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "2"
spec:
  backoffLimit: 5
  template:
    spec:
      serviceAccountName: platform-users-setup
      restartPolicy: Never
      containers:
        - name: setup
          image: registry.redhat.io/openshift4/ose-cli:latest
          env:
            - name: USER_COUNT
              value: {{ .Values.userCount | default 50 | quote }}
            - name: DEFAULT_PASSWORD
              value: {{ .Values.defaultPassword | quote }}
            - name: HTPASSWD_SECRET
              value: {{ .Values.htpasswdSecretName | quote }}
            - name: IDP_NAME
              value: {{ .Values.identityProviderName | quote }}
          command:
            - /bin/bash
            - -ec
            - |
              set -euo pipefail
              if ! command -v htpasswd >/dev/null 2>&1; then
                microdnf install -y httpd-tools >/dev/null 2>&1 || yum install -y httpd-tools >/dev/null 2>&1
              fi

              HTPASS_FILE=/tmp/htpasswd
              rm -f "$HTPASS_FILE"
              touch "$HTPASS_FILE"

              htpasswd -Bb "$HTPASS_FILE" platformadmin "$DEFAULT_PASSWORD"
              for i in $(seq 1 "$USER_COUNT"); do
                htpasswd -Bb "$HTPASS_FILE" "user${i}" "$DEFAULT_PASSWORD"
              done
              echo "Generated htpasswd for platformadmin and user1..user${USER_COUNT}"

              oc create secret generic "$HTPASSWD_SECRET" \
                --from-file=htpasswd="$HTPASS_FILE" \
                -n openshift-config \
                --dry-run=client -o yaml | oc apply -f -

              EXISTING=$(oc get oauth cluster -o jsonpath='{.spec.identityProviders[*].name}' 2>/dev/null || true)
              if echo "$EXISTING" | tr ' ' '\n' | grep -qx "$IDP_NAME"; then
                echo "OAuth identity provider $IDP_NAME already configured"
                exit 0
              fi

              PROVIDERS_JSON=$(oc get oauth cluster -o jsonpath='{.spec.identityProviders}' 2>/dev/null || echo "[]")
              if [ "$PROVIDERS_JSON" = "null" ] || [ -z "$PROVIDERS_JSON" ]; then
                PROVIDERS_JSON="[]"
              fi

              NEW_IDP=$(cat <<EOIDP
              {
                "name": "${IDP_NAME}",
                "mappingMethod": "claim",
                "type": "HTPasswd",
                "htpasswd": {
                  "fileData": {
                    "name": "${HTPASSWD_SECRET}"
                  }
                }
              }
              EOIDP
              )

              PATCH=$(PROVIDERS_JSON="$PROVIDERS_JSON" NEW_IDP="$NEW_IDP" python3 -c "
              import json, os
              providers = json.loads(os.environ['PROVIDERS_JSON'] or '[]')
              new_idp = json.loads(os.environ['NEW_IDP'])
              names = {p.get('name') for p in providers}
              if new_idp.get('name') not in names:
                  providers.append(new_idp)
              print(json.dumps({'spec': {'identityProviders': providers}}))
              ")

              echo "$PATCH" | oc patch oauth cluster --type merge -p "$(cat)"
              echo "OAuth cluster patched with HTPasswd provider ${IDP_NAME}"
