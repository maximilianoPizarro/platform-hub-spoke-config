clusterDomain: ""

# Spoke-only: export SA token to ConfigMap for hub Kiali multi-cluster sync.
exportTokenForHub: false
exportTokenSchedule: "0 */6 * * *"
exportTokenDuration: "86400s"

# Hub-only: multi-cluster access to east/west spokes (independent Istio per cluster).
multiCluster:
  enabled: false
  # When true, CronJob syncs kiali-multi-cluster-secret (CA/URL from ManagedCluster,
  # tokens via cluster-proxy + Argo CD cluster secrets). No manual helm --set tokens.
  automateTokens: false
  clusters:
    east:
      name: east
      apiUrl: ""
      caData: ""
      kialiToken: ""
      kialiUrl: ""
    west:
      name: west
      apiUrl: ""
      caData: ""
      kialiToken: ""
      kialiUrl: ""
  tokenSync:
    schedule: "0 */6 * * *"
    image: registry.redhat.io/ubi9/python-311:latest
