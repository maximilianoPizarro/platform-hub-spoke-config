{{- /*
  Remote cluster kubeconfigs for Kiali multi-cluster mode (manual tokens).
  Skipped when automateTokens is true — CronJob owns kiali-multi-cluster-secret.
*/ -}}
{{- if and .Values.multiCluster.enabled (not .Values.multiCluster.automateTokens) }}
{{- $east := .Values.multiCluster.clusters.east }}
{{- $west := .Values.multiCluster.clusters.west }}
{{- $hasEast := and $east.kialiToken $east.apiUrl $east.caData }}
{{- $hasWest := and $west.kialiToken $west.apiUrl $west.caData }}
{{- if or $hasEast $hasWest }}
apiVersion: v1
kind: Secret
metadata:
  name: kiali-multi-cluster-secret
  namespace: openshift-cluster-observability-operator
  labels:
    kiali.io/multiCluster: "true"
    kiali.io/kiali-multi-cluster-secret: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "0"
stringData:
{{- if $hasEast }}
  {{ $east.name }}: |
    apiVersion: v1
    kind: Config
    preferences: {}
    current-context: {{ $east.name }}
    contexts:
    - name: {{ $east.name }}
      context:
        cluster: {{ $east.name }}
        user: {{ $east.name }}
    users:
    - name: {{ $east.name }}
      user:
        token: {{ $east.kialiToken }}
    clusters:
    - name: {{ $east.name }}
      cluster:
        server: {{ $east.apiUrl }}
        certificate-authority-data: {{ $east.caData }}
{{- end }}
{{- if $hasWest }}
  {{ $west.name }}: |
    apiVersion: v1
    kind: Config
    preferences: {}
    current-context: {{ $west.name }}
    contexts:
    - name: {{ $west.name }}
      context:
        cluster: {{ $west.name }}
        user: {{ $west.name }}
    users:
    - name: {{ $west.name }}
      user:
        token: {{ $west.kialiToken }}
    clusters:
    - name: {{ $west.name }}
      cluster:
        server: {{ $west.apiUrl }}
        certificate-authority-data: {{ $west.caData }}
{{- end }}
{{- end }}
{{- end }}
