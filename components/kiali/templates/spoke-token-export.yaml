{{- /*
  Spoke-only: export kiali-service-account token to a ConfigMap for hub Kiali multi-cluster sync.
*/ -}}
{{- if .Values.exportTokenForHub }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: kiali-hub-export
  namespace: openshift-cluster-observability-operator
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  token: ""
  updatedAt: ""
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kiali-hub-token-export
  namespace: openshift-cluster-observability-operator
  annotations:
    argocd.argoproj.io/sync-wave: "0"
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["kiali-hub-export"]
    verbs: ["get", "patch", "update"]
  - apiGroups: [""]
    resources: ["serviceaccounts/token"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kiali-hub-token-export
  namespace: openshift-cluster-observability-operator
  annotations:
    argocd.argoproj.io/sync-wave: "0"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kiali-hub-token-export
subjects:
  - kind: ServiceAccount
    name: kiali-service-account
    namespace: openshift-cluster-observability-operator
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: kiali-hub-token-export
  namespace: openshift-cluster-observability-operator
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  schedule: {{ .Values.exportTokenSchedule | default "0 */6 * * *" | quote }}
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          serviceAccountName: kiali-service-account
          restartPolicy: OnFailure
          containers:
            - name: export
              image: registry.redhat.io/openshift4/ose-cli:latest
              command:
                - /bin/bash
                - -ec
                - |
                  NS="openshift-cluster-observability-operator"
                  SA="kiali-service-account"
                  TOKEN=$(oc create token "${SA}" -n "${NS}" --duration={{ .Values.exportTokenDuration | default "86400s" }})
                  oc patch configmap kiali-hub-export -n "${NS}" --type merge -p \
                    "{\"data\":{\"token\":\"${TOKEN}\",\"updatedAt\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}}"
                  echo "Exported token for hub Kiali sync"
              resources:
                requests:
                  cpu: 10m
                  memory: 64Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
{{- end }}
