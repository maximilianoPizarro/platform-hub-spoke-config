{{- $namespaces := list
  "industrial-edge-tst-all"
  "industrial-edge-stormshift-messaging"
  "industrial-edge-data-lake"
  "industrial-edge-ml-workspace"
  "industrial-edge-ci"
  "ml-development"
  "hub-gateway-system"
  "stackrox"
  "redhat-ods-operator"
  "openshift-cluster-observability-operator"
  "developer-hub"
  "gitea"
  "devspaces"
  "redhat-connectivity-link-operator"
}}
{{- $waypointNamespaces := list
  "industrial-edge-tst-all"
  "industrial-edge-stormshift-messaging"
  "industrial-edge-data-lake"
  "hub-gateway-system"
}}
{{- range $namespaces }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ . }}
  labels:
    istio.io/dataplane-mode: ambient
    {{- if has . $waypointNamespaces }}
    istio.io/use-waypoint: {{ . }}-waypoint
    {{- end }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
{{- end }}
{{- range $waypointNamespaces }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ . }}-waypoint
  namespace: {{ . }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  gatewayClassName: istio-waypoint
  listeners:
    - name: mesh
      port: 15008
      protocol: HBONE
{{- end }}
