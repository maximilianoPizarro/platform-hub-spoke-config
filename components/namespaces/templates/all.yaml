{{- $ieAmbientNamespaces := list
  "industrial-edge-stormshift-messaging"
  "industrial-edge-ml-workspace"
  "industrial-edge-ci"
  "ml-development"
}}
{{- $ambientNamespaces := list
  "hub-gateway-system"
  "redhat-ods-operator"
  "openshift-cluster-observability-operator"
  "developer-hub"
  "devspaces"
}}
{{- $ieNoMeshNamespaces := list "industrial-edge-data-lake" "industrial-edge-tst-all" }}
{{- /* RHCL dns-operator: no ambient — CrashLoopBackOff on spokes when meshed */ -}}
{{- $noMeshNamespaces := list
  "gitea"
  "stackrox"
  "redhat-connectivity-link-operator"
}}
{{- if ne .Values.clusterRole "hub" }}
{{- $ambientNamespaces = concat $ambientNamespaces $ieAmbientNamespaces }}
{{- $noMeshNamespaces = concat $noMeshNamespaces $ieNoMeshNamespaces }}
{{- end }}
{{- range $ambientNamespaces }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ . }}
  labels:
    istio.io/dataplane-mode: ambient
  annotations:
    argocd.argoproj.io/sync-wave: "0"
{{- end }}
{{- range $noMeshNamespaces }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ . }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
{{- end }}
