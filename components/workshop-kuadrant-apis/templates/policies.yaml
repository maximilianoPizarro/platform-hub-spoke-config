{{- if .Values.apis.maas.enabled }}
---
apiVersion: kuadrant.io/v1
kind: AuthPolicy
metadata:
  name: workshop-maas-auth
  namespace: {{ $gwNs }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: workshop-maas
  rules:
    authentication:
      api-key-users:
        apiKey:
          allNamespaces: true
          selector:
            matchLabels:
              app: workshop-maas
        credentials:
          authorizationHeader:
            prefix: APIKEY
    response:
      success:
        filters:
          identity:
            json:
              properties:
                groups:
                  selector: auth.identity.metadata.annotations.kuadrant\.io/groups
                userid:
                  selector: auth.identity.metadata.annotations.secret\.kuadrant\.io/user-id
        {{- if .Values.apis.maas.apiKey }}
        headers:
          authorization:
            plain:
              value: {{ printf "Bearer %s" .Values.apis.maas.apiKey | quote }}
        {{- end }}
    authorization:
      allow-groups:
        opa:
          rego: |
            groups := split(object.get(input.auth.identity.metadata.annotations, "kuadrant.io/groups", ""), ",")
            allow { groups[_] == "free" }
            allow { groups[_] == "gold" }
            plan := object.get(input.auth.identity.metadata.annotations, "secret.kuadrant.io/plan-id", "")
            allow { plan == "free" }
            allow { plan == "gold" }
---
apiVersion: extensions.kuadrant.io/v1alpha1
kind: PlanPolicy
metadata:
  name: workshop-maas-plans
  namespace: {{ $gwNs }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: workshop-maas
  plans:
    - tier: free
      predicate: |
        has(auth.identity) && auth.identity.metadata.annotations["secret.kuadrant.io/plan-id"] == "free"
      limits:
        custom:
          - limit: 100
            window: 1h
    - tier: gold
      predicate: |
        has(auth.identity) && auth.identity.metadata.annotations["secret.kuadrant.io/plan-id"] == "gold"
      limits:
        custom:
          - limit: 500
            window: 1h
---
apiVersion: kuadrant.io/v1alpha1
kind: TokenRateLimitPolicy
metadata:
  name: workshop-maas-token-limits
  namespace: {{ $gwNs }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: workshop-maas
  limits:
    free:
      rates:
        - limit: {{ .Values.tokenRateLimit.free.limit }}
          window: {{ .Values.tokenRateLimit.free.window | quote }}
      when:
        - predicate: request.path == "/llm/v1/chat/completions"
        - predicate: |
            auth.identity.metadata.annotations["secret.kuadrant.io/plan-id"] == "free" ||
            auth.identity.groups.split(",").exists(g, g == "free")
      counters:
        - expression: auth.identity.userid
    gold:
      rates:
        - limit: {{ .Values.tokenRateLimit.gold.limit }}
          window: {{ .Values.tokenRateLimit.gold.window | quote }}
      when:
        - predicate: request.path == "/llm/v1/chat/completions"
        - predicate: |
            auth.identity.metadata.annotations["secret.kuadrant.io/plan-id"] == "gold" ||
            auth.identity.groups.split(",").exists(g, g == "gold")
      counters:
        - expression: auth.identity.userid
{{- end }}
