gitops:
  repoUrl: "https://github.com/maximilianoPizarro/platform-hub-spoke-config"
  revision: "main"
  basePath: "."

argocd:
  namespace: openshift-gitops
  project: default

# Multi-cluster configuration
clusters:
  hub:
    domain: "apps.cluster-xqg4c.dynamic2.redhatworkshops.io"
  east:
    domain: "apps.cluster-2847b.dynamic2.redhatworkshops.io"
    apiUrl: "https://api.cluster-2847b.dynamic2.redhatworkshops.io:6443"
    # token: set via --set clusters.east.token=sha256~... (never commit tokens)
  west:
    domain: "apps.cluster-5zjkk.dynamic2.redhatworkshops.io"
    apiUrl: "https://api.cluster-5zjkk.dynamic2.redhatworkshops.io:6443"
    # token: set via --set clusters.west.token=sha256~... (never commit tokens)

connectivityLink:
  operators:
    channel: stable-4.20
    version: 4.20.4
    subscriptions:
      - name: cluster-observability-operator
        namespace: openshift-cluster-observability-operator
        channel: stable
        source: redhat-operators
      - name: grafana-operator
        namespace: openshift-operators
        channel: v5
        source: community-operators
      - name: kiali-ossm
        namespace: openshift-operators
        channel: stable
        source: redhat-operators
      # amq-broker-rhel8: spokes only (spoke-components subscriptions)
      - name: camel-k
        namespace: openshift-operators
        channel: stable-v2
        source: community-operators
      - name: rhods-operator
        namespace: redhat-ods-operator
        channel: stable-2.25
        source: redhat-operators
      - name: amq-streams
        namespace: openshift-operators
        channel: stable
        source: redhat-operators
      - name: amq-streams-console
        namespace: openshift-operators
        channel: stable
        source: redhat-operators
      - name: opentelemetry-product
        namespace: openshift-operators
        channel: stable
        source: redhat-operators
      - name: rhdh
        namespace: openshift-operators
        channel: fast-1.9
        source: redhat-operators
      - name: skupper-operator
        namespace: openshift-operators
        channel: stable-2
        source: redhat-operators

  apps:
    # Core platform
    - id: openshift-gitops
      enabled: true
      path: openshift-gitops
      destinationNamespace: openshift-gitops
      syncWave: "0"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: namespaces
      enabled: true
      path: namespaces
      destinationNamespace: openshift-gitops
      syncWave: "0"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: false
    - id: operators
      enabled: true
      path: operators
      destinationNamespace: openshift-operators
      syncWave: "0"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: servicemeshoperator3
      enabled: true
      path: servicemeshoperator3
      destinationNamespace: openshift-operators
      syncWave: "0"
      prune: false
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: acm-operator
      enabled: true
      path: acm-operator
      destinationNamespace: open-cluster-management
      syncWave: "0"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: acs-operator
      enabled: true
      path: acs-operator
      destinationNamespace: stackrox
      syncWave: "0"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: acs-secured-cluster
      enabled: true
      path: acs-secured-cluster
      destinationNamespace: stackrox
      syncWave: "0"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: developer-hub
      enabled: true
      path: developer-hub
      destinationNamespace: developer-hub
      syncWave: "0"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: acm-hub-spoke
      enabled: true
      path: acm-hub-spoke
      destinationNamespace: openshift-gitops
      syncWave: "0"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    # Observability
    - id: observability
      enabled: true
      path: observability
      destinationNamespace: openshift-cluster-observability-operator
      syncWave: "0"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: kiali
      enabled: true
      path: kiali
      destinationNamespace: openshift-cluster-observability-operator
      syncWave: "0"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: opentelemetry
      enabled: true
      path: opentelemetry
      destinationNamespace: openshift-opentelemetry
      syncWave: "0"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    # Connectivity Link
    - id: rhcl-operator
      enabled: true
      path: rhcl-operator
      destinationNamespace: redhat-connectivity-link-operator
      syncWave: "0"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    # Industrial Edge components are deployed to spokes only (via spoke-components)
    # Hub Gateway (F5)
    - id: hub-gateway
      enabled: true
      path: hub-gateway
      destinationNamespace: hub-gateway-system
      syncWave: "0"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    # Gitea (centralized on hub)
    - id: gitea-chart
      enabled: true
      path: ""
      repoURL: "https://dl.gitea.com/charts/"
      chart: gitea
      targetRevision: "12.5.0"
      destinationNamespace: gitea
      syncWave: "0"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: false
    - id: gitea
      enabled: true
      path: gitea
      destinationNamespace: gitea
      syncWave: "0"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    # Console Links
    - id: console-links
      enabled: true
      path: console-links
      destinationNamespace: openshift-gitops
      syncWave: "0"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    # Grafana Dashboards
    - id: grafana-dashboards
      enabled: true
      path: grafana-dashboards
      destinationNamespace: openshift-cluster-observability-operator
      syncWave: "0"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: istio-monitoring
      enabled: true
      path: istio-monitoring
      destinationNamespace: istio-system
      syncWave: "0"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: service-interconnect
      enabled: true
      path: service-interconnect
      destinationNamespace: service-interconnect
      syncWave: "0"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    # Mailpit (email testing)
    - id: mailpit
      enabled: true
      path: mailpit
      destinationNamespace: mailpit
      syncWave: "0"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: false
    # Kafka Console (StreamsHub UI for all spoke Kafka clusters)
    - id: kafka-console
      enabled: true
      path: kafka-console
      destinationNamespace: kafka-console
      syncWave: "0"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    # Kubecost (Red Hat certified operator - Federated ETL hub primary)
    - id: kubecost
      enabled: true
      path: kubecost
      destinationNamespace: kubecost
      syncWave: "0"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true

deployer:
  domain: "apps.cluster-xqg4c.dynamic2.redhatworkshops.io"
  apiUrl: "https://api.cluster-xqg4c.dynamic2.redhatworkshops.io:6443"

litemaas:
  apiKey: ""
  apiUrl: "https://litellm-prod.apps.maas.redhatworkshops.io/v1"
  enabled: true
  model: "deepseek-r1-distill-qwen-14b"

kafkaConsoleBrokerDns:
  eastTstIP: "172.231.250.171"
  westTstIP: "172.231.75.221"
  eastStormshiftIP: "172.231.83.139"
  westStormshiftIP: "172.231.145.82"

fieldContent:
  deploymentType: "helm"
