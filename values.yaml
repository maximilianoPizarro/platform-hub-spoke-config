gitops:
  repoUrl: "https://github.com/maximilianoPizarro/platform-hub-spoke-config"
  revision: "main"
  basePath: "."

argocd:
  namespace: openshift-gitops
  project: default

# Multi-cluster configuration
clusters:
  hub:
    domain: "apps.cluster-xqg4c.dynamic2.redhatworkshops.io"
  east:
    domain: "apps.cluster-2847b.dynamic2.redhatworkshops.io"
    apiUrl: "https://api.cluster-2847b.dynamic2.redhatworkshops.io:6443"
  west:
    domain: "apps.cluster-5zjkk.dynamic2.redhatworkshops.io"
    apiUrl: "https://api.cluster-5zjkk.dynamic2.redhatworkshops.io:6443"

connectivityLink:
  operators:
    channel: stable-4.20
    version: 4.20.4
    subscriptions:
      - name: cluster-observability-operator
        namespace: openshift-cluster-observability-operator
        channel: stable
        source: redhat-operators
      - name: grafana-operator
        namespace: openshift-operators
        channel: v5
        source: community-operators
      - name: kiali-ossm
        namespace: openshift-operators
        channel: stable
        source: redhat-operators
      - name: amq-broker-rhel8
        namespace: industrial-edge-tst-all
        channel: 7.12.x
        source: redhat-operators
      - name: camel-k
        namespace: openshift-operators
        channel: stable-v2
        source: community-operators
      - name: rhods-operator
        namespace: redhat-ods-operator
        channel: stable-2.25
        source: redhat-operators
      - name: amq-streams
        namespace: openshift-operators
        channel: stable
        source: redhat-operators
      - name: opentelemetry-product
        namespace: openshift-operators
        channel: stable
        source: redhat-operators
      - name: rhdh
        namespace: openshift-operators
        channel: fast-1.9
        source: redhat-operators
      - name: skupper-operator
        namespace: openshift-operators
        channel: stable-2
        source: redhat-operators

  apps:
    # Core platform
    - id: openshift-gitops
      enabled: true
      path: openshift-gitops
      destinationNamespace: openshift-gitops
      syncWave: "0"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: namespaces
      enabled: true
      path: namespaces
      destinationNamespace: openshift-gitops
      syncWave: "1"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: false
    - id: operators
      enabled: true
      path: operators
      destinationNamespace: openshift-operators
      syncWave: "2"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: servicemeshoperator3
      enabled: true
      path: servicemeshoperator3
      destinationNamespace: openshift-operators
      syncWave: "3"
      prune: false
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: acm-operator
      enabled: true
      path: acm-operator
      destinationNamespace: open-cluster-management
      syncWave: "3"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: acs-operator
      enabled: true
      path: acs-operator
      destinationNamespace: stackrox
      syncWave: "3"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: developer-hub
      enabled: true
      path: developer-hub
      destinationNamespace: developer-hub
      syncWave: "3"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: acm-hub-spoke
      enabled: true
      path: acm-hub-spoke
      destinationNamespace: openshift-gitops
      syncWave: "4"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    # Observability
    - id: observability
      enabled: true
      path: observability
      destinationNamespace: openshift-cluster-observability-operator
      syncWave: "5"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: kiali
      enabled: true
      path: kiali
      destinationNamespace: openshift-cluster-observability-operator
      syncWave: "6"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: opentelemetry
      enabled: true
      path: opentelemetry
      destinationNamespace: openshift-opentelemetry
      syncWave: "6"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    # Connectivity Link
    - id: rhcl-operator
      enabled: true
      path: rhcl-operator
      destinationNamespace: redhat-connectivity-link-operator
      syncWave: "6"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    # Industrial Edge (hub data lake)
    - id: industrial-edge-minio
      enabled: true
      path: industrial-edge-minio
      destinationNamespace: industrial-edge-ml-workspace
      syncWave: "5"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: industrial-edge-data-science-cluster
      enabled: true
      path: industrial-edge-data-science-cluster
      destinationNamespace: redhat-ods-applications
      syncWave: "6"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: industrial-edge-data-lake
      enabled: true
      path: industrial-edge-data-lake
      destinationNamespace: industrial-edge-data-lake
      syncWave: "6"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: industrial-edge-data-science-project
      enabled: true
      path: industrial-edge-data-science-project
      destinationNamespace: ml-development
      syncWave: "7"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    # Hub Gateway (F5)
    - id: hub-gateway
      enabled: true
      path: hub-gateway
      destinationNamespace: hub-gateway-system
      syncWave: "7"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    # Gitea (centralized on hub)
    - id: gitea-chart
      enabled: true
      path: ""
      repoURL: "https://dl.gitea.com/charts/"
      chart: gitea
      targetRevision: "12.5.0"
      destinationNamespace: gitea
      syncWave: "3"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: false
    - id: gitea
      enabled: true
      path: gitea
      destinationNamespace: gitea
      syncWave: "5"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    # Console Links
    - id: console-links
      enabled: true
      path: console-links
      destinationNamespace: openshift-gitops
      syncWave: "9"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    # Grafana Dashboards
    - id: grafana-dashboards
      enabled: true
      path: grafana-dashboards
      destinationNamespace: openshift-cluster-observability-operator
      syncWave: "8"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: istio-monitoring
      enabled: true
      path: istio-monitoring
      destinationNamespace: istio-system
      syncWave: "8"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true
    - id: service-interconnect
      enabled: true
      path: service-interconnect
      destinationNamespace: service-interconnect
      syncWave: "10"
      prune: true
      selfHeal: true
      skipDryRunOnMissingResource: true

deployer:
  domain: "apps.cluster-xqg4c.dynamic2.redhatworkshops.io"
  apiUrl: "https://api.cluster-xqg4c.dynamic2.redhatworkshops.io:6443"

litemaas:
  apiKey: ""
  apiUrl: "https://litellm-prod.apps.maas.redhatworkshops.io/v1"
  enabled: true
  model: "deepseek-r1-distill-qwen-14b"

fieldContent:
  deploymentType: "helm"
