gitops:
  repoUrl: "https://github.com/maximilianoPizarro/platform-hub-spoke-config"
  revision: "main"

argocd:
  namespace: openshift-gitops
  project: default

clusterName: west
userCount: 50

# Kairos on spoke — AI credentials in kairos-system/kairos-ai-credentials (RHDP inject, never Git).
kairos:
  aiCredentials:
    secretName: kairos-ai-credentials
    secretKey: api-key
  aiModel:
    apiURL: "https://maas-rhdp.apps.maas.redhatworkshops.io/v1/chat/completions"
    model: llama-scout-17b

# RHDP injects deployer.domain (local spoke) and clusters.hub.domain (hub apps domain).
# clusters.hub.domain is required for Mailpit alerts, ACS Central endpoint, and hub console links.
# No {{ }} in Git (Helm parse error).
clusters:
  hub:
    domain: ""

deployer:
  domain: ""
  apiUrl: ""

operators:
  subscriptions:
    - name: amq-broker-rhel8
      namespace: openshift-operators
      channel: 7.12.x
      source: redhat-operators
    - name: camel-k
      namespace: openshift-operators
      channel: stable-v2
      source: community-operators
    - name: amq-streams
      namespace: openshift-operators
      channel: stable
      source: redhat-operators
    - name: devspaces
      namespace: openshift-operators
      channel: stable
      source: redhat-operators
    - name: kubernetes-imagepuller-operator
      namespace: openshift-operators
      channel: stable
      source: community-operators
    - name: rhacs-operator
      namespace: openshift-operators
      channel: stable
      source: redhat-operators
    - name: skupper-operator
      namespace: openshift-operators
      channel: stable-2
      source: redhat-operators
    - name: grafana-operator
      namespace: openshift-operators
      channel: v5
      source: community-operators
    - name: opentelemetry-product
      namespace: openshift-operators
      channel: stable
      source: redhat-operators
    - name: kiali-ossm
      namespace: openshift-operators
      channel: stable
      source: redhat-operators
    - name: rhods-operator
      namespace: redhat-ods-operator
      channel: stable-2.25
      source: redhat-operators

apps:
  - id: platform-users
    path: components/platform-users
    destinationNamespace: openshift-gitops
    syncWave: "0"
  - id: namespaces
    path: components/namespaces
    destinationNamespace: openshift-gitops
    syncWave: "1"
  - id: operators
    path: components/operators
    destinationNamespace: openshift-operators
    syncWave: "2"
  - id: kairos
    path: components/kairos
    destinationNamespace: kairos-system
    syncWave: "3"
  - id: camel-dashboard-openshift-all
    path: components/camel-dashboard-openshift
    destinationNamespace: camel-dashboard
    syncWave: "3"
  - id: servicemeshoperator3
    path: components/servicemeshoperator3
    destinationNamespace: openshift-operators
    syncWave: "3"
  - id: observability
    path: components/observability
    destinationNamespace: openshift-cluster-observability-operator
    syncWave: "4"
  - id: acs-secured-cluster
    path: components/acs-secured-cluster
    destinationNamespace: stackrox
    syncWave: "4"
  - id: spoke-dashboards
    path: components/spoke-dashboards
    destinationNamespace: openshift-cluster-observability-operator
    syncWave: "4"
  - id: istio-monitoring
    path: components/istio-monitoring
    destinationNamespace: istio-system
    syncWave: "4"
  - id: opentelemetry
    path: components/opentelemetry
    destinationNamespace: openshift-opentelemetry
    syncWave: "4"
  - id: rhcl-operator
    path: components/rhcl-operator
    destinationNamespace: redhat-connectivity-link-operator
    syncWave: "4"
  - id: kiali
    path: components/kiali
    destinationNamespace: openshift-cluster-observability-operator
    syncWave: "4"
  - id: industrial-edge-tst
    path: components/industrial-edge-tst
    destinationNamespace: industrial-edge-tst-all
    syncWave: "5"
  - id: industrial-edge-stormshift
    path: components/industrial-edge-stormshift
    destinationNamespace: industrial-edge-stormshift-messaging
    syncWave: "5"
  - id: industrial-edge-pipelines
    path: components/industrial-edge-pipelines
    destinationNamespace: industrial-edge-ci
    syncWave: "5"
  - id: industrial-edge-data-science-cluster
    path: components/industrial-edge-data-science-cluster
    destinationNamespace: redhat-ods-applications
    syncWave: "5"
  - id: industrial-edge-data-lake
    path: components/industrial-edge-data-lake
    destinationNamespace: industrial-edge-data-lake
    syncWave: "5"
  - id: industrial-edge-data-science-project
    path: components/industrial-edge-data-science-project
    destinationNamespace: ml-development
    syncWave: "5"
  - id: ie-anomaly-alerter
    path: components/ie-anomaly-alerter
    destinationNamespace: industrial-edge-tst-all
    syncWave: "6"
  - id: spoke-gateway
    path: components/spoke-gateway
    destinationNamespace: spoke-gateway-system
    syncWave: "6"
  - id: spoke-interconnect
    path: components/spoke-interconnect
    destinationNamespace: service-interconnect
    syncWave: "6"
  - id: devspaces
    path: components/devspaces
    destinationNamespace: devspaces
    syncWave: "7"
  - id: console-links
    path: components/console-links
    destinationNamespace: openshift-gitops
    syncWave: "9"
  - id: kubecost
    path: components/kubecost
    destinationNamespace: kubecost
    syncWave: "10"
