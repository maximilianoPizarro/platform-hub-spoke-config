{{- range .Values.apps }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .id }}-{{ $.Values.clusterName }}
  namespace: {{ $.Values.argocd.namespace }}
  labels:
    app.kubernetes.io/part-of: platform-hub-spoke
    cluster: {{ $.Values.clusterName }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .syncWave | quote }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ $.Values.argocd.project }}
  ignoreDifferences:
    - kind: Service
      jsonPointers:
        - /spec/clusterIP
        - /spec/clusterIPs
        - /spec/ipFamilies
        - /spec/ipFamilyPolicy
    - group: route.openshift.io
      kind: Route
      jsonPointers:
        - /status
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/template/metadata/annotations
    - kind: Secret
      jsonPointers:
        - /data
    - kind: Namespace
      jsonPointers:
        - /metadata/annotations
    - group: kafka.strimzi.io
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: sailoperator.io
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: platform.stackrox.io
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: broker.amq.io
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: operators.coreos.com
      kind: OperatorGroup
      jsonPointers:
        - /metadata/annotations
        - /metadata/labels
        - /spec
    - group: operators.coreos.com
      kind: Subscription
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: tekton.dev
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /metadata/labels
        - /spec/tasks
    - group: grafana.integreatly.org
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: skupper.io
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: gateway.networking.k8s.io
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: kiali.io
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: console.openshift.io
      kind: ConsoleLink
      jsonPointers:
        - /metadata/annotations
    - kind: ConfigMap
      name: kiali-hub-export
      jsonPointers:
        - /data
    - group: datasciencecluster.opendatahub.io
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /status
    {{- if eq .id "camel-dashboard-openshift-all" }}
    - group: console.openshift.io
      kind: ConsolePlugin
      jsonPointers:
        - /spec/enablement
        - /status
    - group: operators.coreos.com
      kind: ClusterServiceVersion
      jsonPointers:
        - /status
    {{- end }}
    {{- if eq .id "devspaces" }}
    - group: org.eclipse.che
      kind: CheCluster
      jsonPointers:
        - /status
    {{- end }}
  {{- $domain := $.Values.deployer.domain | default "apps.cluster.example.com" }}
  {{- $hubDomain := $.Values.clusters.hub.domain | default $domain }}
  source:
    {{- if .chart }}
    repoURL: {{ .repoURL }}
    chart: {{ .chart }}
    targetRevision: {{ .targetRevision }}
    {{- else }}
    repoURL: {{ $.Values.gitops.repoUrl }}
    targetRevision: {{ $.Values.gitops.revision }}
    path: {{ .path }}
    {{- end }}
    {{- if eq .id "platform-users" }}
    helm:
      valuesObject:
        userCount: {{ $.Values.userCount | default 50 }}
        defaultPassword: {{ $.Values.defaultPassword | default "Welcome123!" | quote }}
        grantClusterReader: true
    {{- else if eq .id "kairos" }}
    helm:
      valuesObject:
        clusterRole: spoke
        clusterName: {{ $.Values.clusterName | quote }}
        clusterDomain: {{ $domain }}
        aiCredentials:
          secretName: kairos-ai-credentials
          secretKey: api-key
        aiModel:
          apiURL: "https://isvc-granite-31-8b-fp8-predictor.sandbox-shared-models.svc.cluster.local:8443/v1/chat/completions"
          model: granite-31-8b
        console:
          enabled: false
        clusterAgent:
          enabled: true
          hubReporting:
            enabled: true
            endpoint: "https://kairos-console-kairos-system.{{ $hubDomain }}"
        sensorScanPolicies:
          enabled: true
          baselineNamespace: industrial-edge-tst-all
    {{- else if eq .id "operators" }}
    helm:
      valuesObject:
        clusterRole: spoke
        subscriptions: {{ $.Values.operators.subscriptions | toJson }}
    {{- else if eq .id "namespaces" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
        clusterRole: spoke
    {{- else if eq .id "servicemeshoperator3" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
        clusterRole: spoke
        clusterName: {{ $.Values.clusterName }}
    {{- else if eq .id "acs-secured-cluster" }}
    helm:
      valuesObject:
        clusterName: {{ $.Values.clusterName }}
        clusterDomain: {{ $domain }}
        hubClusterDomain: {{ $hubDomain }}
        clusterRole: spoke
    {{- else if eq .id "kiali" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
        exportTokenForHub: true
    {{- else if eq .id "devspaces" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
        hubClusterDomain: {{ $hubDomain }}
        userCount: {{ $.Values.userCount | default 50 }}
    {{- else if eq .id "console-links" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
        hubClusterDomain: {{ $hubDomain }}
        clusterRole: spoke
    {{- else if eq .id "kubecost" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
        clusterName: {{ $.Values.clusterName }}
        role: agent
        clusterRole: spoke
        federatedStore:
          bucket: kubecost
          endpoint: minio-hub.service-interconnect.svc.cluster.local:9000
          region: us-east-1
          accessKey: minio
          secretKey: minio123
    {{- else if eq .id "camel-dashboard-openshift-all" }}
    helm:
      releaseName: camel-dashboard-openshift-all-{{ $.Values.clusterName }}
    {{- else }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
        clusterName: {{ $.Values.clusterName }}
        clusterRole: spoke
        global:
          localClusterDomain: {{ $domain }}
          hubClusterDomain: {{ $hubDomain }}
    {{- end }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .destinationNamespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      {{- if ne .id "kairos" }}
      - ServerSideApply=true
      {{- end }}
      - RespectIgnoreDifferences=true
      - SkipDryRunOnMissingResource=true
{{- end }}
